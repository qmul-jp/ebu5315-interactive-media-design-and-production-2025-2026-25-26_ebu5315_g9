<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弧、弦、圆心角、圆周角</title>
    <style>
        /* 极简居中样式，无额外设计元素，仅用于对齐 */
        body {
            text-align: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }

        /* 弧符号容器 */
        .arc-label {
            display: inline-block;
            position: relative;
            padding-top: 0.3em;
        }

        /* 弧符号本身：绝对定位，居中显示在文字正上方 */
        .arc-label .arc-symbol {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(1.3);
            font-size: 0.75em;
            line-height: 1;
        }
    
        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; }
        html,body { background:var(--bg)!important; color:var(--fg)!important; transition:background .2s,color .2s; }
        canvas { background:var(--bg)!important; }
        h3 { color:var(--fg); }
        /* i18n: 只隐藏纯文字标签，数据span不复制 */
        .zh-text { display:inline; }
        .en-text { display:none; }
        .zh-block { display:block; }
        .en-block { display:none; }

    </style>
</head>
<body>
    <h3><span class="zh-text">弧、弦、圆心角、圆周角</span><span class="en-text">Arc, Chord, Central &amp; Inscribed Angle</span></h3>

    <!-- 画布区域 -->
    <div>
        <canvas id="circleCanvas" width="600" height="500" style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div>
        <p><span class="arc-label"><span class="arc-symbol">⌢</span>AB</span> <span class="zh-text">是⊙O的一条弧</span><span class="en-text">is an arc of ⊙O</span></p>
        <p>AB <span class="zh-text">是⊙O的一条弦</span><span class="en-text">is a chord of ⊙O</span></p>
        <p>∠AOB <span class="zh-text">是<span class="arc-label"><span class="arc-symbol">⌢</span>AB</span>所对的圆心角</span><span class="en-text">is the central angle subtended by <span class="arc-label"><span class="arc-symbol">⌢</span>AB</span></span></p>
        <p>∠ACB <span class="zh-text">是<span class="arc-label"><span class="arc-symbol">⌢</span>AB</span>所对的一个圆周角</span><span class="en-text">is an inscribed angle subtended by <span class="arc-label"><span class="arc-symbol">⌢</span>AB</span></span></p>
    </div>

    <script>
        // theme helpers
        function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#ffffff':'#000000'; }
        function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#000000':'#ffffff'; }
        function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

        // 固定圆心坐标和半径
        const centerX = 300;
        const centerY = 250;
        const radius = 180;

        // 三个点的初始角度（度）
        let angleA = 30;
        let angleB = 120;
        let angleC = 200;

        // 获取画布和上下文
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');

        // 拖拽状态
        let isDragging = false;
        let draggedPoint = null; // 'A', 'B' 或 'C'

        // 根据角度计算圆上点的坐标
        function getPointFromAngle(angleDeg) {
            const rad = angleDeg * Math.PI / 180;
            return {
                x: centerX + radius * Math.cos(rad),
                y: centerY + radius * Math.sin(rad)
            };
        }

        // 绘制圆和点
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制圆
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = _fg();
            ctx.stroke();

            // 绘制圆心O
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = _fg();
            ctx.fill();
            ctx.fillStyle = _fg();
            ctx.font = '14px sans-serif';
            ctx.fillText('O', centerX - 15, centerY - 10);

            // 获取三点坐标
            const pA = getPointFromAngle(angleA);
            const pB = getPointFromAngle(angleB);
            const pC = getPointFromAngle(angleC);

            // 绘制弦AB、AC、BC（虚线）
            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = _fg()==='#ffffff'?'#666':'#aaa';
            ctx.setLineDash([4, 2]);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pC.x, pC.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pB.x, pB.y);
            ctx.lineTo(pC.x, pC.y);
            ctx.stroke();
            ctx.setLineDash([]);

            // 绘制半径OA、OB（浅色）
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = _fg()==='#ffffff'?'#555':'#ddd';
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(pB.x, pB.y);
            ctx.stroke();

            // 绘制点A、B、C
            ctx.beginPath();
            ctx.arc(pA.x, pA.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = _fg();
            ctx.fillText('A', pA.x + 8, pA.y - 8);

            ctx.beginPath();
            ctx.arc(pB.x, pB.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'blue';
            ctx.fill();
            ctx.fillText('B', pB.x + 8, pB.y - 8);

            ctx.beginPath();
            ctx.arc(pC.x, pC.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'green';
            ctx.fill();
            ctx.fillText('C', pC.x + 8, pC.y - 8);
        }

        // 鼠标按下事件
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const pA = getPointFromAngle(angleA);
            const pB = getPointFromAngle(angleB);
            const pC = getPointFromAngle(angleC);

            const distA = Math.hypot(mouseX - pA.x, mouseY - pA.y);
            const distB = Math.hypot(mouseX - pB.x, mouseY - pB.y);
            const distC = Math.hypot(mouseX - pC.x, mouseY - pC.y);

            const threshold = 15;

            if (distA < threshold) {
                isDragging = true;
                draggedPoint = 'A';
            } else if (distB < threshold) {
                isDragging = true;
                draggedPoint = 'B';
            } else if (distC < threshold) {
                isDragging = true;
                draggedPoint = 'C';
            }
        });

        // 鼠标移动事件
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !draggedPoint) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            let angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;

            if (draggedPoint === 'A') {
                angleA = angleDeg;
            } else if (draggedPoint === 'B') {
                angleB = angleDeg;
            } else if (draggedPoint === 'C') {
                angleC = angleDeg;
            }

            drawCanvas();
        });

        // 鼠标松开事件
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            draggedPoint = null;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            draggedPoint = null;
        });

        // 初始化绘制
        drawCanvas();

        window._clRedraw = function(){ drawCanvas(); };
    </script>

<script>
(function(){
    window._CL = { lang:'zh', theme:'light' };

    function applyLang(lang){
        window._CL.lang = lang;
        document.querySelectorAll('.zh-text').forEach(function(el){ el.style.display = lang==='zh'?'inline':'none'; });
        document.querySelectorAll('.en-text').forEach(function(el){ el.style.display = lang==='en'?'inline':'none'; });
        document.querySelectorAll('.zh-block').forEach(function(el){ el.style.display = lang==='zh'?'block':'none'; });
        document.querySelectorAll('.en-block').forEach(function(el){ el.style.display = lang==='en'?'block':'none'; });
        if(typeof _clRedraw==='function') _clRedraw();
    }

    function applyTheme(theme){
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        if(typeof _clRedraw==='function') _clRedraw();
    }

    window.addEventListener('message', function(ev){
        if(!ev.data || ev.data._src!=='circlelab') return;
        if(ev.data.lang)  applyLang(ev.data.lang);
        if(ev.data.theme) applyTheme(ev.data.theme);
    });

    window.addEventListener('DOMContentLoaded', function(){
        try{ if(window.parent._CL_lang)  applyLang(window.parent._CL_lang); }catch(e){}
        try{ if(window.parent._CL_theme) applyTheme(window.parent._CL_theme); }catch(e){}
    });
})();
</script>

</body>
</html>

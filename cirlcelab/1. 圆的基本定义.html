<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆的基本定义 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        /* 页面独有布局 */
        body {
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle-card {
        max-width: 860px;   /* 原页面稍宽 */
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆的基本定义</div>
        <div class="title" data-cl-en style="display:none">Basic Definition of a Circle</div>
        <div class="sub-en" data-cl-zh>圆心 · 半径 · 直径</div>
        <div class="sub-en" data-cl-en style="display:none">Center · Radius · Diameter</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽红点 A 改变半径</span><span data-cl-en style="display:none">Drag point A</span></span>
        <span>🔘 <span data-cl-zh>拖拽圆心 O 平移</span><span data-cl-en style="display:none">Drag center O</span></span>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_FONT = '500 14px "DM Sans", -apple-system, Arial, sans-serif';

        let O = { x: 300, y: 250 };
        let radius = 150, angleA = -30, dragging = false, dragTarget = null;

        document.documentElement.style.fontSize = '16px';

        function getA() {
            const rad = angleA * Math.PI / 180;
            return { x: O.x + radius * Math.cos(rad), y: O.y + radius * Math.sin(rad) };
        }
        function getB(pA) { return { x: 2 * O.x - pA.x, y: 2 * O.y - pA.y }; }

        function drawCanvas() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const fgColor = isDark ? '#e8e4dc' : '#1a1a1a';

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const pA = getA(), pB = getB(pA);

            // 圆
            ctx.beginPath();
            ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = fgColor;
            ctx.lineWidth = 1.8;
            ctx.stroke();

            // 直径 AB（虚线）
            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = fgColor; ctx.lineWidth = 1.2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 半径 OA
            ctx.beginPath();
            ctx.moveTo(O.x, O.y); ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = isDark ? '#e8724a' : '#c8502a';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // 圆心 O
            ctx.fillStyle = fgColor;
            ctx.beginPath(); ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI); ctx.fill();
            ctx.font = CANVAS_FONT;
            ctx.fillText('O', O.x - 16, O.y - 8);

            // 点 A
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.arc(pA.x, pA.y, 7, 0, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.fillText('A', pA.x + 10, pA.y - 8);

            // 点 B
            ctx.fillStyle = '#3498db';
            ctx.beginPath(); ctx.arc(pB.x, pB.y, 6, 0, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.fillText('B', pB.x + 10, pB.y - 8);
        }

        function updateTexts() {
            const isZh = !window._CL || window._CL.lang !== 'en';
            const desc = document.getElementById('descArea');
            if (isZh) {
                desc.innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">O</span> 是圆心</div>
                    <div class="desc-item"><span class="desc-symbol">OA</span> 是半径 (r)</div>
                    <div class="desc-item"><span class="desc-symbol">AB</span> 是直径 (d)</div>`;
                document.getElementById('theoremText').innerHTML =
                    '📐 圆是平面上到定点（圆心）距离等于定长（半径）的所有点的集合';
            } else {
                desc.innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">O</span> is Center</div>
                    <div class="desc-item"><span class="desc-symbol">OA</span> is Radius</div>
                    <div class="desc-item"><span class="desc-symbol">AB</span> is Diameter</div>`;
                document.getElementById('theoremText').innerHTML =
                    '📐 A circle is the set of all points in a plane equidistant from a fixed center.';
            }
        }

        // 交互
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (600 / rect.width),
                y: (clientY - rect.top)  * (500 / rect.height)
            };
        }

        function handleStart(e) {
            const m = getMousePos(e);
            const pA = getA();
            if      (Math.hypot(m.x - O.x,  m.y - O.y)  < 20) { dragging = true; dragTarget = 'O'; }
            else if (Math.hypot(m.x - pA.x, m.y - pA.y) < 20) { dragging = true; dragTarget = 'A'; }
        }

        function handleMove(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            if (dragTarget === 'O') {
                O.x = m.x; O.y = m.y;
            } else {
                radius = Math.max(10, Math.hypot(m.x - O.x, m.y - O.y));
                angleA = Math.atan2(m.y - O.y, m.x - O.x) * 180 / Math.PI;
            }
            drawCanvas();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove',  handleMove,  { passive: false });
        window.addEventListener('touchend',   () => dragging = false);

        // 主题 & 语言同步
        new MutationObserver(() => { drawCanvas(); updateTexts(); })
            .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                const zh = ev.data.lang === 'zh';
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = zh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = zh ? 'none' : '');
                updateTexts();
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            drawCanvas();
        });

        window.addEventListener('load', () => { updateTexts(); drawCanvas(); });
        updateTexts();
        drawCanvas();
    })();
</script>
</body>
</html>

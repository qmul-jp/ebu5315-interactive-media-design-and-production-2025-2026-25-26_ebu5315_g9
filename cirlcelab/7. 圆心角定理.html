<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆心角定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .circle-card {
            max-width: 860px; width: 100%;
            background: var(--card-bg); border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow: hidden; transition: background 0.3s, border-color 0.3s;
        }
        .card-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); }
        .card-header .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif; font-size: 1.35rem; color: var(--text); }
        .card-header .sub-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        .canvas-container { padding: 28px 28px 16px; display: flex; justify-content: center; background: var(--card-bg); }
        canvas {
            display: block; margin: 0 auto; border-radius: 16px; background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .data-panel {
            margin: 8px 28px 8px; background: var(--hover-bg);
            border-radius: 20px; padding: 16px 20px; transition: background 0.2s;
        }
        .formula-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: baseline; gap: 24px; margin-bottom: 10px;
            padding-bottom: 10px; border-bottom: 1px dashed var(--border); text-align: center;
        }
        .formula-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .metric { font-size: 0.9rem; font-weight: 500; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
        .metric-value {
            font-weight: 600; background: var(--card-bg); padding: 2px 10px;
            border-radius: 24px; color: var(--accent2); font-size: 0.95rem;
        }
        .theorem {
            margin: 8px 28px 28px; background: var(--hover-bg);
            border-left: 4px solid var(--accent2); padding: 16px 20px;
            border-radius: 14px; font-size: 0.9rem; line-height: 1.5;
            color: var(--text); text-align: center; transition: background 0.2s;
        }
        .interact-hint {
            margin: 0 28px 24px; font-size: 0.7rem; color: var(--text-sub);
            display: flex; gap: 18px; justify-content: center;
            border-top: 1px solid var(--border); padding-top: 16px;
        }
        .arc-label { display: inline-block; position: relative; padding-top: 0.3em; }
        .arc-label .arc-symbol {
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%) scaleX(1.3); font-size: 0.75em; line-height: 1;
        }
        
        /* ===== 新增功能：两角相等时显示的图片容器样式（完全独立，不影响任何原有布局）===== */
        .equal-img-wrapper {
            text-align: center;
            margin: 0 28px 18px;          /* 与定理块和交互提示协调，不拥挤 */
            padding: 0;
            transition: all 0.2s ease;
        }
        .equal-img-wrapper img {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 160px;             /* 卡片宽度范围内舒适 */
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            background: var(--card-bg);
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆心角定理</div>
        <div class="title" data-cl-en style="display:none">Central Angle Theorem</div>
        <div class="sub-en" data-cl-zh>同圆中，相等的圆心角所对的弧和弦相等</div>
        <div class="sub-en" data-cl-en style="display:none">Equal central angles subtend equal arcs and chords</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="data-panel" id="dataPanel"></div>
    <div class="theorem" data-cl-zh>📐 在同圆中，相等的圆心角所对的弧相等，所对的弦相等</div>
    <div class="theorem" data-cl-en style="display:none">📐 In the same circle, equal central angles subtend equal arcs and equal chords</div>
    
    <!-- 新增：两角相等时显示图片的容器（默认隐藏，位于定理块下方，交互提示上方） -->
    <div id="equalImageContainer" class="equal-img-wrapper" style="display: none;">
        <img src="相等.png" alt="圆心角相等示意图" id="equalImg">
    </div>
    
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽 A、B、C、D 四点（接近时自动吸附为相等）</span><span data-cl-en style="display:none">Drag A, B, C, D — snaps when angles are nearly equal</span></span>
    </div>
</div>
<script>
(function(){
    function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#e8e4dc':'#1a1a1a'; }
    function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#1c1c1c':'#ffffff'; }
    function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

    const canvas=document.getElementById('circleCanvas'), ctx=canvas.getContext('2d');
    const cx=300, cy=250, R=180;
    let angleA=10, angleB=80, angleC=160, angleD=230;
    let dragging=false, dragTarget=null;

    document.documentElement.style.fontSize = '16px';
    const SNAP=5;

    function d2r(d){return d*Math.PI/180;}
    function pt(deg){return {x:cx+R*Math.cos(d2r(deg)),y:cy+R*Math.sin(d2r(deg))};}
    function smallAngle(a,b){let d=Math.abs(a-b)%360;if(d>180)d=360-d;return d;}
    function dist(p1,p2){return Math.hypot(p1.x-p2.x,p1.y-p2.y);}

    function drawArcBetween(a1,a2,color){
        let diff=((a2-a1)%360+360)%360, anti=diff>180;
        ctx.beginPath(); ctx.arc(cx,cy,R,d2r(a1),d2r(a2),anti);
        ctx.strokeStyle=color; ctx.lineWidth=4; ctx.stroke();
    }

    function update(){
        let ang1=smallAngle(angleA,angleB), ang2=smallAngle(angleC,angleD);
        if(Math.abs(ang1-ang2)<SNAP){
            if(dragTarget==='A'){const s=((angleB-angleA+360)%360)>180?-1:1;angleA=angleB-s*ang2;}
            else if(dragTarget==='B'){const s=((angleB-angleA+360)%360)>180?-1:1;angleB=angleA+s*ang2;}
            else if(dragTarget==='C'){const s=((angleD-angleC+360)%360)>180?-1:1;angleC=angleD-s*ang1;}
            else if(dragTarget==='D'){const s=((angleD-angleC+360)%360)>180?-1:1;angleD=angleC+s*ang1;}
            ang1=smallAngle(angleA,angleB); ang2=smallAngle(angleC,angleD);
        }
        const isEqual=Math.abs(ang1-ang2)<0.5;
        const col1=isEqual?'#27ae60':'#e74c3c', col2=isEqual?'#27ae60':'#3498db';
        const pA=pt(angleA),pB=pt(angleB),pC=pt(angleC),pD=pt(angleD);
        const arc1=R*d2r(ang1), arc2=R*d2r(ang2);
        const chord1=dist(pA,pB), chord2=dist(pC,pD);
        const sym=isEqual?'=':'≠', eqCol=isEqual?'#27ae60':'inherit';
        const isZh=_lang()==='zh';

        document.getElementById('dataPanel').innerHTML=`
            <div class="formula-row">
                <div class="metric">∠AOB = <span class="metric-value">${ang1.toFixed(2)}°</span></div>
                <div class="metric">∠COD = <span class="metric-value">${ang2.toFixed(2)}°</span></div>
                <div class="metric" style="color:${eqCol}">∠AOB ${sym} ∠COD</div>
            </div>
            <div class="formula-row">
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>AB</span> = <span class="metric-value">${arc1.toFixed(2)}</span></div>
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>CD</span> = <span class="metric-value">${arc2.toFixed(2)}</span></div>
                <div class="metric" style="color:${eqCol}"><span class="arc-label"><span class="arc-symbol">⌢</span>AB</span> ${sym} <span class="arc-label"><span class="arc-symbol">⌢</span>CD</span></div>
            </div>
            <div class="formula-row">
                <div class="metric">AB = <span class="metric-value">${chord1.toFixed(2)}</span></div>
                <div class="metric">CD = <span class="metric-value">${chord2.toFixed(2)}</span></div>
                <div class="metric" style="color:${eqCol}">AB ${sym} CD</div>
            </div>`;

        drawCanvas(pA,pB,pC,pD,ang1,ang2,isEqual,col1,col2);
        
        // ========== 新增功能：两角相等时显示图片，否则隐藏（不改变任何原有逻辑和样式）==========
        const imgContainer = document.getElementById('equalImageContainer');
        if (imgContainer) {
            if (isEqual) {
                imgContainer.style.display = 'block';
            } else {
                imgContainer.style.display = 'none';
            }
        }
        // ========== 新增功能结束 ==========
    }

    function drawCanvas(pA,pB,pC,pD,ang1,ang2,isEqual,col1,col2){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=_bg(); ctx.fillRect(0,0,canvas.width,canvas.height);

        const isDark=document.documentElement.getAttribute('data-theme')==='dark';
        ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
        ctx.strokeStyle=isDark?'#555':'#ccc';ctx.lineWidth=1.5;ctx.stroke();

        // 弧
        drawArcBetween(angleA,angleB,col1);
        drawArcBetween(angleC,angleD,col2);

        // 扇形填充
        const fill1=isEqual?'rgba(39,174,96,0.10)':'rgba(231,76,60,0.08)';
        const fill2=isEqual?'rgba(39,174,96,0.10)':'rgba(52,152,219,0.08)';
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,d2r(angleA),d2r(angleB),((angleB-angleA+360)%360)>180);ctx.closePath();
        ctx.fillStyle=fill1;ctx.fill();
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,d2r(angleC),d2r(angleD),((angleD-angleC+360)%360)>180);ctx.closePath();
        ctx.fillStyle=fill2;ctx.fill();

        // 半径
        ctx.lineWidth=1.5;
        [[pA,col1],[pB,col1],[pC,col2],[pD,col2]].forEach(([p,c])=>{
            ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.strokeStyle=c;ctx.stroke();
        });

        // 弦（虚线）
        ctx.setLineDash([6,3]);ctx.lineWidth=1.8;
        ctx.beginPath();ctx.moveTo(pA.x,pA.y);ctx.lineTo(pB.x,pB.y);ctx.strokeStyle=col1;ctx.stroke();
        ctx.beginPath();ctx.moveTo(pC.x,pC.y);ctx.lineTo(pD.x,pD.y);ctx.strokeStyle=col2;ctx.stroke();
        ctx.setLineDash([]);

        // 小弧标注
        const labelR=28;ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(cx,cy,labelR,d2r(angleA),d2r(angleB),((angleB-angleA+360)%360)>180);ctx.strokeStyle=col1;ctx.stroke();
        ctx.beginPath();ctx.arc(cx,cy,labelR,d2r(angleC),d2r(angleD),((angleD-angleC+360)%360)>180);ctx.strokeStyle=col2;ctx.stroke();

        // 圆心
        ctx.beginPath();ctx.arc(cx,cy,4,0,2*Math.PI);ctx.fillStyle=_fg();ctx.fill();
        ctx.font='500 14px "DM Sans",Arial,sans-serif';ctx.fillStyle=_fg();ctx.fillText('O',cx-15,cy-8);

        // 四点
        [{p:pA,l:'A',c:col1},{p:pB,l:'B',c:col1},{p:pC,l:'C',c:col2},{p:pD,l:'D',c:col2}].forEach(({p,l,c})=>{
            ctx.beginPath();ctx.arc(p.x,p.y,6,0,2*Math.PI);ctx.fillStyle=c;ctx.fill();
            ctx.fillStyle=_fg();ctx.fillText(l,p.x+8,p.y-8);
        });
    }

    function getMousePos(e){
        const rect=canvas.getBoundingClientRect();
        return {x:(e.clientX-rect.left)*(600/rect.width),y:(e.clientY-rect.top)*(500/rect.height)};
    }
    canvas.addEventListener('mousedown',e=>{
        const m=getMousePos(e);
        [{a:angleA,l:'A'},{a:angleB,l:'B'},{a:angleC,l:'C'},{a:angleD,l:'D'}].forEach(({a,l})=>{
            const p=pt(a); if(Math.hypot(m.x-p.x,m.y-p.y)<15){dragging=true;dragTarget=l;}
        });
    });
    window.addEventListener('mousemove',e=>{
        if(!dragging) return;
        const m=getMousePos(e), deg=Math.atan2(m.y-cy,m.x-cx)*180/Math.PI;
        if(dragTarget==='A') angleA=deg; else if(dragTarget==='B') angleB=deg;
        else if(dragTarget==='C') angleC=deg; else if(dragTarget==='D') angleD=deg;
        update();
    });
    window.addEventListener('mouseup',()=>{dragging=false;dragTarget=null;});

    const obs=new MutationObserver(()=>update());
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    window.addEventListener('message',ev=>{
        if(!ev.data||ev.data._src!=='circlelab') return;
        if(ev.data.theme) document.documentElement.setAttribute('data-theme',ev.data.theme);
        if(ev.data.lang){
            if(!window._CL) window._CL={};
            window._CL.lang=ev.data.lang;
            const zh=ev.data.lang==='zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el=>el.style.display=zh?'':'none');
            document.querySelectorAll('[data-cl-en]').forEach(el=>el.style.display=zh?'none':'');
        }
        if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
        update();
    });
    window._clRedraw=update;
    window.addEventListener('load',update);
    update();
})();
</script>
</body>
</html>

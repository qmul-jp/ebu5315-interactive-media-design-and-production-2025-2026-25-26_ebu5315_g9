<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垂径定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .circle-card {
            max-width: 860px; width: 100%;
            background: var(--card-bg); border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow: hidden; transition: background 0.3s, border-color 0.3s;
        }
        .card-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); }
        .card-header .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif; font-size: 1.35rem; color: var(--text); }
        .card-header .sub-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        .canvas-container { padding: 28px 28px 16px; display: flex; justify-content: center; background: var(--card-bg); }
        canvas {
            display: block; margin: 0 auto; border-radius: 16px; background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .data-panel {
            margin: 8px 28px 8px; background: var(--hover-bg);
            border-radius: 20px; padding: 16px 20px; transition: background 0.2s;
        }
        .formula-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: baseline; gap: 24px; margin-bottom: 10px;
            padding-bottom: 10px; border-bottom: 1px dashed var(--border); text-align: center;
        }
        .formula-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .metric { font-size: 0.9rem; font-weight: 500; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
        .metric-value {
            font-weight: 600; background: var(--card-bg); padding: 2px 10px;
            border-radius: 24px; color: var(--accent2); font-size: 0.95rem;
        }
        .theorem {
            margin: 8px 28px 28px; background: var(--hover-bg);
            border-left: 4px solid var(--accent2); padding: 16px 20px;
            border-radius: 14px; font-size: 0.9rem; line-height: 1.5;
            color: var(--text); text-align: center; transition: background 0.2s;
        }
        .interact-hint {
            margin: 0 28px 24px; font-size: 0.7rem; color: var(--text-sub);
            display: flex; gap: 18px; justify-content: center;
            border-top: 1px solid var(--border); padding-top: 16px;
        }
        .arc-label { display: inline-block; position: relative; padding-top: 0.3em; }
        .arc-label .arc-symbol {
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%) scaleX(1.3); font-size: 0.75em; line-height: 1;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>垂径定理</div>
        <div class="title" data-cl-en style="display:none">Perpendicular Chord Theorem</div>
        <div class="sub-en" data-cl-zh>垂直于弦的直径平分弦及其所对的弧</div>
        <div class="sub-en" data-cl-en style="display:none">A diameter ⊥ to a chord bisects the chord and its arcs</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="data-panel" id="dataPanel"></div>
    <div class="theorem" data-cl-zh>📐 垂直于弦的直径平分弦，并且平分弦所对的两条弧</div>
    <div class="theorem" data-cl-en style="display:none">📐 A diameter perpendicular to a chord bisects the chord and both arcs it subtends</div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽 A、B 两点改变弦</span><span data-cl-en style="display:none">Drag points A, B to change the chord</span></span>
    </div>
</div>
<script>
(function(){
    function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#e8e4dc':'#1a1a1a'; }
    function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#1c1c1c':'#ffffff'; }
    function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

    const canvas=document.getElementById('circleCanvas'), ctx=canvas.getContext('2d');
    const center={x:300,y:250}, radius=180;
    let angleA=30, angleB=120;
    let dragging=false, dragPoint=null;

    document.documentElement.style.fontSize = '16px';

    function pt(deg){ const r=deg*Math.PI/180; return {x:center.x+radius*Math.cos(r),y:center.y+radius*Math.sin(r)}; }
    function smallAngle(a,b){ let d=Math.abs(a-b)%360; if(d>180)d=360-d; return d; }
    function perpPoints(pA,pB){
        const vAB={x:pB.x-pA.x,y:pB.y-pA.y};
        let perp={x:-vAB.y,y:vAB.x};
        const len=Math.hypot(perp.x,perp.y);
        if(len<1e-9){perp={x:1,y:0};} else {perp.x/=len;perp.y/=len;}
        return {C:{x:center.x+radius*perp.x,y:center.y+radius*perp.y}, D:{x:center.x-radius*perp.x,y:center.y-radius*perp.y}};
    }
    function drawRightAngle(pA,pB,E){
        const vEA={x:pA.x-E.x,y:pA.y-E.y};
        const vEO={x:center.x-E.x,y:center.y-E.y};
        const size=8;
        let perp={x:vEA.y,y:-vEA.x};
        if(perp.x*vEO.x+perp.y*vEO.y<0){perp.x=-perp.x;perp.y=-perp.y;}
        const lenP=Math.hypot(perp.x,perp.y); if(lenP<1e-9) return;
        perp.x/=lenP;perp.y/=lenP;
        const lenEA=Math.hypot(vEA.x,vEA.y); if(lenEA<1e-9) return;
        const dir={x:vEA.x/lenEA,y:vEA.y/lenEA};
        const p1={x:E.x+dir.x*size,y:E.y+dir.y*size};
        const p2={x:E.x+perp.x*size,y:E.y+perp.y*size};
        const p3={x:p1.x+perp.x*size,y:p1.y+perp.y*size};
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p3.x,p3.y);ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle=_fg();ctx.lineWidth=1.5;ctx.stroke();
    }

    function update(){
        const pA=pt(angleA), pB=pt(angleB);
        const E={x:(pA.x+pB.x)/2,y:(pA.y+pB.y)/2};
        const AE=Math.hypot(pA.x-E.x,pA.y-E.y), BE=Math.hypot(pB.x-E.x,pB.y-E.y);
        const {C,D}=perpPoints(pA,pB);
        const aC=(Math.atan2(C.y-center.y,C.x-center.x)*180/Math.PI+360)%360;
        const aD=(Math.atan2(D.y-center.y,D.x-center.x)*180/Math.PI+360)%360;
        const arcAC=radius*(smallAngle(angleA,aC)*Math.PI/180);
        const arcBC=radius*(smallAngle(angleB,aC)*Math.PI/180);
        const arcAD=radius*(smallAngle(angleA,aD)*Math.PI/180);
        const arcBD=radius*(smallAngle(angleB,aD)*Math.PI/180);
        const isZh=_lang()==='zh';

        document.getElementById('dataPanel').innerHTML=`
            <div class="formula-row">
                <div class="metric">AE = <span class="metric-value">${AE.toFixed(2)}</span></div>
                <div class="metric">BE = <span class="metric-value">${BE.toFixed(2)}</span></div>
                <div class="metric" style="color:${Math.abs(AE-BE)<1.5?'#27ae60':'inherit'}">AE ${Math.abs(AE-BE)<1.5?'=':'≠'} BE</div>
            </div>
            <div class="formula-row">
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>AC</span> = <span class="metric-value">${arcAC.toFixed(2)}</span></div>
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>BC</span> = <span class="metric-value">${arcBC.toFixed(2)}</span></div>
                <div class="metric" style="color:${Math.abs(arcAC-arcBC)<1?'#27ae60':'inherit'}"><span class="arc-label"><span class="arc-symbol">⌢</span>AC</span> ${Math.abs(arcAC-arcBC)<1?'=':'≠'} <span class="arc-label"><span class="arc-symbol">⌢</span>BC</span></div>
            </div>
            <div class="formula-row">
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>AD</span> = <span class="metric-value">${arcAD.toFixed(2)}</span></div>
                <div class="metric"><span class="arc-label"><span class="arc-symbol">⌢</span>BD</span> = <span class="metric-value">${arcBD.toFixed(2)}</span></div>
                <div class="metric" style="color:${Math.abs(arcAD-arcBD)<1?'#27ae60':'inherit'}"><span class="arc-label"><span class="arc-symbol">⌢</span>AD</span> ${Math.abs(arcAD-arcBD)<1?'=':'≠'} <span class="arc-label"><span class="arc-symbol">⌢</span>BD</span></div>
            </div>`;

        drawCanvas(pA,pB,E,C,D);
    }

    function drawCanvas(pA,pB,E,C,D){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=_bg();ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.beginPath();ctx.arc(center.x,center.y,radius,0,2*Math.PI);
        ctx.strokeStyle=_fg();ctx.lineWidth=1.8;ctx.stroke();

        ctx.beginPath();ctx.moveTo(C.x,C.y);ctx.lineTo(D.x,D.y);
        ctx.strokeStyle='#888';ctx.lineWidth=1.2;ctx.setLineDash([5,3]);ctx.stroke();ctx.setLineDash([]);

        ctx.beginPath();ctx.moveTo(pA.x,pA.y);ctx.lineTo(pB.x,pB.y);
        ctx.strokeStyle=_fg();ctx.lineWidth=1.8;ctx.stroke();

        ctx.beginPath();ctx.moveTo(center.x,center.y);ctx.lineTo(E.x,E.y);
        ctx.strokeStyle='#aaa';ctx.lineWidth=1.2;ctx.setLineDash([4,2]);ctx.stroke();ctx.setLineDash([]);
        drawRightAngle(pA,pB,E);

        ctx.beginPath();ctx.arc(center.x,center.y,4,0,2*Math.PI);ctx.fillStyle=_fg();ctx.fill();
        ctx.font='500 14px "DM Sans",Arial,sans-serif';ctx.fillStyle=_fg();
        ctx.fillText('O',center.x-15,center.y-10);

        [[pA,'A','#e74c3c'],[pB,'B','#3498db'],[C,'C','#27ae60'],[D,'D','#9b59b6']].forEach(([p,l,c])=>{
            ctx.beginPath();ctx.arc(p.x,p.y,6,0,2*Math.PI);ctx.fillStyle=c;ctx.fill();
            ctx.fillStyle=_fg();ctx.fillText(l,p.x+8,p.y-8);
        });
        ctx.beginPath();ctx.arc(E.x,E.y,5,0,2*Math.PI);ctx.fillStyle='#f39c12';ctx.fill();
        ctx.fillStyle=_fg();ctx.fillText('E',E.x+8,E.y-8);
    }

    function getMousePos(e){
        const rect=canvas.getBoundingClientRect();
        return {x:(e.clientX-rect.left)*(600/rect.width),y:(e.clientY-rect.top)*(500/rect.height)};
    }
    canvas.addEventListener('mousedown',e=>{
        const m=getMousePos(e);
        if(Math.hypot(m.x-pt(angleA).x,m.y-pt(angleA).y)<15){dragging=true;dragPoint='A';}
        else if(Math.hypot(m.x-pt(angleB).x,m.y-pt(angleB).y)<15){dragging=true;dragPoint='B';}
    });
    window.addEventListener('mousemove',e=>{
        if(!dragging) return;
        const m=getMousePos(e);
        const deg=Math.atan2(m.y-center.y,m.x-center.x)*180/Math.PI;
        if(dragPoint==='A') angleA=deg; else if(dragPoint==='B') angleB=deg;
        update();
    });
    window.addEventListener('mouseup',()=>{dragging=false;dragPoint=null;});

    const obs=new MutationObserver(()=>update());
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});

    window.addEventListener('message',ev=>{
        if(!ev.data||ev.data._src!=='circlelab') return;
        if(ev.data.theme) document.documentElement.setAttribute('data-theme',ev.data.theme);
        if(ev.data.lang){
            if(!window._CL) window._CL={};
            window._CL.lang=ev.data.lang;
            const zh=ev.data.lang==='zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el=>el.style.display=zh?'':'none');
            document.querySelectorAll('[data-cl-en]').forEach(el=>el.style.display=zh?'none':'');
        }
        if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
        update();
    });
    window._clRedraw=update;
    window.addEventListener('load',update);
    update();
})();
</script>
</body>
</html>

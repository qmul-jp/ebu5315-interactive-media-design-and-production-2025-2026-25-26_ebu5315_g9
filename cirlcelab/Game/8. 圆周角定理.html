<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆周角定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .circle-card {
            max-width: 860px; width: 100%;
            background: var(--card-bg); border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow: hidden; transition: background 0.3s, border-color 0.3s;
        }
        .card-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); }
        .card-header .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif; font-size: 1.35rem; color: var(--text); }
        .card-header .sub-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        .canvas-container { padding: 28px 28px 16px; display: flex; justify-content: center; background: var(--card-bg); }
        canvas {
            display: block; margin: 0 auto; border-radius: 16px; background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .data-panel {
            margin: 8px 28px 8px; background: var(--hover-bg);
            border-radius: 20px; padding: 16px 20px; transition: background 0.2s;
        }
        .formula-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: baseline; gap: 24px; margin-bottom: 10px;
            padding-bottom: 10px; border-bottom: 1px dashed var(--border); text-align: center;
        }
        .formula-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .metric { font-size: 0.9rem; font-weight: 500; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
        .metric-value {
            font-weight: 600; background: var(--card-bg); padding: 2px 10px;
            border-radius: 24px; color: var(--accent2); font-size: 0.95rem;
        }
        .theorem {
            margin: 8px 28px 28px; background: var(--hover-bg);
            border-left: 4px solid var(--accent2); padding: 16px 20px;
            border-radius: 14px; font-size: 0.9rem; line-height: 1.5;
            color: var(--text); text-align: center; transition: background 0.2s;
        }
        .interact-hint {
            margin: 0 28px 24px; font-size: 0.7rem; color: var(--text-sub);
            display: flex; gap: 18px; justify-content: center;
            border-top: 1px solid var(--border); padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆周角定理</div>
        <div class="title" data-cl-en style="display:none">Inscribed Angle Theorem</div>
        <div class="sub-en" data-cl-zh>圆周角 = ½ 圆心角</div>
        <div class="sub-en" data-cl-en style="display:none">Inscribed angle = ½ central angle</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="data-panel" id="dataPanel"></div>
    <div class="theorem" data-cl-zh>📐 同弧所对的圆周角等于圆心角的一半；同弧或等弧所对的圆周角相等</div>
    <div class="theorem" data-cl-en style="display:none">📐 An inscribed angle is half the central angle subtending the same arc; inscribed angles on the same arc are equal</div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽 A、B、C 三点（C 须在优弧上）</span><span data-cl-en style="display:none">Drag A, B, C — C must be on the major arc</span></span>
    </div>
</div>
<script>
(function(){
    function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#e8e4dc':'#1a1a1a'; }
    function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#1c1c1c':'#ffffff'; }
    function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

    const CX=300,CY=250,R=180;
    let angleA=30,angleB=120,angleC=200;
    const canvas=document.getElementById('circleCanvas'),ctx=canvas.getContext('2d');
    let isDragging=false,draggedPoint=null;
    document.documentElement.style.fontSize = '16px';

    function pt(deg){const r=deg*Math.PI/180;return{x:CX+R*Math.cos(r),y:CY+R*Math.sin(r)};}
    function centralAngle(d1,d2){let d=Math.abs(d1-d2)%360;if(d>180)d=360-d;return d;}
    function circumAngle(dA,dC,dB){
        const pA=pt(dA),pC=pt(dC),pB=pt(dB);
        const v1={x:pA.x-pC.x,y:pA.y-pC.y},v2={x:pB.x-pC.x,y:pB.y-pC.y};
        const dot=v1.x*v2.x+v1.y*v2.y;
        const mag=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
        if(!mag) return 0;
        return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
    }
    function arcType(dA,dB,dC){
        let a=((dA%360)+360)%360,b=((dB%360)+360)%360,c=((dC%360)+360)%360;
        let abCCW=(b-a+360)%360,acCCW=(c-a+360)%360;
        if(abCCW<180) return (acCCW>0.1&&acCCW<abCCW-0.1)?'minor':'major';
        return (acCCW>0.1&&acCCW<abCCW-0.1)?'major':'minor';
    }

    function update(){
        const aob=centralAngle(angleA,angleB);
        const acb=circumAngle(angleA,angleC,angleB);
        const ratio=aob/acb;
        const arc=arcType(angleA,angleB,angleC);
        const isZh=_lang()==='zh';
        const isLinear=Math.abs(aob-180)<0.5;
        let msg;
        if(isLinear&&Math.abs(acb-90)<0.5) msg=isZh?'✅ 直径所对的圆周角是直角':'✅ Inscribed angle on diameter = 90°';
        else if(arc==='major') msg=isZh?`✅ C 在优弧上，∠AOB = 2·∠ACB`:`✅ C on major arc — ∠AOB = 2·∠ACB`;
        else msg=isZh?'⚠️ C 在劣弧上，定理不适用':'⚠️ C on minor arc — theorem does not apply';

        document.getElementById('dataPanel').innerHTML=`
            <div class="formula-row">
                <div class="metric">∠AOB = <span class="metric-value">${aob.toFixed(2)}°</span></div>
                <div class="metric">∠ACB = <span class="metric-value">${acb.toFixed(2)}°</span></div>
                <div class="metric">∠AOB / ∠ACB = <span class="metric-value">${isFinite(ratio)?ratio.toFixed(3):'—'}</span></div>
            </div>
            <div class="formula-row">
                <div class="metric" style="font-size:0.9rem">${msg}</div>
            </div>`;

        drawCanvas();
    }

    function drawCanvas(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=_bg();ctx.fillRect(0,0,canvas.width,canvas.height);
        const isDark=document.documentElement.getAttribute('data-theme')==='dark';
        const pA=pt(angleA),pB=pt(angleB),pC=pt(angleC);

        ctx.beginPath();ctx.arc(CX,CY,R,0,2*Math.PI);
        ctx.strokeStyle=_fg();ctx.lineWidth=1.8;ctx.stroke();

        ctx.setLineDash([4,2]);ctx.strokeStyle=isDark?'#555':'#bbb';ctx.lineWidth=1.5;
        [[pA,pB],[pA,pC],[pB,pC]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();});
        ctx.setLineDash([]);

        ctx.strokeStyle=isDark?'#444':'#ddd';ctx.lineWidth=1.5;
        [pA,pB].forEach(p=>{ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(p.x,p.y);ctx.stroke();});

        ctx.beginPath();ctx.arc(CX,CY,4,0,2*Math.PI);ctx.fillStyle=_fg();ctx.fill();
        ctx.font='500 14px "DM Sans",Arial,sans-serif';ctx.fillStyle=_fg();ctx.fillText('O',CX-15,CY-10);

        [[pA,'A','#e74c3c'],[pB,'B','#3498db'],[pC,'C','#27ae60']].forEach(([p,l,c])=>{
            ctx.beginPath();ctx.arc(p.x,p.y,6,0,2*Math.PI);ctx.fillStyle=c;ctx.fill();
            ctx.fillStyle=_fg();ctx.fillText(l,p.x+8,p.y-8);
        });
    }

    function getMousePos(e){
        const rect=canvas.getBoundingClientRect();
        const cx2=e.touches?e.touches[0].clientX:e.clientX,cy2=e.touches?e.touches[0].clientY:e.clientY;
        return {x:(cx2-rect.left)*(600/rect.width),y:(cy2-rect.top)*(500/rect.height)};
    }
    function handleStart(e){
        const m=getMousePos(e);
        [[angleA,'A'],[angleB,'B'],[angleC,'C']].forEach(([a,l])=>{
            const p=pt(a);if(Math.hypot(m.x-p.x,m.y-p.y)<18){isDragging=true;draggedPoint=l;}
        });
    }
    function handleMove(e){
        if(!isDragging) return;
        const m=getMousePos(e),deg=Math.atan2(m.y-CY,m.x-CX)*180/Math.PI;
        if(draggedPoint==='A') angleA=deg; else if(draggedPoint==='B') angleB=deg; else if(draggedPoint==='C') angleC=deg;
        update();
    }
    canvas.addEventListener('mousedown',handleStart);
    window.addEventListener('mousemove',handleMove);
    window.addEventListener('mouseup',()=>{isDragging=false;draggedPoint=null;});
    canvas.addEventListener('touchstart',e=>{e.preventDefault();handleStart(e);},{passive:false});
    window.addEventListener('touchmove',e=>{handleMove(e);},{passive:false});
    window.addEventListener('touchend',()=>{isDragging=false;draggedPoint=null;});

    const obs=new MutationObserver(()=>update());
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
    window.addEventListener('message',ev=>{
        if(!ev.data||ev.data._src!=='circlelab') return;
        if(ev.data.theme) document.documentElement.setAttribute('data-theme',ev.data.theme);
        if(ev.data.lang){
            if(!window._CL) window._CL={};
            window._CL.lang=ev.data.lang;
            const zh=ev.data.lang==='zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el=>el.style.display=zh?'':'none');
            document.querySelectorAll('[data-cl-en]').forEach(el=>el.style.display=zh?'none':'');
        }
        if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
        update();
    });
    window._clRedraw=update;
    window.addEventListener('load',update);
    update();
})();
</script>
</body>
</html>

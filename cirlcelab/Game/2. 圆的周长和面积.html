<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆的周长和面积 - CircleLab</title>
    <!-- 统一字体，与 index 一致 -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 完全采用 index 中的全局主题变量系统，保持视觉一致 */
        :root {
            --bg:        #f7f5f0;
            --card-bg:   #ffffff;
            --text:      #1a1a1a;
            --text-sub:  #888;
            --accent:    #1a1a1a;
            --accent2:   #c8502a;
            --border:    #e8e4dc;
            --hover-bg:  #f0ede6;
            --active-bg: #1a1a1a;
            --active-text:#ffffff;
            --shadow:    0 1px 12px rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg:        #141414;
            --card-bg:   #1c1c1c;
            --text:      #e8e4dc;
            --text-sub:  #666;
            --accent:    #e8e4dc;
            --accent2:   #e8724a;
            --border:    #2a2a2a;
            --hover-bg:  #242424;
            --active-bg: #e8e4dc;
            --active-text:#141414;
            --shadow:    0 1px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片样式，与 index 侧边栏内容区统一 */
        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        /* 头部区域：类似 content-header */
        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
        }
        .card-header .title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 400;
        }

        /* canvas 容器 */
        .canvas-container {
            padding: 24px 28px 12px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        /* 数据面板 - 优雅的公式展示区 */
        .data-panel {
            margin: 8px 28px 20px;
            background: var(--hover-bg);
            border-radius: 20px;
            padding: 18px 20px;
            transition: background 0.2s;
        }
        .formula-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border);
        }
        .formula-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .metric {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .metric-value {
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            background: var(--card-bg);
            padding: 2px 10px;
            border-radius: 24px;
            color: var(--accent2);
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .formula {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent2);
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .theorem-block {
            margin-top: 10px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .theorem-badge {
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 40px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }
        sup {
            font-size: 0.7rem;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .badge-red {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e74c3c;
            margin-right: 4px;
        }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .data-panel { margin: 8px 20px 20px; }
            .canvas-container { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆的周长和面积</div>
        <div class="title" data-cl-en style="display:none">Circumference & Area of a Circle</div>
        <div class="sub-en" data-cl-zh>周长 · 面积 · 圆周率π的探索</div>
        <div class="sub-en" data-cl-en style="display:none">Perimeter · Area · Exploring π</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>

    <!-- 动态数据面板 -->
    <div class="data-panel" id="dataPanel">
        <!-- 动态内容由js生成，保证双语数值同步 -->
    </div>

    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽红色点 A 改变半径</span><span data-cl-en style="display:none">Drag red point A to change radius</span></span>
        <span>📐 <span data-cl-zh>观察周长/半径 → 2π &nbsp;&nbsp; 面积/半径² → π</span><span data-cl-en style="display:none">Observe C/r → 2π &nbsp;&nbsp; A/r² → π</span></span>
    </div>
</div>

<script>
    (function(){
        // 获取画布与上下文
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        
        // 主题辅助函数
        function getThemeFg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#e8e4dc' : '#1a1a1a';
        }
        function getThemeBg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#1c1c1c' : '#ffffff';
        }
        
        // 几何状态：圆心固定画布中央，A点决定半径
        const O = { x: 300, y: 250 };
        let angleA = -30;      // 度
        let radius = 150;      // 像素半径
        
        // 拖拽状态
        let dragging = false;
        
        // 获取A点坐标
        function getA() {
            const rad = angleA * Math.PI / 180;
            return {
                x: O.x + radius * Math.cos(rad),
                y: O.y + radius * Math.sin(rad)
            };
        }
        
        // 更新所有数据展示 (双语 + 数值)
        function updateDataDisplay() {
            const isZh = (window._CL && window._CL.lang === 'zh') || 
                        (!window._CL && document.querySelector('[data-cl-zh]')?.style.display !== 'none');
            const r = radius;
            const C = 2 * Math.PI * r;
            const S = Math.PI * r * r;
            const ratioC = C / r;       // = 2π ≈ 6.283185
            const ratioA = S / (r * r); // = π ≈ 3.141593
            
            const panel = document.getElementById('dataPanel');
            if (!panel) return;
            
            if (isZh) {
                panel.innerHTML = `
                    <div class="formula-row">
                        <div class="metric">📏 半径 r = <span class="metric-value">${r.toFixed(2)}</span> 像素</div>
                        <div class="metric">🟠 周长 C = <span class="metric-value">${C.toFixed(2)}</span></div>
                        <div class="formula">C = 2πr</div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">🧮 周长 / 半径 = <span class="metric-value">${ratioC.toFixed(6)}</span></div>
                        <div class="metric">≈ 2π = <span class="metric-value">${(2*Math.PI).toFixed(6)}</span></div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">📐 半径 r = <span class="metric-value">${r.toFixed(2)}</span> 像素</div>
                        <div class="metric">🟢 面积 S = <span class="metric-value">${S.toFixed(2)}</span></div>
                        <div class="formula">S = πr²</div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">🧮 面积 / 半径² = <span class="metric-value">${ratioA.toFixed(6)}</span></div>
                        <div class="metric">≈ π = <span class="metric-value">${Math.PI.toFixed(6)}</span></div>
                    </div>
                    <div class="theorem-block">
                        <div class="theorem-badge">C = 2πr</div>
                        <div class="theorem-badge">S = πr²</div>
                    </div>
                `;
            } else {
                panel.innerHTML = `
                    <div class="formula-row">
                        <div class="metric">📏 Radius r = <span class="metric-value">${r.toFixed(2)}</span> px</div>
                        <div class="metric">🟠 Circumference C = <span class="metric-value">${C.toFixed(2)}</span></div>
                        <div class="formula">C = 2πr</div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">🧮 C / r = <span class="metric-value">${ratioC.toFixed(6)}</span></div>
                        <div class="metric">≈ 2π = <span class="metric-value">${(2*Math.PI).toFixed(6)}</span></div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">📐 Radius r = <span class="metric-value">${r.toFixed(2)}</span> px</div>
                        <div class="metric">🟢 Area S = <span class="metric-value">${S.toFixed(2)}</span></div>
                        <div class="formula">S = πr²</div>
                    </div>
                    <div class="formula-row">
                        <div class="metric">🧮 S / r² = <span class="metric-value">${ratioA.toFixed(6)}</span></div>
                        <div class="metric">≈ π = <span class="metric-value">${Math.PI.toFixed(6)}</span></div>
                    </div>
                    <div class="theorem-block">
                        <div class="theorem-badge">C = 2πr</div>
                        <div class="theorem-badge">S = πr²</div>
                    </div>
                `;
            }
        }
        
        // 绘制canvas (完全适配主题)
        function drawCanvas() {
            const bgColor = getThemeBg();
            const fgColor = getThemeFg();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const pA = getA();
            
            // 画圆
            ctx.beginPath();
            ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = fgColor;
            ctx.lineWidth = 1.8;
            ctx.stroke();
            
            // 画半径 OA (强调色)
            ctx.beginPath();
            ctx.moveTo(O.x, O.y);
            ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8724a' : '#c8502a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 画圆心 O
            ctx.beginPath();
            ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = fgColor;
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.font = '500 14px "DM Sans", sans-serif';
            ctx.fillText('O', O.x - 16, O.y - 8);
            
            // 画点 A (红色拖拽点)
            ctx.beginPath();
            ctx.arc(pA.x, pA.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.font = '500 14px "DM Sans", sans-serif';
            ctx.fillText('A', pA.x + 10, pA.y - 8);
            
            // 可选：辅助半径数值标注
            ctx.font = '10px "DM Sans"';
            ctx.fillStyle = getThemeFg();
        }
        
        function fullUpdate() {
            drawCanvas();
            updateDataDisplay();
        }
        
        // 鼠标/触摸交互
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        function handleMouseDown(e) {
            e.preventDefault();
            const m = getMousePos(e);
            const pA = getA();
            const distA = Math.hypot(m.x - pA.x, m.y - pA.y);
            if (distA < 18) {
                dragging = true;
            }
        }
        
        function handleMouseMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const m = getMousePos(e);
            const dx = m.x - O.x;
            const dy = m.y - O.y;
            const r = Math.hypot(dx, dy);
            if (r > 12) {
                radius = r;
                angleA = Math.atan2(dy, dx) * 180 / Math.PI;
            } else if (r > 0.1) {
                radius = 12;
                angleA = Math.atan2(dy, dx) * 180 / Math.PI;
            }
            fullUpdate();
        }
        
        function handleMouseUp(e) {
            dragging = false;
        }
        
        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchstart', handleMouseDown, { passive: false });
        window.addEventListener('touchmove', handleMouseMove, { passive: false });
        window.addEventListener('touchend', handleMouseUp);
        canvas.addEventListener('mouseleave', () => { dragging = false; });
        
        // --- 与父级桥接：语言/主题同步 ---
        window._CL = window._CL || { lang: 'zh', theme: 'light' };
        
        function applyLang(lang) {
            window._CL.lang = lang;
            // 切换 data-cl 块的显隐
            document.querySelectorAll('[data-cl-zh]').forEach(el => {
                el.style.display = lang === 'zh' ? '' : 'none';
            });
            document.querySelectorAll('[data-cl-en]').forEach(el => {
                el.style.display = lang === 'en' ? '' : 'none';
            });
            // 更新数据面板内容（文字彻底改变）
            updateDataDisplay();
            fullUpdate(); // 保证canvas重绘文本颜色
        }
        
        function applyTheme(theme) {
            window._CL.theme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            fullUpdate();
        }
        
        // 接收父窗口消息
        window.addEventListener('message', function(ev) {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.lang !== undefined) applyLang(ev.data.lang);
            if (ev.data.theme !== undefined) applyTheme(ev.data.theme);
        });
        
        // 初始化同步父页面状态
        function syncParentState() {
            try {
                const parentWin = window.parent;
                if (parentWin && parentWin._CL_lang) applyLang(parentWin._CL_lang);
                if (parentWin && parentWin._CL_theme) applyTheme(parentWin._CL_theme);
            } catch(e) { /* 跨域忽略 */ }
            const htmlTheme = document.documentElement.getAttribute('data-theme');
            if (htmlTheme && !window._CL.theme) applyTheme(htmlTheme);
            if (!window._CL.lang) applyLang('zh');
            fullUpdate();
        }
        
        // 监听data-theme属性变化以重绘
        const observer = new MutationObserver((mutations) => {
            for (let m of mutations) {
                if (m.attributeName === 'data-theme') {
                    fullUpdate();
                    break;
                }
            }
        });
        observer.observe(document.documentElement, { attributes: true });
        
        window.addEventListener('DOMContentLoaded', () => {
            syncParentState();
            fullUpdate();
        });
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => fullUpdate());
        } else {
            fullUpdate();
            syncParentState();
        }
        
        window._clRedraw = function() { fullUpdate(); };
        
        // 当半径变化时，额外更新一次以确保数据显示准确
        // 手动初始调用
        fullUpdate();
    })();
</script>

<!-- 附加后备语言同步 -->
<script>
    (function secondaryLangSync(){
        function refreshFromGlobal(){
            if(window._CL && window._CL.lang){
                const isZh = window._CL.lang === 'zh';
                document.querySelectorAll('[data-cl-zh]').forEach(el => {
                    el.style.display = isZh ? '' : 'none';
                });
                document.querySelectorAll('[data-cl-en]').forEach(el => {
                    el.style.display = isZh ? 'none' : '';
                });
                if(typeof window._clRedraw === 'function') window._clRedraw();
            }
        }
        setTimeout(refreshFromGlobal, 30);
        window.addEventListener('load', refreshFromGlobal);
    })();
</script>
</body>
</html>

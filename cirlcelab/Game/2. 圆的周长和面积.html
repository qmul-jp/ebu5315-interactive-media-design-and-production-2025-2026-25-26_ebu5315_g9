<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆的周长和面积 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
    /* 覆盖 game.css 中的部分数值，以保持与原页面完全一致 */
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px 24px 28px;
        margin: 0;
    }
    .circle-card {
        max-width: 860px;   /* 原页面稍宽 */
    }
    .canvas-container {
        padding: 24px 28px 12px;  /* 原页面特有内边距 */
    }
    /* 数据面板（game.css 中没有，必须保留） */
    .data-panel {
        margin: 8px 28px 20px;
        background: var(--hover-bg);
        border-radius: 20px;
        padding: 18px 20px;
        transition: background 0.2s;
    }
    .formula-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: baseline;
        gap: 24px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px dashed var(--border);
        text-align: center;
    }
    .formula-row:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
    }
    .metric {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text);
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
    }
    .metric-value {
        font-family: 'Noto Sans SC', 'Manrope', Arial, "Microsoft YaHei", sans-serif;
        font-weight: 600;
        background: var(--card-bg);
        padding: 2px 10px;
        border-radius: 24px;
        color: var(--accent2);
        font-size: 0.95rem;
        letter-spacing: 0.3px;
    }
    .theorem-block {
        margin-top: 10px;
        text-align: center;
        font-weight: 500;
        font-size: 0.9rem;
        color: var(--text);
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }
    .theorem-badge {
        background: var(--card-bg);
        padding: 6px 16px;
        border-radius: 40px;
        font-family: 'Noto Sans SC', 'Manrope', Arial, sans-serif;
        font-weight: 600;
        font-size: 0.85rem;
        border: 1px solid var(--border);
    }
    /* 响应式微调（与原页面一致） */
    @media (max-width: 700px) {
        .data-panel { margin: 8px 20px 20px; }
        .canvas-container { padding: 20px; }
        .formula-row { gap: 12px; }
    }
</style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆的周长和面积</div>
        <div class="title" data-cl-en style="display:none">Circumference & Area of a Circle</div>
        <div class="sub-en" data-cl-zh>周长 · 面积 · 圆周率π的探索</div>
        <div class="sub-en" data-cl-en style="display:none">Perimeter · Area · Exploring π</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>

    <div class="data-panel" id="dataPanel"></div>

    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽红色点 A 改变半径</span><span data-cl-en style="display:none">Drag red point A to change radius</span></span>
        <span>📐 <span data-cl-zh>观察周长/半径 → 2π &nbsp;&nbsp; 面积/半径² → π</span><span data-cl-en style="display:none">Observe C/r → 2π &nbsp;&nbsp; A/r² → π</span></span>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        
        function getThemeFg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#e8e4dc' : '#1a1a1a';
        }
        function getThemeBg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark
                ? getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#181F23'
                : '#ffffff';
        }
        
        const O = { x: 300, y: 250 };
        let angleA = -30;
        let radius = 150;
        let dragging = false;
        
        document.documentElement.style.fontSize = '16px';

        function getA() {
            const rad = angleA * Math.PI / 180;
            return {
                x: O.x + radius * Math.cos(rad),
                y: O.y + radius * Math.sin(rad)
            };
        }
        
        function updateDataDisplay() {
            const isZh = (window._CL && window._CL.lang === 'zh') || 
                        (!window._CL && document.querySelector('[data-cl-zh]')?.style.display !== 'none');
            const r = radius;
            const C = 2 * Math.PI * r;
            const S = Math.PI * r * r;
            const ratioC = C / r;
            const ratioA = S / (r * r);
            
            const panel = document.getElementById('dataPanel');
            if (!panel) return;
            
            const content = isZh ? {
                r: '半径 r', c: '周长 C', s: '面积 S', px: '像素', approx: '≈'
            } : {
                r: 'Radius r', c: 'Circumference C', s: 'Area S', px: 'px', approx: '≈'
            };

            panel.innerHTML = `
                <div class="formula-row">
                    <div class="metric">📏 ${content.r} = <span class="metric-value">${r.toFixed(2)}</span> ${content.px}</div>
                    <div class="metric">🟠 ${content.c} = <span class="metric-value">${C.toFixed(2)}</span></div>
                </div>
                <div class="formula-row">
                    <div class="metric">🧮 ${isZh ? '周长 / 半径' : 'C / r'} = <span class="metric-value">${ratioC.toFixed(6)}</span></div>
                    <div class="metric">${content.approx} 2π = <span class="metric-value">${(2*Math.PI).toFixed(6)}</span></div>
                </div>
                <div class="formula-row">
                    <div class="metric">📐 ${content.r} = <span class="metric-value">${r.toFixed(2)}</span> ${content.px}</div>
                    <div class="metric">🟢 ${content.s} = <span class="metric-value">${S.toFixed(2)}</span></div>
                </div>
                <div class="formula-row">
                    <div class="metric">🧮 ${isZh ? '面积 / 半径²' : 'S / r²'} = <span class="metric-value">${ratioA.toFixed(6)}</span></div>
                    <div class="metric">${content.approx} π = <span class="metric-value">${Math.PI.toFixed(6)}</span></div>
                </div>
                <div class="theorem-block">
                    <div class="theorem-badge">C = 2πr</div>
                    <div class="theorem-badge">S = πr²</div>
                </div>
            `;
        }
        
        function drawCanvas() {
            const bgColor = getThemeBg();
            const fgColor = getThemeFg();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const pA = getA();
            
            ctx.beginPath();
            ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = fgColor;
            ctx.lineWidth = 1.8;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(O.x, O.y);
            ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8724a' : '#c8502a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = fgColor;
            ctx.fill();
            ctx.font = '500 14px "Noto Sans SC", "Manrope", Arial, sans-serif';
            ctx.fillText('O', O.x - 16, O.y - 8);
            
            ctx.beginPath();
            ctx.arc(pA.x, pA.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.fillText('A', pA.x + 10, pA.y - 8);
        }
        
        function fullUpdate() {
            drawCanvas();
            updateDataDisplay();
        }
        
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }
        
        function handleMouseDown(e) {
            if(e.type === 'touchstart') e.preventDefault();
            const m = getMousePos(e);
            const pA = getA();
            if (Math.hypot(m.x - pA.x, m.y - pA.y) < 20) dragging = true;
        }
        
        function handleMouseMove(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            const dx = m.x - O.x, dy = m.y - O.y;
            radius = Math.max(12, Math.hypot(dx, dy));
            angleA = Math.atan2(dy, dx) * 180 / Math.PI;
            fullUpdate();
        }
        
        function handleMouseUp() { dragging = false; }
        
        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchstart', handleMouseDown, { passive: false });
        window.addEventListener('touchmove', handleMouseMove, { passive: false });
        window.addEventListener('touchend', handleMouseUp);
        
        window.addEventListener('message', function(ev) {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.lang !== undefined) applyLang(ev.data.lang);
            if (ev.data.theme !== undefined) applyTheme(ev.data.theme);
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
        });

        function applyLang(lang) {
            if(!window._CL) window._CL = {};
            window._CL.lang = lang;
            document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = lang === 'zh' ? '' : 'none');
            document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = lang === 'en' ? '' : 'none');
            fullUpdate();
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            fullUpdate();
        }

        const observer = new MutationObserver(() => fullUpdate());
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        
        window.addEventListener('load', () => fullUpdate());
        fullUpdate();
        let mascotDragReported = false;
        let mascotPointerDown = false;
        let mascotStartPoint = null;
        function getMascotPoint(event) {
            if (event.touches && event.touches[0]) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            if (event.changedTouches && event.changedTouches[0]) {
                return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        }
        function reportMascotDrag() {
            if (mascotDragReported) return;
            mascotDragReported = true;
            try {
                window.parent.postMessage({ _src: 'circlelab', mascotDrag: true }, '*');
            } catch (e) {}
        }
        function handleMascotDragStart(event) {
            mascotPointerDown = true;
            mascotStartPoint = getMascotPoint(event);
        }
        function handleMascotDragMove(event) {
            if (!mascotPointerDown || mascotDragReported || !mascotStartPoint) return;
            const currentPoint = getMascotPoint(event);
            if (Math.hypot(currentPoint.x - mascotStartPoint.x, currentPoint.y - mascotStartPoint.y) < 6) return;
            reportMascotDrag();
        }
        function handleMascotDragEnd() {
            mascotPointerDown = false;
            mascotStartPoint = null;
        }

        canvas.addEventListener('mousedown', handleMascotDragStart);
        canvas.addEventListener('touchstart', handleMascotDragStart, { passive: true });
        window.addEventListener('mousemove', handleMascotDragMove);
        window.addEventListener('touchmove', handleMascotDragMove, { passive: true });
        window.addEventListener('mouseup', handleMascotDragEnd);
        window.addEventListener('touchend', handleMascotDragEnd);
        window.addEventListener('touchcancel', handleMascotDragEnd);
        window.addEventListener('blur', handleMascotDragEnd);
    })();
</script>
</body>
</html>

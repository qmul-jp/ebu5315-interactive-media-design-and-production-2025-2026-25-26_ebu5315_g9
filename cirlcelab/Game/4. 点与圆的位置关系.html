<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点与圆的位置关系 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        /* ===== 以下为原有样式（完全没有改动任何原有规则）===== */
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .circle-card {
            max-width: 860px; width: 100%;
            background: var(--card-bg); border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow: hidden; transition: background 0.3s, border-color 0.3s;
        }
        .card-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); }
        .card-header .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif; font-size: 1.35rem; color: var(--text); }
        .card-header .sub-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        .canvas-container { padding: 28px 28px 16px; display: flex; justify-content: center; background: var(--card-bg); }
        canvas {
            display: block; margin: 0 auto; border-radius: 16px; background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .data-panel {
            margin: 8px 28px 20px; background: var(--hover-bg);
            border-radius: 20px; padding: 18px 20px; transition: background 0.2s;
        }
        .formula-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: baseline; gap: 24px; margin-bottom: 12px;
            padding-bottom: 12px; border-bottom: 1px dashed var(--border); text-align: center;
        }
        .formula-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .metric { font-size: 0.9rem; font-weight: 500; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
        .metric-value {
            font-weight: 600; background: var(--card-bg); padding: 2px 10px;
            border-radius: 24px; color: var(--accent2); font-size: 0.95rem;
        }
        .conclusion-badge {
            display: inline-block; padding: 8px 20px; border-radius: 40px;
            font-size: 0.9rem; font-weight: 600; border: 2px solid currentColor;
        }
        .outside { color: #e67e22; }
        .on      { color: #27ae60; }
        .inside  { color: #2980b9; }
        .interact-hint {
            margin: 0 28px 24px; font-size: 0.7rem; color: var(--text-sub);
            display: flex; gap: 18px; justify-content: center;
            border-top: 1px solid var(--border); padding-top: 16px;
        }
        
        /* ===== 新增功能：点在圆上时显示的图片容器样式（完全独立，不影响任何原有布局）===== */
        .oncircle-img-wrapper {
            text-align: center;
            margin: 0 28px 18px;          /* 与交互提示区域边距协调，不干扰原有间距 */
            padding: 0;
            transition: all 0.2s ease;
        }
        .oncircle-img-wrapper img {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 160px;             /* 卡片宽度范围内舒适，不拥挤 */
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            background: var(--card-bg);
            display: block;
            margin: 0 auto;
        }
        /* 保证暗色主题下图片容器边界自然，无额外改动 */
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>点与圆的位置关系</div>
        <div class="title" data-cl-en style="display:none">Point–Circle Relationship</div>
        <div class="sub-en" data-cl-zh>圆外 · 圆上 · 圆内</div>
        <div class="sub-en" data-cl-en style="display:none">Outside · On · Inside</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="data-panel" id="dataPanel"></div>
    
    <!-- 新增：点在圆上时显示图片的容器（默认隐藏，卡片最下方，交互提示之上） -->
    <div id="onCircleImageContainer" class="oncircle-img-wrapper" style="display: none;">
        <img src="在圆上.png" alt="点在圆上示意图" id="onCirclePointImg">
    </div>
    
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽圆心 O 或点 A</span><span data-cl-en style="display:none">Drag center O or point A</span></span>
    </div>
</div>
<script>
(function(){
    // 以下所有原有函数和变量完全保留，未做任何修改
    function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#e8e4dc':'#1a1a1a'; }
    function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#1c1c1c':'#ffffff'; }
    function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

    const canvas=document.getElementById('circleCanvas'), ctx=canvas.getContext('2d');
    const radius=150;
    let O={x:300,y:250}, A={x:480,y:250};
    let dragging=false, dragTarget=null;

    // 初始化根字号（独立于父页面，但会接收同步）
    document.documentElement.style.fontSize = '16px';

    function update(){
        const OA=Math.hypot(A.x-O.x, A.y-O.y);
        const isZh=_lang()==='zh';
        let colorA, cls, conclusionText, relationText;

        if(Math.abs(OA-radius)<1.5){
            colorA='#27ae60'; cls='on';
            relationText='OA = r';
            conclusionText=isZh?'OA = r，点 A 在⊙O上':'OA = r,A is on ⊙O';
        } else if(OA>radius){
            colorA='#e67e22'; cls='outside';
            relationText='OA > r';
            conclusionText=isZh?'OA > r，点 A 在⊙O外':'OA > r, A is outside ⊙O';
        } else {
            colorA='#2980b9'; cls='inside';
            relationText='OA < r';
            conclusionText=isZh?'OA < r，点 A 在⊙O内':'OA < r, A is inside ⊙O';
        }

        document.getElementById('dataPanel').innerHTML=`
            <div class="formula-row">
                <div class="metric">${isZh?'半径 r':'Radius r'} = <span class="metric-value">${radius.toFixed(2)}</span></div>
                <div class="metric">OA = <span class="metric-value">${OA.toFixed(2)}</span></div>
                <div class="metric">${isZh?'关系':'Relation'}: <span class="metric-value">${relationText}</span></div>
            </div>
            <div class="formula-row">
                <span class="conclusion-badge ${cls}">${conclusionText}</span>
            </div>`;

        drawCanvas(OA, colorA);
        
        // ========== 新增功能：点在圆上时显示图片，否则隐藏（不改变任何原有逻辑和样式）==========
        const imgContainer = document.getElementById('onCircleImageContainer');
        if (imgContainer) {
            const isExactlyOnCircle = Math.abs(OA - radius) < 1.5;
            if (isExactlyOnCircle) {
                imgContainer.style.display = 'block';
            } else {
                imgContainer.style.display = 'none';
            }
        }
        // ========== 新增功能结束 ==========
    }

    function drawCanvas(OA, colorA){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=_bg(); ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.beginPath(); ctx.arc(O.x,O.y,radius,0,2*Math.PI);
        ctx.strokeStyle=_fg(); ctx.lineWidth=1.8; ctx.stroke();

        ctx.beginPath(); ctx.moveTo(O.x,O.y); ctx.lineTo(A.x,A.y);
        ctx.strokeStyle='#aaa'; ctx.lineWidth=1.2; ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);

        ctx.beginPath(); ctx.arc(O.x,O.y,5,0,2*Math.PI); ctx.fillStyle=_fg(); ctx.fill();
        ctx.font='500 14px "DM Sans", Arial, sans-serif'; ctx.fillStyle=_fg();
        ctx.fillText('O', O.x-16, O.y-8);

        ctx.beginPath(); ctx.arc(A.x,A.y,7,0,2*Math.PI); ctx.fillStyle=colorA; ctx.fill();
        ctx.fillStyle=_fg(); ctx.fillText('A', A.x+8, A.y-8);
    }

    function getMousePos(e){
        const rect=canvas.getBoundingClientRect();
        return {x:(e.clientX-rect.left)*(600/rect.width), y:(e.clientY-rect.top)*(500/rect.height)};
    }

    canvas.addEventListener('mousedown',e=>{
        const m=getMousePos(e), thr=15;
        if(Math.hypot(m.x-O.x,m.y-O.y)<thr){ dragging=true; dragTarget='O'; }
        else if(Math.hypot(m.x-A.x,m.y-A.y)<thr){ dragging=true; dragTarget='A'; }
    });
    window.addEventListener('mousemove',e=>{
        if(!dragging) return;
        const m=getMousePos(e);
        if(dragTarget==='O'){O.x=m.x; O.y=m.y;} else {A.x=m.x; A.y=m.y;}
        update();
    });
    window.addEventListener('mouseup',()=>{dragging=false; dragTarget=null;});

    const obs=new MutationObserver(()=>update());
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});

    // 处理来自父窗口的消息（主题、语言、字号）
    window.addEventListener('message',ev=>{
        if(!ev.data||ev.data._src!=='circlelab') return;
        if(ev.data.theme) document.documentElement.setAttribute('data-theme',ev.data.theme);
        if(ev.data.lang){
            if(!window._CL) window._CL={};
            window._CL.lang=ev.data.lang;
            const zh=ev.data.lang==='zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el=>el.style.display=zh?'':'none');
            document.querySelectorAll('[data-cl-en]').forEach(el=>el.style.display=zh?'none':'');
        }
        if(typeof ev.data.fontSize === 'number'){
            let fs = ev.data.fontSize;
            fs = Math.min(20, Math.max(12, fs));
            document.documentElement.style.fontSize = fs + 'px';
        }
        update();
    });
    window._clRedraw=update;
    window.addEventListener('load',update);
    update();
})();
</script>
</body>
</html>

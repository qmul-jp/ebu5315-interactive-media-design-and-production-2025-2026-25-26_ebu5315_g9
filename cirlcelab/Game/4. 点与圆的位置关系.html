<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点与圆的位置关系</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .descriptions {
            margin-top: 16px;
            line-height: 2.2;
            font-size: 1em;
        }
        .conclusion {
            font-weight: bold;
            margin-top: 8px;
            font-size: 1.1em;
        }
        .outside  { color: #e67e22; }
        .on       { color: #27ae60; }
        .inside   { color: #2980b9; }
    
        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; }
        html,body { background:var(--bg)!important; color:var(--fg)!important; transition:background .2s,color .2s; }
        canvas { background:var(--bg)!important; }
        h3 { color:var(--fg); }
        /* i18n: 只隐藏纯文字标签，数据span不复制 */
        .zh-text { display:inline; }
        .en-text { display:none; }
        .zh-block { display:block; }
        .en-block { display:none; }

    </style>
</head>
<body>
    <h3><span class="zh-text">点与圆的位置关系</span><span class="en-text">Point–Circle Relationship</span></h3>

    <div>
        <canvas id="circleCanvas" width="600" height="500" style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div class="descriptions">
        <span class="zh-text">半径 r = </span><span class="en-text">Radius r = </span><span id="valR">0.00</span> &nbsp;&nbsp;
        OA = <span id="valOA">0.00</span> &nbsp;&nbsp;
        <span id="relation">0.00</span><br>
        <span class="conclusion" id="conclusion">—</span>
    </div>

    <script>
        (function () {

            function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#ffffff':'#000000'; }
            function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#000000':'#ffffff'; }
            function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');

            // 固定半径
            const radius = 150;

            // O 和 A 的初始位置
            let O = { x: 300, y: 250 };
            let A = { x: 480, y: 250 };

            // 显示元素
            const spanR          = document.getElementById('valR');
            const spanOA         = document.getElementById('valOA');
            const spanRelation   = document.getElementById('relation');
            const spanConclusion = document.getElementById('conclusion');

            // 拖拽状态
            let dragging = false;
            let dragTarget = null; // 'O' 或 'A'

            function update() {
                const OA = Math.hypot(A.x - O.x, A.y - O.y);

                spanR.textContent  = radius.toFixed(2);
                spanOA.textContent = OA.toFixed(2);

                let relationText, conclusionText, conclusionClass;

                if (Math.abs(OA - radius) < 1.5) {
                    // 视为在圆上
                    relationText   = 'OA = r';
                    conclusionText = _lang()==='en'?'OA = r, A is on ⊙O':'OA = r，点 A 在⊙O上';
                    conclusionClass = 'on';
                } else if (OA > radius) {
                    relationText   = 'OA > r';
                    conclusionText = _lang()==='en'?'OA > r, A is outside ⊙O':'OA > r，点 A 在⊙O外';
                    conclusionClass = 'outside';
                } else {
                    relationText   = 'OA < r';
                    conclusionText = _lang()==='en'?'OA < r, A is inside ⊙O':'OA < r，点 A 在⊙O内';
                    conclusionClass = 'inside';
                }

                spanRelation.textContent = relationText;
                spanConclusion.textContent = conclusionText;
                spanConclusion.className = 'conclusion ' + conclusionClass;

                drawCanvas(OA);
            }

            function drawCanvas(OA) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 判断 A 的位置，决定颜色
                let colorA;
                if (Math.abs(OA - radius) < 1.5) {
                    colorA = '#27ae60';
                } else if (OA > radius) {
                    colorA = '#e67e22';
                } else {
                    colorA = '#2980b9';
                }

                // 画圆
                ctx.beginPath();
                ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = _fg();
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 画 OA 连线（虚线）
                ctx.beginPath();
                ctx.moveTo(O.x, O.y);
                ctx.lineTo(A.x, A.y);
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 1.2;
                ctx.setLineDash([5, 3]);
                ctx.stroke();
                ctx.setLineDash([]);

                // 画圆心 O
                ctx.beginPath();
                ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = _fg();
                ctx.fill();
                ctx.fillStyle = _fg();
                ctx.font = '14px sans-serif';
                ctx.fillText('O', O.x - 16, O.y - 8);

                // 画点 A（颜色随位置变化）
                ctx.beginPath();
                ctx.arc(A.x, A.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = colorA;
                ctx.fill();
                ctx.fillStyle = _fg();
                ctx.fillText('A', A.x + 8, A.y - 8);
            }

            // --- 鼠标事件 ---
            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            }

            canvas.addEventListener('mousedown', function (e) {
                const m = getMousePos(e);
                const distO = Math.hypot(m.x - O.x, m.y - O.y);
                const distA = Math.hypot(m.x - A.x, m.y - A.y);
                const threshold = 15;
                if (distO < threshold) {
                    dragging = true;
                    dragTarget = 'O';
                } else if (distA < threshold) {
                    dragging = true;
                    dragTarget = 'A';
                }
            });

            window.addEventListener('mousemove', function (e) {
                if (!dragging) return;
                const m = getMousePos(e);
                if (dragTarget === 'O') {
                    O.x = m.x;
                    O.y = m.y;
                } else if (dragTarget === 'A') {
                    A.x = m.x;
                    A.y = m.y;
                }
                update();
            });

            window.addEventListener('mouseup', function () {
                dragging = false;
                dragTarget = null;
            });

            canvas.addEventListener('mouseleave', function () {
                dragging = false;
                dragTarget = null;
            });

            update();
            window._clRedraw = function(){ update(); };
        })();
    </script>

<script>
(function(){
    window._CL = { lang:'zh', theme:'light' };

    function applyLang(lang){
        window._CL.lang = lang;
        document.querySelectorAll('.zh-text').forEach(function(el){ el.style.display = lang==='zh'?'inline':'none'; });
        document.querySelectorAll('.en-text').forEach(function(el){ el.style.display = lang==='en'?'inline':'none'; });
        document.querySelectorAll('.zh-block').forEach(function(el){ el.style.display = lang==='zh'?'block':'none'; });
        document.querySelectorAll('.en-block').forEach(function(el){ el.style.display = lang==='en'?'block':'none'; });
        if(typeof _clRedraw==='function') _clRedraw();
    }

    function applyTheme(theme){
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        if(typeof _clRedraw==='function') _clRedraw();
    }

    window.addEventListener('message', function(ev){
        if(!ev.data || ev.data._src!=='circlelab') return;
        if(ev.data.lang)  applyLang(ev.data.lang);
        if(ev.data.theme) applyTheme(ev.data.theme);
    });

    window.addEventListener('DOMContentLoaded', function(){
        try{ if(window.parent._CL_lang)  applyLang(window.parent._CL_lang); }catch(e){}
        try{ if(window.parent._CL_theme) applyTheme(window.parent._CL_theme); }catch(e){}
    });
})();
</script>

</body>
</html>

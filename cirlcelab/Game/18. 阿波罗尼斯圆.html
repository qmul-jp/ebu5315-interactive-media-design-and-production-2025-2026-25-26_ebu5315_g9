<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿波罗尼斯圆 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .canvas-container {
            padding: 24px 28px 12px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        /* 滑块控制区域 */
        .slider-container {
            margin: 8px 28px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 8px 18px;
            background: var(--hover-bg);
            border-radius: 40px;
            border: 1px solid var(--border);   /* ← 添加这一行 */
        }

        .slider-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text);
        }
        .k-badge {
            background: var(--purple);
            color: #1a1a1a;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            min-width: 50px;
            text-align: center;
        }
        [data-theme="dark"] {
            .k-badge {
                background: var(--purple);
                color: #e8e4dc;
                padding: 2px 12px;
                border-radius: 20px;
                font-weight: 600;
                font-size: 0.95rem;
                min-width: 50px;
                text-align: center;
            }
        }
        .slider-container input[type=range] {
            width: 240px;
            accent-color: #8e44ad;
            background: transparent;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 16px;
            background: var(--hover-bg);
            border-left: 4px solid var(--purple);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        
        /* ===== 新增功能：点在圆上时显示的图片容器样式（完全独立，不影响任何原有布局）===== */
        .oncircle-img-wrapper {
            text-align: center;
            margin: 0 28px 18px;          /* 与定理块和交互提示协调，不拥挤 */
            padding: 0;
            transition: all 0.2s ease;
        }
        .oncircle-img-wrapper img {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 160px;             /* 卡片宽度范围内舒适 */
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            background: var(--card-bg);
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>阿波罗尼斯圆</div>
        <div class="title" data-cl-en style="display:none">Apollonius Circle</div>
        <div class="sub-en" data-cl-zh>到两定点距离之比为定值 k (k≠1) 的轨迹</div>
        <div class="sub-en" data-cl-en style="display:none">Locus of points with constant distance ratio k (k≠1)</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="620" height="460" style="width:100%; height:auto; max-width:620px; aspect-ratio:620/460"></canvas>
    </div>

    <!-- 滑块控件 -->
    <div class="slider-container">
        <span class="slider-label">
            <span data-cl-zh>比值 k = PA / PB =</span>
            <span data-cl-en style="display:none">Ratio k = PA / PB =</span>
            <span class="k-badge" id="kLabel">2.0</span>
        </span>
        <input type="range" id="kSlider" min="0.2" max="5.0" step="0.1" value="2.0">
        <span style="color:var(--text-sub); font-size:0.8rem;">(k ≠ 1)</span>
    </div>

    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    
    <!-- 新增：点在圆上时显示图片的容器（默认隐藏，位于定理块下方，交互提示上方） -->
    <div id="onCircleImageContainer" class="oncircle-img-wrapper" style="display: none;">
        <img src="在圆上.png" alt="点在阿波罗尼斯圆上示意图" id="onCircleImg">
    </div>
    
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽 A、B、P 或滑动 k 值</span><span data-cl-en style="display:none">Drag A, B, P or slide k</span></span>
    </div>
</div>

<script>
    (function () {
        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const CANVAS_W = 620, CANVAS_H = 460;
        const SCALE = 52;
        const OX = CANVAS_W / 2, OY = CANVAS_H / 2;

        // 定点 A, B (坐标系单位)
        let Ax = -2.5, Ay = 0;
        let Bx =  2.5, By = 0;
        // 探测点 P
        let Px = 0, Py = 3.0;
        // 比值 k
        let k = 2.0;

        let dragging = false, dragTarget = null;
        document.documentElement.style.fontSize = '16px';

        // ---------- 辅助函数 ----------
        function _fg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#1c1c1c' : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang()   { return (window._CL && window._CL.lang) || 'zh'; }
        function _gridColor() { return _isDark() ? '#2a2a2a' : '#f0ede6'; }
        function _axisColor() { return _isDark() ? '#888' : '#aaa'; }
        function _purple() { return _isDark() ? '#b983ff' : '#8e44ad'; }

        function toCanvas(x, y) { return { x: OX + x * SCALE, y: OY - y * SCALE }; }
        function toCoord(cx, cy) { return { x: (cx - OX) / SCALE, y: -(cy - OY) / SCALE }; }
        function snap(v) { return Math.round(v * 2) / 2; }
        function fmt(v, d=1) {
            const r = Math.round(v * Math.pow(10, d)) / Math.pow(10, d);
            return r.toFixed(d);
        }
        function dist2(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }

        // 计算阿波罗尼斯圆：圆心和半径
        function apolloniusCircle() {
            const dx = Bx - Ax, dy = By - Ay;
            const d  = Math.hypot(dx, dy);
            if (d < 1e-6) return null;

            const t1 = k / (k + 1);
            const C1x = Ax + t1 * dx, C1y = Ay + t1 * dy;

            const t2 = k / (k - 1);
            const C2x = Ax + t2 * dx, C2y = Ay + t2 * dy;

            const cx = (C1x + C2x) / 2, cy = (C1y + C2y) / 2;
            const R  = dist2(C1x, C1y, C2x, C2y) / 2;

            return { cx, cy, R, C1x, C1y, C2x, C2y };
        }

        function setDesc(html) { document.getElementById('descArea').innerHTML = html; }
        function setTheorem(html) { document.getElementById('theoremText').innerHTML = html; }

        function update() {
            const ap = apolloniusCircle();
            if (!ap) return;

            const PA = dist2(Px, Py, Ax, Ay);
            const PB = dist2(Px, Py, Bx, By);
            const ratio = PB < 1e-6 ? Infinity : PA / PB;
            const AB = dist2(Ax, Ay, Bx, By);
            const isZh = _lang() === 'zh';

            // 更新滑块显示
            document.getElementById('kLabel').textContent = k.toFixed(1);

            // 描述区域
            const descHtml = `
                <div class="desc-item"><span class="desc-symbol">A</span> = (${fmt(Ax)}, ${fmt(Ay)})</div>
                <div class="desc-item"><span class="desc-symbol">B</span> = (${fmt(Bx)}, ${fmt(By)})</div>
                <div class="desc-item"><span class="desc-symbol">AB</span> = ${fmt(AB)}</div>
                <div class="desc-item"><span class="desc-symbol">圆心</span> = (${fmt(ap.cx)}, ${fmt(ap.cy)})</div>
                <div class="desc-item"><span class="desc-symbol">半径 R</span> = ${fmt(ap.R)}</div>
                <div class="desc-item"><span class="desc-symbol">P</span> = (${fmt(Px)}, ${fmt(Py)})</div>
                <div class="desc-item"><span class="desc-symbol">PA/PB</span> = ${isFinite(ratio) ? ratio.toFixed(2) : '∞'}</div>
            `;
            setDesc(descHtml);

            // 修正：基于几何位置（圆心距与半径）判断 P 相对于圆的位置，而非简单比较比值
            const distToCenter = dist2(Px, Py, ap.cx, ap.cy);
            const tol = 0.12;          // 容差，判定圆上
            const onCircle = Math.abs(distToCenter - ap.R) < tol;
            const insideCircle = (!onCircle) && (distToCenter < ap.R);
            const outsideCircle = (!onCircle) && (distToCenter > ap.R);
            
            const green = '#27ae60', orange = '#e67e22', blue = '#2980b9';
            let pColor, statusZh, statusEn;

            if (onCircle) {
                pColor = green;
                statusZh = `PA/PB ≈ ${k.toFixed(1)} ✓，P 在阿波罗尼斯圆上`;
                statusEn = `PA/PB ≈ ${k.toFixed(1)} ✓, P is on the Apollonius circle`;
            } else if (insideCircle) {
                pColor = orange;
                statusZh = `PA/PB = ${ratio.toFixed(2)}，P 在圆内 (圆心距 ${distToCenter.toFixed(2)} < 半径 ${ap.R.toFixed(2)})`;
                statusEn = `PA/PB = ${ratio.toFixed(2)}, P inside circle (d = ${distToCenter.toFixed(2)} < R = ${ap.R.toFixed(2)})`;
            } else { // outsideCircle
                pColor = blue;
                statusZh = `PA/PB = ${ratio.toFixed(2)}，P 在圆外 (圆心距 ${distToCenter.toFixed(2)} > 半径 ${ap.R.toFixed(2)})`;
                statusEn = `PA/PB = ${ratio.toFixed(2)}, P outside circle (d = ${distToCenter.toFixed(2)} > R = ${ap.R.toFixed(2)})`;
            }

            const theoremHtml = isZh
                ? `到两定点距离之比为定值 k（k≠1）的点的轨迹是一个圆 —— 阿波罗尼斯圆。<br>` +
                  `<span style="color:${_purple()}">圆心 (${fmt(ap.cx)}, ${fmt(ap.cy)})，半径 R = ${fmt(ap.R)}</span><br>` +
                  `<span style="color:${pColor}">${statusZh}</span>`
                : `The locus of points whose distances to two fixed points have a constant ratio k (k≠1) is a circle — the Apollonius circle.<br>` +
                  `<span style="color:${_purple()}">Center (${fmt(ap.cx)}, ${fmt(ap.cy)}), Radius R = ${fmt(ap.R)}</span><br>` +
                  `<span style="color:${pColor}">${statusEn}</span>`;
            setTheorem(theoremHtml);

            drawCanvas(ap, PA, PB, ratio, pColor);
            
            // ========== 新增功能：点在圆上时显示图片，否则隐藏（不改变任何原有逻辑和样式）==========
            const imgContainer = document.getElementById('onCircleImageContainer');
            if (imgContainer) {
                if (onCircle) {
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                }
            }
            // ========== 新增功能结束 ==========
        }

        function drawCanvas(ap, PA, PB, ratio, pColor) {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg();
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            const purple = _purple();

            // 网格
            ctx.strokeStyle = _gridColor();
            ctx.lineWidth = 1;
            for (let gx = OX % SCALE; gx < CANVAS_W; gx += SCALE) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, CANVAS_H); ctx.stroke();
            }
            for (let gy = OY % SCALE; gy < CANVAS_H; gy += SCALE) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CANVAS_W, gy); ctx.stroke();
            }

            // 坐标轴
            const axisC = _axisColor();
            ctx.strokeStyle = axisC; ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(0, OY); ctx.lineTo(CANVAS_W, OY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OX, 0); ctx.lineTo(OX, CANVAS_H); ctx.stroke();
            ctx.fillStyle = axisC;
            ctx.font = '12px "DM Sans", sans-serif';
            ctx.fillText('x', CANVAS_W-14, OY-6);
            ctx.fillText('y', OX+8, 14);
            ctx.fillText('O', OX+5, OY+14);

            // 刻度
            ctx.fillStyle = _isDark() ? '#777' : '#999';
            ctx.font = '11px "DM Sans", sans-serif';
            for (let i = -Math.floor(OX/SCALE); i <= Math.floor((CANVAS_W-OX)/SCALE); i++) {
                if (i===0) continue;
                ctx.fillText(i, OX + i*SCALE - 4, OY + 14);
            }
            for (let j = -Math.floor((CANVAS_H-OY)/SCALE); j <= Math.floor(OY/SCALE); j++) {
                if (j===0) continue;
                ctx.fillText(j, OX + 5, OY - j*SCALE + 4);
            }

            const pA = toCanvas(Ax, Ay), pB = toCanvas(Bx, By);
            const pP = toCanvas(Px, Py);

            // AB 连线（虚线）
            ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = _isDark() ? '#666' : '#ccc';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);

            // 内分点 C1 和外分点 C2
            const pC1 = toCanvas(ap.C1x, ap.C1y), pC2 = toCanvas(ap.C2x, ap.C2y);
            ctx.beginPath(); ctx.arc(pC1.x, pC1.y, 4, 0, 2*Math.PI);
            ctx.fillStyle = purple; ctx.fill();
            ctx.fillStyle = _fg(); ctx.font = '11px "DM Sans", sans-serif';
            ctx.fillText('C₁', pC1.x + 5, pC1.y - 5);

            ctx.beginPath(); ctx.arc(pC2.x, pC2.y, 4, 0, 2*Math.PI);
            ctx.fillStyle = purple; ctx.fill();
            ctx.fillText('C₂', pC2.x + 5, pC2.y - 5);

            // 阿波罗尼斯圆
            const pAC = toCanvas(ap.cx, ap.cy);
            const rPx = ap.R * SCALE;
            ctx.beginPath(); ctx.arc(pAC.x, pAC.y, rPx, 0, 2*Math.PI);
            ctx.strokeStyle = purple;
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.fillStyle = _isDark() ? 'rgba(185,131,255,0.06)' : 'rgba(142,68,173,0.06)';
            ctx.fill();

            // PA、PB 连线
            ctx.beginPath(); ctx.moveTo(pP.x, pP.y); ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);

            ctx.beginPath(); ctx.moveTo(pP.x, pP.y); ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);

            // 长度标注
            ctx.font = '12px "DM Sans", sans-serif';
            const mPA = { x:(pP.x+pA.x)/2, y:(pP.y+pA.y)/2 };
            const mPB = { x:(pP.x+pB.x)/2, y:(pP.y+pB.y)/2 };
            ctx.fillStyle = '#e74c3c';
            ctx.fillText(`PA=${PA.toFixed(1)}`, mPA.x + 6, mPA.y - 4);
            ctx.fillStyle = '#2980b9';
            ctx.fillText(`PB=${PB.toFixed(1)}`, mPB.x + 6, mPB.y + 14);

            // 定点 A、B
            ctx.beginPath(); ctx.arc(pA.x, pA.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#e74c3c'; ctx.fill();
            ctx.fillStyle = _fg(); ctx.font = '500 14px "DM Sans", sans-serif';
            ctx.fillText('A', pA.x - 18, pA.y - 8);

            ctx.beginPath(); ctx.arc(pB.x, pB.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = '#2980b9'; ctx.fill();
            ctx.fillStyle = _fg();
            ctx.fillText('B', pB.x + 10, pB.y - 8);

            // 探测点 P
            ctx.beginPath(); ctx.arc(pP.x, pP.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = pColor; ctx.fill();
            ctx.fillStyle = _fg(); ctx.font = '500 13px "DM Sans", sans-serif';
            ctx.fillText('P', pP.x + 9, pP.y - 7);

            // 圆心标注
            ctx.beginPath(); ctx.arc(pAC.x, pAC.y, 4, 0, 2*Math.PI);
            ctx.fillStyle = purple; ctx.fill();
            ctx.fillStyle = purple;
            ctx.font = '12px "DM Sans", sans-serif';
            ctx.fillText(`圆心(${fmt(ap.cx)},${fmt(ap.cy)})  R=${fmt(ap.R)}`, pAC.x + 7, pAC.y - 6);
        }

        // ---------- 交互 ----------
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                cx: (clientX - rect.left) * (CANVAS_W / rect.width),
                cy: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function handleStart(e) {
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const pA = toCanvas(Ax, Ay), pB = toCanvas(Bx, By), pP = toCanvas(Px, Py);
            if (Math.hypot(mx-pA.x, my-pA.y) < 14) { dragging = true; dragTarget = 'A'; return; }
            if (Math.hypot(mx-pB.x, my-pB.y) < 14) { dragging = true; dragTarget = 'B'; return; }
            if (Math.hypot(mx-pP.x, my-pP.y) < 14) { dragging = true; dragTarget = 'P'; return; }
        }

        function handleMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const coord = toCoord(mx, my);
            if (dragTarget === 'A') {
                Ax = snap(coord.x); Ay = snap(coord.y);
            } else if (dragTarget === 'B') {
                Bx = snap(coord.x); By = snap(coord.y);
            } else if (dragTarget === 'P') {
                Px = coord.x; Py = coord.y;
            }
            update();
        }

        function handleEnd(e) {
            dragging = false;
            dragTarget = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // 滑块监听
        const slider = document.getElementById('kSlider');
        slider.addEventListener('input', (e) => {
            k = parseFloat(e.target.value);
            document.getElementById('kLabel').textContent = k.toFixed(1);
            update();
        });

        // 主题/语言切换
        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            update();
        });

        window.addEventListener('load', () => {
            const isZh = _lang() === 'zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
            document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            update();
        });
        update();
    })();
</script>
</body>
</html>

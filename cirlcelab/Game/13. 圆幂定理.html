<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆幂定理</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin: 0; }
        canvas { display: block; margin: 0 auto; }

        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; --sub:#666666; --border:#e0ddd8; --tab-bg:#f5f3ee; --tab-active:#ffffff; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; --sub:#999999; --border:#333333; --tab-bg:#1a1a1a; --tab-active:#2a2a2a; }
        html,body { background:var(--bg)!important; color:var(--fg)!important; transition:background .2s,color .2s; }
        canvas { background:var(--bg)!important; }
        h3 { color:var(--fg); margin: 12px 0 8px; }

        /* tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 0 auto 0;
            border-bottom: 2px solid var(--border);
            width: fit-content;
        }
        .tab {
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.85em;
            color: var(--sub);
            background: var(--tab-bg);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            margin-right: 3px;
            transition: background .15s, color .15s;
            user-select: none;
        }
        .tab:hover { color: var(--fg); }
        .tab.active { background: var(--tab-active); color: var(--fg); font-weight: 500; border-bottom: 2px solid var(--tab-active); margin-bottom: -2px; }

        .descriptions { margin-top: 14px; line-height: 2.4; font-size: 1em; min-height: 3.2em; }
        .theorem { font-weight: bold; margin-top: 8px; font-size: 1.05em; min-height: 2.5em; padding: 0 20px; }
        .power-box {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 18px;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 1em;
            color: var(--fg);
        }

        .zh-text { display:inline; }
        .en-text { display:none; }
    </style>
</head>
<body>
    <h3><span class="zh-text">圆幂定理</span><span class="en-text">Power of a Point Theorem</span></h3>

    <!-- 标签页 -->
    <div class="tabs">
        <div class="tab active" id="tab0" onclick="switchMode(0)">
            <span class="zh-text">相交弦</span><span class="en-text">Intersecting Chords</span>
        </div>
        <div class="tab" id="tab1" onclick="switchMode(1)">
            <span class="zh-text">切割线</span><span class="en-text">Secant-Tangent</span>
        </div>
        <div class="tab" id="tab2" onclick="switchMode(2)">
            <span class="zh-text">割线</span><span class="en-text">Two Secants</span>
        </div>
        <div class="tab" id="tab3" onclick="switchMode(3)">
            <span class="zh-text">圆幂统一</span><span class="en-text">Unified Power</span>
        </div>
    </div>

    <div>
        <canvas id="circleCanvas" width="620" height="460"
                style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div class="descriptions" id="desc">—</div>
    <div class="theorem" id="theorem">—</div>
    <div class="power-box" id="powerBox" style="display:none">
        <span class="zh-text">圆幂 = </span><span class="en-text">Power = </span><span id="powerVal">—</span>
    </div>

    <script>
    (function () {
        function _fg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#000000'; }
        function _bg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#000000' : '#ffffff'; }
        function _lang() { return (window._CL && window._CL.lang) || 'zh'; }

        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const cx = 300, cy = 230, radius = 160;

        // mode: 0=相交弦, 1=切割线, 2=割线, 3=圆幂统一
        let mode = 0;

        // 各模式的角度参数（均在圆上）
        // 模式0：相交弦 AB 和 CD，交点 P 在圆内
        let m0 = { angleA: 30, angleB: 200, angleC: 100, angleD: 300 };

        // 模式1：切割线，P 在圆外，PA 切线（A 在圆上），割线交圆于 B、C
        let m1 = { angleA: 350, angleB: 40, angleC: 130, Px: 500, Py: 230 };

        // 模式2：两条割线，P 在圆外，割线1交圆于 A、B，割线2交圆于 C、D
        let m2 = { angleA: 20, angleB: 80, angleC: 330, angleD: 270, Px: 510, Py: 230 };

        // 模式3：统一视图，显示 P 在内/外两种情形
        let m3 = { angleA: 40, angleB: 220, Px: 380, Py: 230 };

        let dragging = false, dragTarget = null;

        function d2r(d) { return d * Math.PI / 180; }
        function r2d(r) { return r * 180 / Math.PI; }
        function pt(deg) {
            return { x: cx + radius * Math.cos(d2r(deg)), y: cy + radius * Math.sin(d2r(deg)) };
        }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

        // 直线与圆的交点：直线过 p1、p2，求与圆(cx,cy,r)的两个交点
        function lineCircleIntersect(p1, p2) {
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const fx = p1.x - cx,   fy = p1.y - cy;
            const a = dx*dx + dy*dy;
            const b = 2*(fx*dx + fy*dy);
            const c = fx*fx + fy*fy - radius*radius;
            const disc = b*b - 4*a*c;
            if (disc < 0) return null;
            const sq = Math.sqrt(disc);
            const t1 = (-b - sq) / (2*a);
            const t2 = (-b + sq) / (2*a);
            return [
                { x: p1.x + t1*dx, y: p1.y + t1*dy, t: t1 },
                { x: p1.x + t2*dx, y: p1.y + t2*dy, t: t2 }
            ];
        }

        // 线段交点
        function segIntersect(a1, a2, b1, b2) {
            const d1 = { x: a2.x-a1.x, y: a2.y-a1.y };
            const d2 = { x: b2.x-b1.x, y: b2.y-b1.y };
            const cross = d1.x*d2.y - d1.y*d2.x;
            if (Math.abs(cross) < 1e-9) return null;
            const t = ((b1.x-a1.x)*d2.y - (b1.y-a1.y)*d2.x) / cross;
            return { x: a1.x + t*d1.x, y: a1.y + t*d1.y };
        }

        // 标注线段长度
        function labelLen(p1, p2, text, color, offset) {
            const mx = (p1.x+p2.x)/2 + (offset||0)*((p2.y-p1.y)/dist(p1,p2)||0);
            const my = (p1.y+p2.y)/2 - (offset||0)*((p2.x-p1.x)/dist(p1,p2)||0);
            ctx.fillStyle = color;
            ctx.font = '12px sans-serif';
            ctx.fillText(text, mx+5, my-3);
        }

        // 画小角弧
        function drawAngleArc(vertex, from, to, r, color) {
            const a1 = Math.atan2(from.y-vertex.y, from.x-vertex.x);
            const a2 = Math.atan2(to.y-vertex.y, to.x-vertex.x);
            const diff = Math.atan2(Math.sin(a2-a1), Math.cos(a2-a1));
            ctx.beginPath();
            ctx.arc(vertex.x, vertex.y, r, a1, a2, diff < 0);
            ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.stroke();
        }

        function drawPoint(p, r, fill, label, labelOffset) {
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2*Math.PI);
            ctx.fillStyle = fill; ctx.fill();
            if (label) {
                ctx.fillStyle = _fg(); ctx.font = '14px sans-serif';
                ctx.fillText(label, p.x + (labelOffset?.x||8), p.y + (labelOffset?.y||-8));
            }
        }

        function drawCircle() {
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI);
            ctx.strokeStyle = _fg()==='#ffffff' ? '#666' : '#bbb';
            ctx.lineWidth = 1.5; ctx.stroke();
            drawPoint({x:cx,y:cy}, 4, _fg(), 'O', {x:-15,y:-8});
        }

        function drawLine(p1, p2, color, width, dash) {
            ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
            ctx.strokeStyle = color; ctx.lineWidth = width||1.5;
            if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
            ctx.stroke(); ctx.setLineDash([]);
        }

        // 将过 p1、p2 的直线延伸到画布边缘
        function fullLine(p1, p2, color, width, dash) {
            const W = canvas.width, H = canvas.height;
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            if (Math.abs(dx) < 1e-9 && Math.abs(dy) < 1e-9) return;
            const ts = [];
            if (Math.abs(dx) > 1e-9) { ts.push(-p1.x/dx); ts.push((W-p1.x)/dx); }
            if (Math.abs(dy) > 1e-9) { ts.push(-p1.y/dy); ts.push((H-p1.y)/dy); }
            const pts = ts.map(t => ({ x: p1.x+t*dx, y: p1.y+t*dy }))
                          .filter(p => p.x >= -1 && p.x <= W+1 && p.y >= -1 && p.y <= H+1);
            if (pts.length < 2) return;
            pts.sort((a,b) => (a.x-b.x)||( a.y-b.y));
            ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
            ctx.strokeStyle = color; ctx.lineWidth = width||1.5;
            if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
            ctx.stroke(); ctx.setLineDash([]);
        }

        // ── 模式0：相交弦 ──────────────────────────────────────────────
        function updateMode0() {
            const pA = pt(m0.angleA), pB = pt(m0.angleB);
            const pC = pt(m0.angleC), pD = pt(m0.angleD);
            const P  = segIntersect(pA, pB, pC, pD);
            if (!P) { update(); return; }

            const PA = dist(P, pA), PB = dist(P, pB);
            const PC = dist(P, pC), PD = dist(P, pD);
            const prod1 = PA * PB, prod2 = PC * PD;
            const isEqual = Math.abs(prod1 - prod2) < 2;
            const green = '#27ae60', orange = '#e67e22';
            const col = isEqual ? green : orange;

            // 更新文字
            const zh = `PA = ${PA.toFixed(1)} &nbsp; PB = ${PB.toFixed(1)} &nbsp; PA · PB = ${prod1.toFixed(1)}<br>
                        PC = ${PC.toFixed(1)} &nbsp; PD = ${PD.toFixed(1)} &nbsp; PC · PD = ${prod2.toFixed(1)} &nbsp;
                        <span style="color:${col}">${isEqual ? 'PA·PB = PC·PD ✓' : 'PA·PB ≠ PC·PD'}</span>`;
            const en = `PA = ${PA.toFixed(1)} &nbsp; PB = ${PB.toFixed(1)} &nbsp; PA·PB = ${prod1.toFixed(1)}<br>
                        PC = ${PC.toFixed(1)} &nbsp; PD = ${PD.toFixed(1)} &nbsp; PC·PD = ${prod2.toFixed(1)} &nbsp;
                        <span style="color:${col}">${isEqual ? 'PA·PB = PC·PD ✓' : 'PA·PB ≠ PC·PD'}</span>`;
            document.getElementById('desc').innerHTML = _lang()==='zh' ? zh : en;

            const thZh = '圆内两弦相交，被交点分成的两段之积相等：PA · PB = PC · PD';
            const thEn = 'Two chords intersect inside a circle: PA · PB = PC · PD';
            document.getElementById('theorem').textContent = _lang()==='zh' ? thZh : thEn;
            document.getElementById('powerBox').style.display = 'none';

            // 绘图
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCircle();
            fullLine(pA, pB, '#e74c3c', 2);
            fullLine(pC, pD, '#2980b9', 2);

            // 标注线段长度
            ctx.font = '12px sans-serif';
            labelLen(P, pA, `PA=${PA.toFixed(1)}`, '#e74c3c', 12);
            labelLen(P, pB, `PB=${PB.toFixed(1)}`, '#e74c3c', 12);
            labelLen(P, pC, `PC=${PC.toFixed(1)}`, '#2980b9', -12);
            labelLen(P, pD, `PD=${PD.toFixed(1)}`, '#2980b9', -12);

            drawPoint(pA, 6, '#e74c3c', 'A', labelOutward(pA));
            drawPoint(pB, 6, '#e74c3c', 'B', labelOutward(pB));
            drawPoint(pC, 6, '#2980b9', 'C', labelOutward(pC));
            drawPoint(pD, 6, '#2980b9', 'D', labelOutward(pD));
            drawPoint(P,  5, col, 'P', {x:8, y:8});
        }

        // ── 模式1：切割线 ──────────────────────────────────────────────
        function updateMode1() {
            const P  = { x: m1.Px, y: m1.Py };
            const pA = pt(m1.angleA); // 切点

            // 切点：最近的切点（从 P 作切线）
            const dxP = P.x - cx, dyP = P.y - cy;
            const OP = Math.hypot(dxP, dyP);
            if (OP <= radius) {
                document.getElementById('desc').innerHTML = _lang()==='zh' ? 'P 在圆内，请将 P 移到圆外' : 'P is inside the circle';
                ctx.clearRect(0, 0, canvas.width, canvas.height); drawCircle();
                drawPoint(P, 6, '#e67e22', 'P', {x:8,y:-8});
                return;
            }

            // 精确切点：T = O + r*(cosα·û ± sinα·v̂)
            const alpha = Math.acos(Math.min(1, radius / OP));
            const ux = dxP/OP, uy = dyP/OP;
            const vx = -uy, vy = ux;
            const tA = {
                x: cx + radius*(Math.cos(alpha)*ux + Math.sin(alpha)*vx),
                y: cy + radius*(Math.cos(alpha)*uy + Math.sin(alpha)*vy)
            };

            // 割线：P → 方向由 angleB,angleC 决定
            const pB = pt(m1.angleB), pC = pt(m1.angleC);
            const ints = lineCircleIntersect(P, pB);
            if (!ints) return;
            // 两个交点，按距 P 的距离排序
            const sorted = ints.slice().sort((a,b) => dist(P,a) - dist(P,b));
            const Q1 = sorted[0], Q2 = sorted[1]; // Q1 近，Q2 远

            const PT2 = dist(P, tA);
            const PQ1 = dist(P, Q1), PQ2 = dist(P, Q2);
            const prod = PQ1 * PQ2;
            const isEqual = Math.abs(PT2*PT2 - prod) < 2;
            const green = '#27ae60', orange = '#e67e22';
            const col = isEqual ? green : orange;

            const zh = `切线长 PT = ${PT2.toFixed(1)} &nbsp; PT² = ${(PT2*PT2).toFixed(1)}<br>
                        PQ₁ = ${PQ1.toFixed(1)} &nbsp; PQ₂ = ${PQ2.toFixed(1)} &nbsp; PQ₁·PQ₂ = ${prod.toFixed(1)} &nbsp;
                        <span style="color:${col}">${isEqual ? 'PT² = PQ₁·PQ₂ ✓' : 'PT² ≠ PQ₁·PQ₂'}</span>`;
            const en = `Tangent PT = ${PT2.toFixed(1)} &nbsp; PT² = ${(PT2*PT2).toFixed(1)}<br>
                        PQ₁ = ${PQ1.toFixed(1)} &nbsp; PQ₂ = ${PQ2.toFixed(1)} &nbsp; PQ₁·PQ₂ = ${prod.toFixed(1)} &nbsp;
                        <span style="color:${col}">${isEqual ? 'PT² = PQ₁·PQ₂ ✓' : 'PT² ≠ PQ₁·PQ₂'}</span>`;
            document.getElementById('desc').innerHTML = _lang()==='zh' ? zh : en;

            const thZh = '切线长是割线两交点距离的比例中项：PT² = PQ₁ · PQ₂';
            const thEn = 'Tangent length is the geometric mean: PT² = PQ₁ · PQ₂';
            document.getElementById('theorem').textContent = _lang()==='zh' ? thZh : thEn;
            document.getElementById('powerBox').style.display = 'none';

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCircle();

            // 割线（完整直线）
            fullLine(P, Q1, '#2980b9', 2);

            // 切线（完整直线）
            fullLine(P, tA, '#e74c3c', 2);

            // OT 虚线（切点到圆心）
            drawLine({x:cx,y:cy}, tA, _fg()==='#ffffff'?'#666':'#aaa', 1.2, [4,2]);

            labelLen(P, tA, `PT=${PT2.toFixed(1)}`, '#e74c3c', 14);
            labelLen(P, Q1, `PQ₁=${PQ1.toFixed(1)}`, '#2980b9', -14);
            labelLen(P, Q2, `PQ₂=${PQ2.toFixed(1)}`, '#2980b9', -14);

            drawPoint(tA, 6, '#e74c3c', 'T', labelOutward(tA));
            drawPoint(Q1, 6, '#2980b9', 'Q₁', labelOutward(Q1));
            drawPoint(Q2, 6, '#2980b9', 'Q₂', labelOutward(Q2));
            drawPoint(P,  6, '#e67e22', 'P', {x:8,y:-8});
        }

        // ── 模式2：两条割线 ────────────────────────────────────────────
        function updateMode2() {
            const P  = { x: m2.Px, y: m2.Py };
            const OP = Math.hypot(P.x-cx, P.y-cy);
            if (OP <= radius) {
                document.getElementById('desc').innerHTML = _lang()==='zh' ? 'P 在圆内，请将 P 移到圆外' : 'P is inside the circle';
                ctx.clearRect(0, 0, canvas.width, canvas.height); drawCircle();
                drawPoint(P, 6, '#e67e22', 'P', {x:8,y:-8});
                return;
            }

            const pA = pt(m2.angleA), pC = pt(m2.angleC);
            const ints1 = lineCircleIntersect(P, pA);
            const ints2 = lineCircleIntersect(P, pC);
            if (!ints1 || !ints2) return;

            const s1 = ints1.slice().sort((a,b) => dist(P,a) - dist(P,b));
            const s2 = ints2.slice().sort((a,b) => dist(P,a) - dist(P,b));
            const A1 = s1[0], A2 = s1[1];
            const C1 = s2[0], C2 = s2[1];

            const PA1 = dist(P, A1), PA2 = dist(P, A2);
            const PC1 = dist(P, C1), PC2 = dist(P, C2);
            const prod1 = PA1 * PA2, prod2 = PC1 * PC2;
            const isEqual = Math.abs(prod1 - prod2) < 2;
            const green = '#27ae60', orange = '#e67e22';
            const col = isEqual ? green : orange;

            const zh = `PA₁ = ${PA1.toFixed(1)} &nbsp; PA₂ = ${PA2.toFixed(1)} &nbsp; PA₁·PA₂ = ${prod1.toFixed(1)}<br>
                        PC₁ = ${PC1.toFixed(1)} &nbsp; PC₂ = ${PC2.toFixed(1)} &nbsp; PC₁·PC₂ = ${prod2.toFixed(1)} &nbsp;
                        <span style="color:${col}">${isEqual ? 'PA₁·PA₂ = PC₁·PC₂ ✓' : 'PA₁·PA₂ ≠ PC₁·PC₂'}</span>`;
            const en = zh;
            document.getElementById('desc').innerHTML = _lang()==='zh' ? zh : en;

            const thZh = '从圆外一点的两条割线，各点到两交点之积相等：PA₁·PA₂ = PC₁·PC₂';
            const thEn = 'Two secants from an external point: PA₁·PA₂ = PC₁·PC₂';
            document.getElementById('theorem').textContent = _lang()==='zh' ? thZh : thEn;
            document.getElementById('powerBox').style.display = 'none';

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCircle();
            fullLine(P, A1, '#e74c3c', 2);
            fullLine(P, C1, '#2980b9', 2);

            labelLen(P, A1, `PA₁=${PA1.toFixed(1)}`, '#e74c3c', 14);
            labelLen(P, A2, `PA₂=${PA2.toFixed(1)}`, '#e74c3c', 14);
            labelLen(P, C1, `PC₁=${PC1.toFixed(1)}`, '#2980b9', -14);
            labelLen(P, C2, `PC₂=${PC2.toFixed(1)}`, '#2980b9', -14);

            drawPoint(A1, 6, '#e74c3c', 'A₁', labelOutward(A1));
            drawPoint(A2, 6, '#e74c3c', 'A₂', labelOutward(A2));
            drawPoint(C1, 6, '#2980b9', 'C₁', labelOutward(C1));
            drawPoint(C2, 6, '#2980b9', 'C₂', labelOutward(C2));
            drawPoint(P,  6, '#e67e22', 'P', {x:8,y:-8});
        }

        // ── 模式3：圆幂统一 ────────────────────────────────────────────
        function updateMode3() {
            const P = { x: m3.Px, y: m3.Py };
            const pA = pt(m3.angleA), pB = pt(m3.angleB);

            // 过 P 作直线（方向由 A、B 决定），与圆的交点
            const ints = lineCircleIntersect(P, pA);
            if (!ints) return;
            // 按参数 t 排序，t<0 在 P 的反方向
            const sorted = ints.slice().sort((a,b) => a.t - b.t);
            const X = sorted[0], Y = sorted[1];

            // 圆幂 = PX * PY（带符号：P在外为正，P在内为负，这里显示绝对值并注明）
            const px = P.x - cx, py = P.y - cy;
            const power = px*px + py*py - radius*radius;
            const PX = dist(P, X), PY = dist(P, Y);
            // P 在圆外：PX * PY = power；P 在圆内：PX * PY = -power（取绝对值显示积）
            const prod = PX * PY;
            const inside = power < 0;

            const green = '#27ae60';
            const zh = inside
                ? `P 在圆内 &nbsp; PX = ${PX.toFixed(1)} &nbsp; PY = ${PY.toFixed(1)} &nbsp; PX · PY = ${prod.toFixed(1)}<br>圆幂 = ${Math.abs(power).toFixed(1)}（P 在圆内时为负值）`
                : `P 在圆外 &nbsp; PX = ${PX.toFixed(1)} &nbsp; PY = ${PY.toFixed(1)} &nbsp; PX · PY = ${prod.toFixed(1)}<br>圆幂 = ${power.toFixed(1)} <span style="color:${green}">（= PX · PY ✓）</span>`;
            const en = inside
                ? `P inside circle &nbsp; PX = ${PX.toFixed(1)} &nbsp; PY = ${PY.toFixed(1)} &nbsp; PX·PY = ${prod.toFixed(1)}<br>Power = ${Math.abs(power).toFixed(1)} (negative, P inside)`
                : `P outside circle &nbsp; PX = ${PX.toFixed(1)} &nbsp; PY = ${PY.toFixed(1)} &nbsp; PX·PY = ${prod.toFixed(1)}<br>Power = ${power.toFixed(1)} <span style="color:${green}">(= PX·PY ✓)</span>`;
            document.getElementById('desc').innerHTML = _lang()==='zh' ? zh : en;

            const thZh = '过点 P 的任意直线与⊙O 交于 X、Y，则 PX · PY = |OP² − r²|（圆幂为定值）';
            const thEn = 'For any line through P intersecting ⊙O at X, Y: PX·PY = |OP² − r²| (constant)';
            document.getElementById('theorem').textContent = _lang()==='zh' ? thZh : thEn;

            const pb = document.getElementById('powerBox');
            pb.style.display = 'inline-block';
            document.getElementById('powerVal').textContent = power.toFixed(2);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCircle();

            // OP 连线
            drawLine({x:cx,y:cy}, P, _fg()==='#ffffff'?'#666':'#aaa', 1.2, [4,2]);

            // 割线延伸
            // 割线（完整直线）
            fullLine(X, Y, '#8e44ad', 2);

            labelLen(P, X, `PX=${PX.toFixed(1)}`, '#8e44ad', 14);
            labelLen(P, Y, `PY=${PY.toFixed(1)}`, '#8e44ad', 14);

            // OP 标注
            const mop = { x:(P.x+cx)/2, y:(P.y+cy)/2 };
            const op = dist(P, {x:cx,y:cy});
            ctx.fillStyle = _fg()==='#ffffff'?'#aaa':'#888';
            ctx.font = '12px sans-serif';
            ctx.fillText(`OP=${op.toFixed(1)}`, mop.x+5, mop.y-5);

            drawPoint(X, 6, '#8e44ad', 'X', labelOutward(X));
            drawPoint(Y, 6, '#8e44ad', 'Y', labelOutward(Y));
            drawPoint(P, 6, inside ? '#e67e22' : '#e74c3c', 'P', {x:8,y:-8});
        }

        function labelOutward(p) {
            const dx = p.x - cx, dy = p.y - cy;
            const l = Math.hypot(dx, dy);
            return { x: (dx/l)*14, y: (dy/l)*14 };
        }

        function update() {
            if      (mode === 0) updateMode0();
            else if (mode === 1) updateMode1();
            else if (mode === 2) updateMode2();
            else if (mode === 3) updateMode3();
        }

        window.switchMode = function(m) {
            mode = m;
            for (let i = 0; i < 4; i++) {
                document.getElementById('tab'+i).classList.toggle('active', i === m);
            }
            update();
        };

        // ── 鼠标交互 ──────────────────────────────────────────────────
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top)  * (canvas.height / rect.height)
            };
        }

        function getTargets() {
            if (mode === 0) {
                return [
                    { id:'A', p: pt(m0.angleA) }, { id:'B', p: pt(m0.angleB) },
                    { id:'C', p: pt(m0.angleC) }, { id:'D', p: pt(m0.angleD) },
                ];
            } else if (mode === 1) {
                return [{ id:'P', p:{x:m1.Px,y:m1.Py} }];
            } else if (mode === 2) {
                return [
                    { id:'P',  p:{x:m2.Px,y:m2.Py} },
                    { id:'A',  p: pt(m2.angleA) },
                    { id:'C',  p: pt(m2.angleC) },
                ];
            } else {
                return [
                    { id:'P', p:{x:m3.Px,y:m3.Py} },
                    { id:'A', p: pt(m3.angleA) },
                ];
            }
        }

        canvas.addEventListener('mousedown', function(e) {
            const m = getMousePos(e);
            for (const { id, p } of getTargets()) {
                if (Math.hypot(m.x - p.x, m.y - p.y) < 16) {
                    dragging = true; dragTarget = id; return;
                }
            }
        });

        window.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            const deg = r2d(Math.atan2(m.y - cy, m.x - cx));

            if (mode === 0) {
                if      (dragTarget==='A') m0.angleA = deg;
                else if (dragTarget==='B') m0.angleB = deg;
                else if (dragTarget==='C') m0.angleC = deg;
                else if (dragTarget==='D') m0.angleD = deg;
            } else if (mode === 1) {
                if (dragTarget==='P') { m1.Px = m.x; m1.Py = m.y; }
            } else if (mode === 2) {
                if      (dragTarget==='P') { m2.Px = m.x; m2.Py = m.y; }
                else if (dragTarget==='A') m2.angleA = deg;
                else if (dragTarget==='C') m2.angleC = deg;
            } else {
                if      (dragTarget==='P') { m3.Px = m.x; m3.Py = m.y; }
                else if (dragTarget==='A') m3.angleA = deg;
            }
            update();
        });

        window.addEventListener('mouseup',    () => { dragging = false; dragTarget = null; });
        canvas.addEventListener('mouseleave', () => { dragging = false; dragTarget = null; });

        update();
        window._clRedraw = function() { update(); };
    })();
    </script>

<script>
(function(){
    window._CL = { lang:'zh', theme:'light' };

    function applyLang(lang){
        window._CL.lang = lang;
        document.querySelectorAll('.zh-text').forEach(function(el){ el.style.display = lang==='zh'?'inline':'none'; });
        document.querySelectorAll('.en-text').forEach(function(el){ el.style.display = lang==='en'?'inline':'none'; });
        if(typeof _clRedraw==='function') _clRedraw();
    }

    function applyTheme(theme){
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        if(typeof _clRedraw==='function') _clRedraw();
    }

    window.addEventListener('message', function(ev){
        if(!ev.data || ev.data._src!=='circlelab') return;
        if(ev.data.lang)  applyLang(ev.data.lang);
        if(ev.data.theme) applyTheme(ev.data.theme);
    });

    window.addEventListener('DOMContentLoaded', function(){
        try{ if(window.parent._CL_lang)  applyLang(window.parent._CL_lang); }catch(e){}
        try{ if(window.parent._CL_theme) applyTheme(window.parent._CL_theme); }catch(e){}
    });
})();
</script>

<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        /* index.html 专属样式 */
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* ── HEADER ── */
        header {
            height: 56px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
            z-index: 10;
            transition: background 0.3s, border-color 0.3s;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--text);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            display: inline-block;
        }

        .header-spacer { flex: 1; }

        .header-subtitle {
            font-size: 0.78rem;
            color: var(--text-sub);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hbtn {
            height: 32px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .hbtn:hover  { background: var(--hover-bg); }
        .hbtn.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }

        /* 字号按钮微调 */
        .font-btn {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ── BODY WRAP ── */
        .body-wrap {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        aside {
            width: 220px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: background 0.3s, border-color 0.3s;
        }
        .sidebar-label {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-sub);
            font-weight: 500;
            padding: 20px 18px 8px;
        }
        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 18px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s;
            text-decoration: none;
        }
        .nav-item:hover  { background: var(--hover-bg); }
        .nav-item.active { background: var(--hover-bg); border-left-color: var(--accent2); }
        .nav-num {
            font-size: 0.68rem;
            color: var(--text-sub);
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
            flex-shrink: 0;
            width: 16px;
        }
        .nav-text    { font-size: 0.82rem; color: var(--text); line-height: 1.4; font-weight: 400; }
        .nav-text-en { font-size: 0.70rem; color: var(--text-sub); line-height: 1.3; margin-top: 1px; }

        aside::-webkit-scrollbar       { width: 6px; }
        aside::-webkit-scrollbar-track { background: var(--sidebar-bg); }
        aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        aside::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

        /* ── MAIN ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }
        .content-header {
            padding: 16px 28px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--header-bg);
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
        }
        .content-title    { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--text); }
        .content-title-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 2px; }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-sub);
        }
        .welcome-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
        }
        .welcome h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); }
        .welcome p  { font-size: 0.85rem; }

        iframe { flex: 1; border: none; width: 100%; background: #ffffff; display: none; }
        iframe.visible { display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-dot"></span>
        CircleLab
    </div>
    <span class="header-subtitle" id="headerSub">圆形几何交互探索</span>
    <div class="header-spacer"></div>
    <div class="btn-group">
        <button class="hbtn font-btn" id="btnFontMinus" title="减小字号">A-</button>
        <button class="hbtn font-btn" id="btnFontPlus" title="增大字号">A+</button>
        <button class="hbtn" id="btnLang" onclick="toggleLang()">EN</button>
        <button class="hbtn" id="btnTheme" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div class="body-wrap">
    <aside id="sidebar"></aside>

    <main id="mainArea">
        <div class="content-header" id="contentHeader" style="display:none">
            <div class="content-title" id="contentTitle"></div>
            <div class="content-title-en" id="contentTitleEn"></div>
        </div>
        <div class="welcome" id="welcome">
            <div class="welcome-circle">○</div>
            <h2 id="welcomeTitle">欢迎来到 CircleLab</h2>
            <p id="welcomeSub">从左侧目录选择一个主题开始探索</p>
        </div>
        <iframe id="contentFrame" src=""></iframe>
    </main>
</div>

<script>
    const topics = [
        { zh: '圆的基本定义',     en: 'Basic Definition of a Circle',     file: '1. 圆的基本定义.html' },
        { zh: '圆的周长和面积',   en: 'Circumference & Area',             file: '2. 圆的周长和面积.html' },
        { zh: '弧、弦、圆心角、圆周角', en: 'Arc, Chord & Central Angle',  file: '3. 弧、弦、圆心角、圆周角.html' },
        { zh: '点与圆的位置关系', en: 'Point–Circle Relationship',         file: '4. 点与圆的位置关系.html' },
        { zh: '直线与圆的位置关系', en: 'Line–Circle Relationship',        file: '5. 直线与圆的位置关系.html' },
        { zh: '垂径定理',         en: 'Perpendicular Chord Theorem',       file: '6. 垂径定理.html' },
        { zh: '圆心角定理',       en: 'Central Angle Theorem',             file: '7. 圆心角定理.html' },
        { zh: '圆周角定理',       en: 'Central Angle Theorem',             file: '8. 圆周角定理.html' },
        { zh: '圆内接四边形性质', en: 'Inscribed Quadrilateral',           file: '9. 圆内接四边形的性质.html' },
        { zh: '切线的判定与性质', en: 'Tangent Line Properties',           file: '10. 切线的判定与性质.html' },
        { zh: '切线长定理',       en: 'Tangent Length Theorem',             file: '11. 切线长定理.html' },
        { zh: '弦切角定理',       en: 'Tangent-Chord Angle Theorem',        file: '12. 弦切角定理.html' },
        { zh: '圆幂定理',         en: 'Power of a Point',                   file: '13. 圆幂定理.html' },
        { zh: '三角形的外接圆',   en: 'Circumscribed Circle',               file: '14. 三角形的外接圆.html' },
        { zh: '托勒密定理',       en: "Ptolemy's Theorem",                  file: '15. 托勒密定理.html' },
        { zh: '圆的方程（标准式）', en: 'Standard Equation of a Circle',    file: '16. 圆的方程.html' },
        { zh: '直线与圆的位置关系（代数法）', en: 'Line–Circle Relationship (Algebraic)', file: '17. 直线与圆的位置关系（代数法）.html' },
        { zh: '阿波罗尼斯圆',     en: 'Apollonius Circle',                  file: '18. 阿波罗尼斯圆.html' },
    ];

    let lang = 'zh';
    let activeIndex = -1;
    let currentFontSize = 16;   // 基准字号 px，范围 12~20

    const i18n = {
        zh: { sub: '圆形几何交互探索',        sidebarLabel: '目录',     welcomeTitle: '欢迎来到 CircleLab', welcomeSub: '从左侧目录选择一个主题开始探索' },
        en: { sub: 'Interactive Circle Geometry', sidebarLabel: 'Contents', welcomeTitle: 'Welcome to CircleLab', welcomeSub: 'Select a topic from the sidebar to begin' }
    };

    function setRootFontSize(size) {
        size = Math.min(20, Math.max(12, size));
        currentFontSize = size;
        document.documentElement.style.fontSize = size + 'px';
        // 同步到 iframe
        broadcast({ _src: 'circlelab', fontSize: currentFontSize });
    }

    function changeFontSize(delta) {
        setRootFontSize(currentFontSize + delta);
    }

    function buildSidebar() {
        const aside = document.getElementById('sidebar');
        aside.innerHTML = '';
        const label = document.createElement('div');
        label.className = 'sidebar-label';
        label.id = 'sidebarLabel';
        label.textContent = i18n[lang].sidebarLabel;
        aside.appendChild(label);

        topics.forEach((t, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item' + (i === activeIndex ? ' active' : '');
            item.onclick = () => loadTopic(i);
            item.innerHTML = `
                <span class="nav-num">${String(i + 1).padStart(2, '0')}</span>
                <div>
                    <div class="nav-text">${lang === 'zh' ? t.zh : t.en}</div>
                    <div class="nav-text-en">${lang === 'zh' ? t.en : t.zh}</div>
                </div>`;
            aside.appendChild(item);
        });
    }

    function loadTopic(i) {
        activeIndex = i;
        const t = topics[i];
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('contentHeader').style.display = 'block';
        document.getElementById('contentTitle').textContent   = t.zh;
        document.getElementById('contentTitleEn').textContent = t.en;

        const frame = document.getElementById('contentFrame');
        frame.classList.add('visible');
        frame.src = t.file;
        frame.onload = function () {
            // 发送主题、语言、当前字号
            broadcast({ _src: 'circlelab', lang: lang });
            broadcast({ _src: 'circlelab', theme: document.documentElement.getAttribute('data-theme') || 'light' });
            broadcast({ _src: 'circlelab', fontSize: currentFontSize });
        };
        buildSidebar();
    }

    function broadcast(msg) {
        const frame = document.getElementById('contentFrame');
        if (frame && frame.contentWindow) {
            try { frame.contentWindow.postMessage(msg, '*'); } catch (e) {}
        }
    }

    function toggleLang() {
        lang = lang === 'zh' ? 'en' : 'zh';
        document.getElementById('btnLang').textContent = lang === 'zh' ? 'EN' : '中';
        document.getElementById('headerSub').textContent   = i18n[lang].sub;
        document.getElementById('welcomeTitle').textContent = i18n[lang].welcomeTitle;
        document.getElementById('welcomeSub').textContent   = i18n[lang].welcomeSub;
        if (activeIndex >= 0) {
            const t = topics[activeIndex];
            document.getElementById('contentTitle').textContent   = lang === 'zh' ? t.zh : t.en;
            document.getElementById('contentTitleEn').textContent = lang === 'zh' ? t.en : t.zh;
        }
        buildSidebar();
        broadcast({ _src: 'circlelab', lang: lang });
    }

    function toggleTheme() {
        const html   = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        const theme  = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', theme);
        document.getElementById('btnTheme').textContent = isDark ? '🌙' : '☀️';
        broadcast({ _src: 'circlelab', theme: theme });
    }

    // 初始化根字号
    setRootFontSize(16);
    // 绑定字号按钮
    document.getElementById('btnFontMinus').addEventListener('click', () => changeFontSize(-1));
    document.getElementById('btnFontPlus').addEventListener('click', () => changeFontSize(1));

    buildSidebar();
</script>
</body>
</html>

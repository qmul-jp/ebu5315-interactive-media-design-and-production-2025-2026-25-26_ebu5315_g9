<!doctype html>
<html lang="zh" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>CircleLab · 圆形几何交互探索</title>
    <link rel="stylesheet" href="game.css" />
    <style>
      /* index.html 涓撳睘鏍峰紡 鈥?鍖呭惈寮€灞忛粦鏉垮浘鐗囧畬鏁村眳涓?+ 鏂囧瓧涓嬬Щ */
      body {
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow: hidden;
      }

      /* 鈹€鈹€ HEADER 鈹€鈹€ */
      header {
        min-height: clamp(2.82rem, 4.2vw, 3.62rem);
        background: color-mix(in srgb, #faf9f5 94%, rgba(255, 255, 255, 0.9));
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: clamp(0.28rem, 0.52vw, 0.46rem) clamp(0.76rem, 1.8vw, 1.8rem);
        gap: clamp(0.5rem, 1vw, 1.2rem);
        flex-shrink: 0;
        box-shadow:
          0 8px 24px rgba(20, 20, 19, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        z-index: 10;
        box-sizing: border-box;
        transition:
          background 0.3s,
          border-color 0.3s;
        backdrop-filter: blur(18px) saturate(1.05);
      }

      :root[data-theme="dark"] header {
        border-bottom-color: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 18%,
          transparent
        );
        background: linear-gradient(
          180deg,
          color-mix(in oklch, oklch(0.13 0.012 252) 92%, black 8%) 0%,
          color-mix(
              in oklch,
              oklch(0.2 0.01 250) 86%,
              oklch(0.13 0.012 252) 14%
            )
            100%
        );
        box-shadow:
          0 12px 28px color-mix(in oklch, black 22%, transparent),
          inset 0 1px 0 color-mix(in oklch, #faf9f5 6%, transparent);
      }

      .logo {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        text-decoration: none;
      }

      .logo img {
        display: block;
        width: auto;
        height: clamp(30px, 4vw, 54px);
        max-width: min(34vw, 210px);
        object-fit: contain;
      }

      :root[data-theme="light"] .logo img {
        filter: brightness(0) saturate(100%) opacity(0.94);
      }

      .header-spacer {
        flex: 1;
      }

      .btn-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hbtn {
        min-height: clamp(2.2rem, 3vw, 2.7rem);
        min-width: clamp(2.2rem, 3vw, 2.7rem);
        padding: 0;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: #b0aea5;
        font-family: var(--font-sans);
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background-color 220ms ease,
          color 220ms ease,
          transform 220ms ease;
        white-space: nowrap;
      }
      .hbtn:hover {
        color: #141413;
        background: #e8e6dc;
      }
      .hbtn.active {
        background: transparent;
        color: inherit;
        border-color: transparent;
      }

      /* 瀛楀彿鎸夐挳寰皟 */
      .font-btn {
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .icon-btn {
        min-width: clamp(2.2rem, 3vw, 2.7rem);
        padding: 0;
        font-size: 0.95rem;
        line-height: 1;
      }
      .icon-btn .btn-icon-svg {
        width: 1rem;
        height: 1rem;
        display: block;
        margin: 0 auto;
        filter: brightness(0) saturate(100%) opacity(0.78);
        transition: filter 220ms ease;
      }
      .icon-btn:hover .btn-icon-svg,
      .icon-btn:focus-visible .btn-icon-svg {
        filter: brightness(0) saturate(100%) opacity(0.96);
      }
      :root[data-theme="dark"] .icon-btn .btn-icon-svg {
        filter: brightness(0) invert(1) opacity(0.82);
      }
      :root[data-theme="dark"] .icon-btn:hover .btn-icon-svg,
      :root[data-theme="dark"] .icon-btn:focus-visible .btn-icon-svg {
        filter: brightness(0) invert(1) opacity(0.98);
      }

      .hbtn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        background: transparent;
      }

      .settings-shell {
        position: relative;
        justify-self: end;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: clamp(2.2rem, 3vw, 2.7rem);
        min-width: clamp(2.2rem, 3vw, 2.7rem);
        padding: 0;
        border: none;
        border-radius: 10px;
        color: #b0aea5;
        background: transparent;
        cursor: pointer;
        transition:
          background-color 220ms ease,
          color 220ms ease,
          transform 220ms ease;
      }

      .nav-link:hover,
      .nav-link:focus-visible {
        color: #141413;
        background: #e8e6dc;
        outline: none;
      }

      .setting-btn {
        color: #b0aea5;
      }

      .setting-btn svg {
        width: clamp(1rem, 1.2vw, 1.24rem);
        height: clamp(1rem, 1.2vw, 1.24rem);
        fill: none;
        stroke: currentColor;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 280ms cubic-bezier(0.25, 1, 0.5, 1);
      }

      .setting-btn:hover,
      .setting-btn:focus-visible {
        background: transparent;
        box-shadow: none;
      }

      :root[data-theme="dark"] .hbtn {
        color: oklch(0.74 0.02 248);
      }

      :root[data-theme="dark"] .nav-link {
        color: oklch(0.74 0.02 248);
      }

      :root[data-theme="dark"] .hbtn:hover,
      :root[data-theme="dark"] .hbtn:focus-visible,
      :root[data-theme="dark"] .hbtn[aria-expanded="true"] {
        color: oklch(0.93 0.01 250);
        background: color-mix(in oklch, oklch(0.74 0.14 170) 10%, transparent);
      }

      :root[data-theme="dark"] .nav-link:hover,
      :root[data-theme="dark"] .nav-link:focus-visible,
      :root[data-theme="dark"] .nav-link[aria-expanded="true"] {
        color: oklch(0.93 0.01 250);
        background: color-mix(in oklch, oklch(0.74 0.14 170) 10%, transparent);
      }

      :root[data-theme="dark"] .setting-btn:hover,
      :root[data-theme="dark"] .setting-btn:focus-visible,
      :root[data-theme="dark"] .setting-btn[aria-expanded="true"] {
        background: transparent;
      }

      .setting-btn[aria-expanded="true"] svg {
        transform: rotate(90deg);
      }

      .settings-dropdown[hidden] {
        display: none;
      }

      .settings-dropdown {
        --settings-menu-border: #cec6ba;
        --settings-menu-bg: #faf9f5;
        --settings-menu-shadow: 0 10px 18px
          color-mix(in srgb, #cec6ba 22%, transparent);
        --settings-title-color: #141413;
        --settings-label-color: #b0aea5;
        --settings-divider-color: #cec6ba;
        --settings-track-border: transparent;
        --settings-track-bg: #e8e6dc;
        --settings-track-shadow: none;
        --settings-option-color: #1f1e1d;
        --settings-option-hover-color: #141413;
        --settings-option-hover-bg: #faf9f5;
        --settings-option-hover-border: #cec6ba;
        --settings-option-hover-shadow: none;
        --settings-option-active-color: #141413;
        --settings-option-active-bg: #e8e6dc;
        --settings-option-active-border: #cec6ba;
        --settings-option-active-shadow: none;
        --settings-slider-line: #b0aea5;
        --settings-slider-tick: #6a6b6a;
        --settings-slider-thumb-bg: var(--settings-slider-tick);
        --settings-slider-thumb-border: transparent;
        --settings-slider-thumb-shadow: none;
        --settings-slider-focus-ring: color-mix(
          in oklch,
          #186164 40%,
          transparent
        );
        position: absolute;
        top: calc(100% + 0.72rem);
        right: 0;
        z-index: 20;
        width: min(16.2rem, calc(100vw - 2rem));
        padding: 0.72rem;
        border: 1px solid var(--settings-menu-border);
        border-radius: 10px;
        background: var(--settings-menu-bg);
        box-shadow: var(--settings-menu-shadow);
      }

      :root[data-theme="dark"] .settings-dropdown {
        --settings-menu-border: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 18%,
          transparent
        );
        --settings-menu-bg: linear-gradient(
          180deg,
          color-mix(in oklch, oklch(0.13 0.012 252) 92%, black 8%) 0%,
          color-mix(
              in oklch,
              oklch(0.2 0.01 250) 86%,
              oklch(0.13 0.012 252) 14%
            )
            100%
        );
        --settings-menu-shadow:
          0 16px 34px color-mix(in oklch, black 26%, transparent),
          inset 0 1px 0 color-mix(in oklch, #faf9f5 6%, transparent);
        --settings-title-color: oklch(0.93 0.01 250);
        --settings-label-color: oklch(0.74 0.02 248);
        --settings-divider-color: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 14%,
          transparent
        );
        --settings-track-border: color-mix(in oklch, #faf9f5 14%, transparent);
        --settings-track-bg: linear-gradient(
          180deg,
          color-mix(in oklch, oklch(0.2 0.01 250) 88%, oklch(0.13 0.012 252)) 0%,
          color-mix(in oklch, oklch(0.13 0.012 252) 92%, black) 100%
        );
        --settings-track-shadow:
          inset 0 1px 0 color-mix(in oklch, #faf9f5 8%, transparent),
          0 10px 18px color-mix(in oklch, black 24%, transparent);
        --settings-option-color: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 84%,
          #faf9f5
        );
        --settings-option-hover-color: color-mix(
          in oklch,
          #faf9f5 84%,
          oklch(0.74 0.14 170) 16%
        );
        --settings-option-hover-bg: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 10%,
          transparent
        );
        --settings-option-hover-border: color-mix(
          in oklch,
          #faf9f5 14%,
          transparent
        );
        --settings-option-hover-shadow: none;
        --settings-option-active-color: oklch(0.74 0.14 170);
        --settings-option-active-bg: transparent;
        --settings-option-active-border: oklch(0.74 0.14 170);
        --settings-option-active-shadow: none;
        --settings-slider-line: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 56%,
          transparent
        );
        --settings-slider-tick: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 84%,
          #faf9f5 16%
        );
        --settings-slider-thumb-bg: var(--settings-slider-tick);
        --settings-slider-thumb-border: transparent;
        --settings-slider-thumb-shadow: none;
        --settings-slider-focus-ring: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 40%,
          transparent
        );
      }

      .settings-dropdown[data-preview-theme="dark"] {
        --settings-menu-border: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 18%,
          transparent
        );
        --settings-menu-bg: linear-gradient(
          180deg,
          color-mix(in oklch, oklch(0.13 0.012 252) 92%, black 8%) 0%,
          color-mix(
              in oklch,
              oklch(0.2 0.01 250) 86%,
              oklch(0.13 0.012 252) 14%
            )
            100%
        );
        --settings-menu-shadow:
          0 16px 34px color-mix(in oklch, black 26%, transparent),
          inset 0 1px 0 color-mix(in oklch, #faf9f5 6%, transparent);
        --settings-title-color: oklch(0.93 0.01 250);
        --settings-label-color: oklch(0.74 0.02 248);
        --settings-divider-color: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 14%,
          transparent
        );
        --settings-track-border: color-mix(in oklch, #faf9f5 14%, transparent);
        --settings-track-bg: linear-gradient(
          180deg,
          color-mix(in oklch, oklch(0.2 0.01 250) 88%, oklch(0.13 0.012 252)) 0%,
          color-mix(in oklch, oklch(0.13 0.012 252) 92%, black) 100%
        );
        --settings-track-shadow:
          inset 0 1px 0 color-mix(in oklch, #faf9f5 8%, transparent),
          0 10px 18px color-mix(in oklch, black 24%, transparent);
        --settings-option-color: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 84%,
          #faf9f5
        );
        --settings-option-hover-color: color-mix(
          in oklch,
          #faf9f5 84%,
          oklch(0.74 0.14 170) 16%
        );
        --settings-option-hover-bg: color-mix(
          in oklch,
          oklch(0.74 0.14 170) 10%,
          transparent
        );
        --settings-option-hover-border: color-mix(
          in oklch,
          #faf9f5 14%,
          transparent
        );
        --settings-option-active-color: oklch(0.74 0.14 170);
        --settings-option-active-bg: transparent;
        --settings-option-active-border: oklch(0.74 0.14 170);
        --settings-option-active-shadow: none;
        --settings-slider-line: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 56%,
          transparent
        );
        --settings-slider-tick: color-mix(
          in oklch,
          oklch(0.74 0.02 248) 84%,
          #faf9f5 16%
        );
        --settings-slider-thumb-bg: var(--settings-slider-tick);
        --settings-slider-thumb-border: transparent;
      }

      .settings-dropdown[data-preview-theme="light"] {
        --settings-menu-border: #cec6ba;
        --settings-menu-bg: #faf9f5;
        --settings-menu-shadow: 0 10px 18px
          color-mix(in oklch, #cec6ba 22%, transparent);
        --settings-title-color: #141413;
        --settings-label-color: #b0aea5;
        --settings-divider-color: #cec6ba;
        --settings-track-border: transparent;
        --settings-track-bg: #e8e6dc;
        --settings-track-shadow: none;
        --settings-option-color: #1f1e1d;
        --settings-option-hover-color: #141413;
        --settings-option-hover-bg: #faf9f5;
        --settings-option-hover-border: #cec6ba;
        --settings-option-active-color: #141413;
        --settings-option-active-bg: #faf9f5;
        --settings-option-active-border: #cec6ba;
        --settings-option-active-shadow: none;
        --settings-slider-line: #b0aea5;
        --settings-slider-tick: #6a6b6a;
        --settings-slider-thumb-bg: var(--settings-slider-tick);
        --settings-slider-thumb-border: transparent;
      }

      .settings-panel-title {
        margin: 0 0 0.56rem;
        color: var(--settings-title-color);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .settings-section {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        align-items: center;
        gap: 0.68rem;
      }

      .settings-section + .settings-section {
        margin-top: 0.58rem;
        padding-top: 0.58rem;
        border-top: 1px solid var(--settings-divider-color);
      }

      .settings-label {
        margin: 0;
        color: var(--settings-label-color);
        font-size: 0.69rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .settings-options {
        display: inline-grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.22rem;
        min-width: 7.95rem;
        padding: 0.22rem;
        border-radius: 10px;
        border: 1px solid var(--settings-track-border);
        background: var(--settings-track-bg);
        box-shadow: var(--settings-track-shadow);
        justify-self: end;
      }

      .settings-option {
        min-height: 2.16rem;
        padding: 0.4rem 0.68rem;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--settings-option-color);
        font: inherit;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        white-space: nowrap;
        cursor: pointer;
        transition:
          background-color 200ms ease,
          color 200ms ease,
          border-color 200ms ease,
          box-shadow 240ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 200ms ease;
      }

      .settings-option:hover,
      .settings-option:focus-visible {
        color: var(--settings-option-hover-color);
        border-color: var(--settings-option-hover-border);
        background: var(--settings-option-hover-bg);
        box-shadow: var(--settings-option-hover-shadow);
        outline: none;
      }

      .settings-option.is-selected,
      .settings-option[aria-pressed="true"] {
        color: var(--settings-option-active-color);
        background: var(--settings-option-active-bg);
        border-color: var(--settings-option-active-border);
        box-shadow: var(--settings-option-active-shadow);
      }

      .settings-font-slider {
        position: relative;
        justify-self: end;
        width: min(11.2rem, 100%);
        min-width: 10.5rem;
        min-height: 2.3rem;
        display: grid;
        align-items: center;
      }

      .settings-font-slider::before {
        content: "";
        position: absolute;
        left: 0.32rem;
        right: 0.32rem;
        top: 50%;
        height: 2px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: var(--settings-slider-line);
        pointer-events: none;
      }

      .settings-font-active-dot {
        position: absolute;
        top: 50%;
        left: calc(
          0.32rem + (var(--settings-font-step, 0) * ((100% - 0.64rem) / 3))
        );
        width: 0.82rem;
        height: 0.82rem;
        border-radius: 50%;
        background: var(--settings-slider-thumb-bg);
        box-shadow:
          0 0 0 1px var(--settings-slider-thumb-border, transparent),
          0 6px 14px
            color-mix(
              in oklch,
              var(--settings-slider-thumb-bg) 26%,
              transparent
            );
        pointer-events: none;
        z-index: 1;
        transform: translate(-50%, -50%);
        transition:
          left 280ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
          background-color 220ms ease,
          box-shadow 240ms ease;
      }

      .settings-font-active-dot::after {
        content: "";
        position: absolute;
        inset: -0.34rem;
        border-radius: 50%;
        background: color-mix(
          in oklch,
          var(--settings-slider-thumb-bg) 18%,
          transparent
        );
        opacity: 0;
        transform: scale(0.55);
      }

      .settings-font-slider.is-animating .settings-font-active-dot::after {
        animation: settings-font-dot-pulse 360ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .settings-font-ticks {
        position: absolute;
        left: 0.32rem;
        right: 0.32rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: none;
      }

      .settings-font-tick {
        width: 2px;
        height: 0.98rem;
        border-radius: 999px;
        background: var(--settings-slider-tick);
      }

      .settings-font-range {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 2.3rem;
        margin: 0;
        background: transparent;
        cursor: pointer;
        position: relative;
        z-index: 2;
      }

      .settings-font-range::-webkit-slider-runnable-track,
      .settings-font-range::-moz-range-track {
        height: 2px;
        background: transparent;
      }

      .settings-font-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 1.2rem;
        height: 1.2rem;
        margin-top: -0.49rem;
        border-radius: 50%;
        border: 1px solid transparent;
        background: transparent;
        box-shadow: none;
      }

      .settings-font-range::-moz-range-thumb {
        width: 1.2rem;
        height: 1.2rem;
        border-radius: 50%;
        border: 1px solid transparent;
        background: transparent;
        box-shadow: none;
      }

      .settings-font-range:focus-visible {
        outline: none;
      }

      .settings-font-range:focus-visible::-webkit-slider-thumb {
        box-shadow: 0 0 0 3px var(--settings-slider-focus-ring);
      }

      .settings-font-range:focus-visible::-moz-range-thumb {
        box-shadow: 0 0 0 3px var(--settings-slider-focus-ring);
      }

      @keyframes settings-font-dot-pulse {
        0% {
          opacity: 0;
          transform: scale(0.55);
        }
        30% {
          opacity: 0.46;
          transform: scale(0.96);
        }
        100% {
          opacity: 0;
          transform: scale(1.24);
        }
      }

      /* 鈹€鈹€ BODY WRAP 鈹€鈹€ */
      .body-wrap {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .body-wrap.sidebar-collapsed #sidebar {
        width: 0;
        border-right-width: 0;
        overflow: hidden;
      }
      .body-wrap.sidebar-collapsed main {
        min-width: 0;
      }

      /* 鈹€鈹€ SIDEBAR 鈹€鈹€ */
      #sidebar {
        --sidebar-font-scale: 1.1;
        width: 240px;
        flex-shrink: 0;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        transition:
          width 0.25s ease,
          background 0.3s,
          border-color 0.3s;
      }
      .sidebar-label {
        font-size: calc(0.68rem * var(--sidebar-font-scale));
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-sub);
        font-weight: 500;
        padding: 20px 18px 8px;
      }
      .nav-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 18px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition:
          background 0.15s,
          border-color 0.15s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: var(--hover-bg);
      }
      .nav-item.active {
        background: var(--hover-bg);
        border-left-color: var(--accent2);
      }
      :root[data-theme="dark"] .nav-item.active {
        border-left-color: #7bcdad;
      }
      .nav-num {
        font-size: calc(0.68rem * var(--sidebar-font-scale));
        color: var(--text-sub);
        font-variant-numeric: tabular-nums;
        margin-top: 2px;
        flex-shrink: 0;
        width: 24px;
        font-weight: 500;
      }
      .nav-text {
        font-size: calc(0.82rem * var(--sidebar-font-scale));
        color: var(--text);
        line-height: 1.4;
        font-weight: 400;
      }

      #sidebar::-webkit-scrollbar,
      #sidebar::-webkit-scrollbar-track,
      #sidebar::-webkit-scrollbar-thumb,
      #sidebar::-webkit-scrollbar-thumb:hover {
        all: unset;
      }

      /* 鈹€鈹€ MAIN 鈹€鈹€ */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(
            220px,
            clamp(220px, 28vw, 320px)
          );
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        background: var(--bg);
        min-width: 0;
        padding: 0 0 24px 0;
      }
      .main-shell {
        display: contents;
      }
      .topic-column {
        grid-column: 1;
        grid-row: 2;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .cirno-zone {
        grid-column: 2;
        grid-row: 1 / span 2;
        min-width: 0;
        min-height: 0;
        position: relative;
        align-self: stretch;
        display: flex;
        justify-content: center;
        padding: 12px clamp(8px, 1.2vw, 20px) 22px clamp(6px, 0.8vw, 12px);
        border-left: 1px solid color-mix(in oklch, #4da8ff 64%, #8ed0ff 36%);
        background: color-mix(in oklch, var(--header-bg) 96%, var(--bg) 4%);
        box-shadow:
          inset 1px 0 0 color-mix(in oklch, #d5f0ff 56%, transparent),
          -10px 0 28px color-mix(in oklch, #4da8ff 16%, transparent);
        overflow: visible;
      }
      .cirno-zone::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 14px;
        pointer-events: none;
        background: linear-gradient(
          90deg,
          color-mix(in oklch, #bde6ff 40%, transparent) 0%,
          transparent 74%
        );
        opacity: 0.72;
      }
      :root[data-theme="dark"] .cirno-zone {
        border-left-color: color-mix(in oklch, #6ec0ff 62%, #2a83cc 38%);
        box-shadow:
          inset 1px 0 0 color-mix(in oklch, #d5f0ff 18%, transparent),
          -14px 0 34px color-mix(in oklch, #4da8ff 24%, transparent);
      }
      :root[data-theme="dark"] .cirno-zone::before {
        opacity: 0.9;
      }
      #contentHeader,
      #welcome,
      #contentFrame {
        width: 100%;
        align-self: stretch;
      }
      .content-header {
        grid-column: 1;
        grid-row: 1;
        padding: 16px 28px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--header-bg);
        flex-shrink: 0;
        transition:
          background 0.3s,
          border-color 0.3s;
      }
      .content-title {
        font-family: var(--font-serif);
        font-size: 1.15rem;
        color: var(--text);
      }
      .content-title-en {
        font-size: 0.75rem;
        color: var(--text-sub);
        margin-top: 2px;
      }

      /* 鈹€鈹€ Breadcrumb 鈹€鈹€ */
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        padding: 0;
        background: transparent;
        border-bottom: 0;
        font-size: 0.75rem;
        color: var(--text-sub);
        flex-shrink: 0;
        transition:
          background 0.3s,
          border-color 0.3s;
      }
      .breadcrumb-home {
        color: var(--text-sub);
        cursor: pointer;
        transition: color 0.15s;
        text-decoration: none;
        font-weight: 500;
      }
      .breadcrumb-home:hover {
        color: var(--accent2);
      }
      .breadcrumb-sep {
        color: var(--border);
        font-size: 0.7rem;
        user-select: none;
        margin: 0 1px;
      }
      .breadcrumb-current {
        color: var(--text);
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: min(34vw, 420px);
      }

      :root[data-theme="dark"] .breadcrumb,
      :root[data-theme="dark"] .breadcrumb-home,
      :root[data-theme="dark"] .breadcrumb-sep,
      :root[data-theme="dark"] .breadcrumb-current {
        color: #faf9f5;
      }

      :root[data-theme="dark"] .breadcrumb-home:hover {
        color: var(--accent2);
      }

      /* ========= 娆㈣繋鍖哄煙鍏ㄦ柊璁捐锛氶粦鏉垮浘鐗囨寜鍘熷昂瀵告瘮渚嬪眳涓紝鏃犺鍓紝鏂囧瓧涓嬬Щ ========= */
      .welcome {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* 鏁翠綋鍨傜洿灞呬腑锛屼絾鍥剧墖杈冨ぇ鏃朵細鑷劧鍋忕Щ锛屾枃瀛楅€氳繃棰濆margin涓嬬Щ */
        gap: 24px;
        color: var(--text-sub);
        text-align: center;
        padding: 32px 24px 48px;
        overflow-y: auto;
      }

      /* 鍥剧墖瀹瑰櫒锛氬交搴曞幓闄ゅ渾褰€佽竟妗嗐€佽儗鏅檺鍒讹紝瀹屽叏灞曠ず鍘熷姣斾緥 */
      .welcome-circle {
        display: block;
        width: auto;
        max-width: 100%;
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
        margin: 0 auto;
        text-align: center;
        line-height: 0;
        /* 澧炲姞涓嬭竟璺濊鏂囧瓧閫傚綋涓嬬Щ */
        margin-bottom: 28px;
      }

      /* 榛戞澘鍥剧墖鏈韩锛氬師濮嬪昂瀵镐紭鍏堬紝浠呭綋瓒呭嚭瀹瑰櫒鏃剁瓑姣旂缉鏀撅紝涓ユ牸灞呬腑锛屾棤浠讳綍瑁佸壀 */
      .welcome-circle img {
        display: block;
        margin: 0 auto;
        width: 800px;
        max-width: 100%;
        height: auto;
        object-fit: contain; /* 纭繚姣斾緥瀹屾暣锛岀粷涓嶈鍓?*/
        border-radius: 0;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        transition: box-shadow 0.2s;
        background: transparent;
      }

      /* 鏍囬涓庢弿杩版枃瀛楄嚜鐒朵笅绉?(閰嶅悎鍥剧墖涓嬫柟 margin-bottom 宸蹭骇鐢熻冻澶熼棿璺? */
      .welcome h2 {
        font-family: var(--font-serif);
        font-size: 1.6rem;
        color: var(--text);
        margin: 0 0 8px 0;
        font-weight: 500;
        letter-spacing: -0.3px;
      }
      .welcome p {
        font-size: 0.95rem;
        max-width: 320px;
        line-height: 1.5;
        color: var(--text-sub);
        margin-top: 4px;
      }
      #welcomeSub {
        max-width: none;
        white-space: nowrap;
      }

      /* 鏆楄壊涓婚涓嬪浘鐗囬槾褰卞井璋?*/
      [data-theme="dark"] .welcome-circle img {
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      }

      /* 鍝嶅簲寮忥細鎵嬫満绔浘鐗囦笉浼氭孩鍑猴紝鏂囧瓧澶у皬鑸掗€?*/
      @media (max-width: 640px) {
        .welcome {
          padding: 24px 16px 40px;
          gap: 18px;
        }
        .welcome-circle {
          margin-bottom: 20px;
        }
        .welcome h2 {
          font-size: 1.3rem;
        }
        .welcome p {
          font-size: 0.85rem;
        }
      }

      iframe {
        flex: 1;
        border: none;
        width: 100%;
        background: var(--card-bg);
        display: none;
        transition: background 0.2s;
      }
      iframe.visible {
        display: block;
      }

      .mascot-widget {
        position: sticky;
        top: 18px;
        width: 100%;
        max-width: min(320px, 100%);
        margin: 0 auto;
        z-index: 3;
        pointer-events: auto;
        user-select: none;
        --mascot-ease: cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-widget.is-happy .mascot-avatar-shell {
        transform: translateY(-3px);
        box-shadow: 0 18px 42px rgba(48, 122, 175, 0.22);
      }
      .mascot-widget.is-happy .mascot-bubble {
        border-color: rgba(126, 186, 245, 0.9);
        box-shadow: 0 18px 38px rgba(77, 168, 255, 0.2);
      }
      .mascot-stack {
        display: flex;
        width: 100%;
        flex-direction: column-reverse;
        align-items: stretch;
        gap: 14px;
      }
      .mascot-panel {
        --avatar-offset: 186px;
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: relative;
        padding-top: 8px;
        border-radius: 10px;
        min-height: 292px;
      }
      .mascot-snowfall {
        --snow-accent: #69c7ff;
        --snow-accent-strong: #37b7ff;
        --snow-mist: #dff1ff;
        --snow-bright: #f7fbff;
        --snow-haze: #bcdfff;
        --snow-top-opacity: 0.9;
        --snow-bottom-opacity: 0.78;
        --snow-top-brightness: 1;
        --snow-top-contrast: 1;
        --snow-top-shift: 0px;
        --snow-bottom-shift: 0px;
        --snow-bottom-scale: 1;
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        z-index: 4;
        transition: opacity 110ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snowfall.is-active {
        opacity: 1;
      }
      .mascot-snowfall.is-blizzard::before {
        --snow-top-opacity: 0.96;
        --snow-top-brightness: 1.05;
        --snow-top-contrast: 1.025;
        --snow-top-shift: -5px;
        animation: mascotSnowfallPulse 1760ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snowfall.is-blizzard::after {
        --snow-bottom-opacity: 0.84;
        --snow-bottom-shift: -6px;
        --snow-bottom-scale: 1.02;
        animation: mascotSnowfallMistSurge 1960ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snowfall::before,
      .mascot-snowfall::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .mascot-snowfall::before {
        background:
          radial-gradient(
            circle at 50% 8%,
            color-mix(in srgb, var(--snow-bright) 20%, transparent) 0,
            transparent 48%
          ),
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--snow-accent) 22%, transparent) 0%,
            color-mix(in srgb, var(--snow-accent-strong) 7%, transparent) 18%,
            transparent 34%,
            color-mix(in srgb, var(--snow-mist) 10%, transparent) 74%,
            transparent 100%
          );
        opacity: var(--snow-top-opacity, 0.9);
        filter: brightness(var(--snow-top-brightness, 1))
          contrast(var(--snow-top-contrast, 1));
        transform: translate3d(0, var(--snow-top-shift, 0px), 0);
        transform-origin: 50% 0%;
        transition:
          opacity 120ms cubic-bezier(0.22, 1, 0.36, 1),
          filter 160ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 160ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snowfall::after {
        inset: auto 0 0;
        height: min(34vh, 280px);
        background: linear-gradient(
          180deg,
          transparent 0%,
          color-mix(in srgb, var(--snow-haze) 16%, transparent) 100%
        );
        opacity: var(--snow-bottom-opacity, 0.76);
        transform: translate3d(0, var(--snow-bottom-shift, 0px), 0)
          scaleY(var(--snow-bottom-scale, 1));
        transform-origin: 50% 100%;
        transition:
          opacity 130ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 170ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snow-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        contain: layout style paint;
        transition: filter 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .mascot-snow-layer[data-snow-layer="far"] {
        filter: saturate(0.92) brightness(1.02);
      }
      .mascot-snow-layer[data-snow-layer="mid"] {
        filter: brightness(1.03);
      }
      .mascot-snow-layer[data-snow-layer="near"] {
        filter: saturate(1.08) brightness(1.08);
      }
      .mascot-snowfall.is-blizzard .mascot-snow-layer[data-snow-layer="far"] {
        filter: saturate(0.95) brightness(1.04);
      }
      .mascot-snowfall.is-blizzard .mascot-snow-layer[data-snow-layer="mid"] {
        filter: saturate(1.01) brightness(1.055);
      }
      .mascot-snowfall.is-blizzard .mascot-snow-layer[data-snow-layer="near"] {
        filter: saturate(1.09) brightness(1.09);
      }
      :root[data-theme="light"] .mascot-snowfall {
        --snow-accent: #5f94cc;
        --snow-accent-strong: #4d84c2;
        --snow-mist: #bfd4f0;
        --snow-bright: #ffffff;
        --snow-haze: #c8daef;
        --snow-top-opacity: 0.98;
        --snow-bottom-opacity: 0.9;
        --snow-top-brightness: 1.1;
        --snow-top-contrast: 1.16;
      }
      :root[data-theme="light"] .mascot-snowfall::before {
        background:
          radial-gradient(
            circle at 50% 8%,
            color-mix(in srgb, var(--snow-bright) 24%, transparent) 0,
            transparent 52%
          ),
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--snow-accent) 30%, transparent) 0%,
            color-mix(in srgb, var(--snow-accent-strong) 14%, transparent) 20%,
            transparent 36%,
            color-mix(in srgb, var(--snow-mist) 16%, transparent) 76%,
            transparent 100%
          );
      }
      :root[data-theme="light"] .mascot-snowfall::after {
        background: linear-gradient(
          180deg,
          transparent 0%,
          color-mix(in srgb, var(--snow-haze) 24%, transparent) 100%
        );
      }
      :root[data-theme="light"]
        .mascot-snowfall.is-blizzard
        .mascot-snow-layer[data-snow-layer="far"] {
        filter: saturate(1.02) brightness(1.08) contrast(1.08);
      }
      :root[data-theme="light"]
        .mascot-snowfall.is-blizzard
        .mascot-snow-layer[data-snow-layer="mid"] {
        filter: saturate(1.08) brightness(1.1) contrast(1.1);
      }
      :root[data-theme="light"]
        .mascot-snowfall.is-blizzard
        .mascot-snow-layer[data-snow-layer="near"] {
        filter: saturate(1.12) brightness(1.13) contrast(1.12);
      }
      :root[data-theme="dark"] .mascot-snowfall {
        --snow-accent: #63c4ff;
        --snow-accent-strong: #45adf2;
        --snow-mist: #cde9ff;
        --snow-bright: #f6fbff;
        --snow-haze: #9fcaf1;
        --snow-top-opacity: 0.94;
        --snow-bottom-opacity: 0.82;
        --snow-top-brightness: 1.03;
        --snow-top-contrast: 1.04;
      }
      :root[data-theme="dark"] .mascot-snowfall::before {
        background:
          radial-gradient(
            circle at 50% 10%,
            color-mix(in srgb, var(--snow-bright) 24%, transparent) 0,
            transparent 44%
          ),
          radial-gradient(
            ellipse at 50% 52%,
            color-mix(in srgb, var(--snow-mist) 10%, transparent) 0%,
            transparent 66%
          ),
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--snow-accent) 24%, transparent) 0%,
            color-mix(in srgb, var(--snow-accent-strong) 11%, transparent) 20%,
            color-mix(in srgb, var(--snow-mist) 8%, transparent) 50%,
            color-mix(in srgb, var(--snow-mist) 12%, transparent) 78%,
            transparent 100%
          );
      }
      :root[data-theme="dark"] .mascot-snowfall::after {
        height: min(42vh, 360px);
        background: linear-gradient(
          180deg,
          transparent 0%,
          color-mix(in srgb, var(--snow-haze) 10%, transparent) 46%,
          color-mix(in srgb, var(--snow-haze) 20%, transparent) 100%
        );
      }
      .mascot-snowflake {
        position: absolute;
        top: -18vh;
        left: 0;
        opacity: 0;
        will-change: transform, opacity;
        animation: mascotSnowfallDrop var(--flake-duration, 2800ms) linear
          forwards;
      }
      .mascot-snowflake.is-static {
        animation: none;
        opacity: var(--flake-opacity, 0.72);
        transform: translate3d(0, var(--flake-static-y, 20vh), 0)
          scale(var(--flake-scale, 1));
      }
      .mascot-snowflake-core {
        width: var(--flake-size, 0.72rem);
        height: var(--flake-size, 0.72rem);
        display: block;
        position: relative;
        border-radius: 50%;
        opacity: var(--flake-opacity, 0.72);
        -webkit-mask-image: var(--flake-mask-url);
        -webkit-mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-image: var(--flake-mask-url);
        mask-size: contain;
        mask-repeat: no-repeat;
        mask-position: center;
        background:
          radial-gradient(
            circle at center,
            color-mix(in srgb, var(--snow-bright) 94%, var(--snow-tone) 6%) 0
              17%,
            transparent 18%
          ),
          radial-gradient(
              circle at center,
              color-mix(in srgb, var(--snow-bright) 86%, transparent) 0
                var(--flake-core-radius, 14%),
              transparent calc(var(--flake-core-radius, 14%) + 0.45%)
            )
            center / 100% 100% no-repeat,
          radial-gradient(
              circle at center,
              transparent 0 var(--flake-ring-inner, 24%),
              color-mix(in srgb, var(--snow-tone) 54%, transparent)
                calc(var(--flake-ring-inner, 24%) + 0.4%)
                var(--flake-ring-outer, 34%),
              transparent calc(var(--flake-ring-outer, 34%) + 0.4%)
            )
            center / 100% 100% no-repeat,
          linear-gradient(
              color-mix(in srgb, var(--snow-tone) 86%, var(--snow-bright) 14%) 0
                0
            )
            center / var(--flake-axis-thickness, 14%) 100% no-repeat,
          linear-gradient(
              90deg,
              color-mix(in srgb, var(--snow-tone) 86%, var(--snow-bright) 14%) 0
                0
            )
            center / 100% var(--flake-axis-thickness, 14%) no-repeat,
          linear-gradient(
              45deg,
              transparent 40.5%,
              color-mix(in srgb, var(--snow-tone) 84%, var(--snow-haze) 16%)
                46.5% 53.5%,
              transparent 59.5%
            )
            center / 100% 100% no-repeat,
          linear-gradient(
              -45deg,
              transparent 40.5%,
              color-mix(in srgb, var(--snow-tone) 84%, var(--snow-haze) 16%)
                46.5% 53.5%,
              transparent 59.5%
            )
            center / 100% 100% no-repeat;
        filter: blur(calc(var(--flake-blur, 0px) * 0.72)) contrast(1.08);
        box-shadow:
          0 0 calc(var(--flake-size, 0.72rem) * 0.95)
            color-mix(in srgb, var(--snow-glow) 52%, transparent),
          0 0 calc(var(--flake-size, 0.72rem) * 2.05)
            color-mix(in srgb, var(--snow-accent) 18%, transparent);
        transform-origin: center;
        animation: mascotSnowfallSway var(--sway-duration, 1800ms) ease-in-out
          infinite;
      }
      :root[data-theme="light"] .mascot-snowflake-core {
        filter: blur(calc(var(--flake-blur, 0px) * 0.72)) contrast(1.16)
          brightness(1.04);
        box-shadow:
          0 0 calc(var(--flake-size, 0.72rem) * 1.08)
            color-mix(in srgb, var(--snow-glow) 60%, transparent),
          0 0 calc(var(--flake-size, 0.72rem) * 2.2)
            color-mix(in srgb, var(--snow-accent) 24%, transparent),
          0 0 0 0.6px color-mix(in srgb, #141413 12%, transparent);
      }
      .mascot-snowflake-core::before,
      .mascot-snowflake-core::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        pointer-events: none;
      }
      .mascot-snowflake-core::before {
        background:
          linear-gradient(
              30deg,
              transparent 0 calc(50% - var(--flake-branch-band, 10%)),
              color-mix(in srgb, var(--snow-tone) 82%, var(--snow-bright) 18%)
                calc(50% - var(--flake-branch-band, 10%) + 0.4%),
              color-mix(in srgb, var(--snow-tone) 82%, var(--snow-bright) 18%)
                calc(50% + var(--flake-branch-band, 10%) - 0.4%),
              transparent calc(50% + var(--flake-branch-band, 10%))
            )
            center / 100% 100% no-repeat,
          linear-gradient(

      .mascot-widget.is-maxed .mascot-avatar-shell::before {
        animation: mascotHaloPulse 2.4s ease-in-out infinite;
      }
      .mascot-widget.is-maxed .mascot-avatar-shell::after {
        animation: mascotHaloPulse 2.4s ease-in-out infinite 0.22s;
      }
      .mascot-widget.is-maxed .mascot-meter {
        background:
          linear-gradient(
            180deg,
            rgba(14, 35, 68, 0.42),
            rgba(10, 28, 55, 0.48)
          ),
          url("background3.png");
        background-size: cover;
        background-position: 50% 50%;
        background-repeat: no-repeat;
        box-shadow: 0 0 0 1px color-mix(in oklch, #4da8ff 34%, transparent);
      }
      .mascot-widget.is-maxed .mascot-heart {
        animation: mascotHeartPulse 1.8s ease-in-out infinite;
      }
      .mascot-widget.is-maxed .mascot-meter-track {
        box-shadow: inset 0 0 0 1px color-mix(in oklch, #8ecfff 48%, #ffffff);
      }
      .mascot-widget.is-maxed .mascot-meter-fill {
        background: color-mix(in oklch, #4da8ff 44%, #184a88);
        box-shadow: none;
      }
      .mascot-widget.is-maxed .mascot-meter-fill::after {
        opacity: 1;
        animation: mascotMeterShimmer 2.4s linear infinite;
      }
      .mascot-widget.is-maxed .mascot-bubble.visible {
        border-color: rgba(255, 193, 128, 0.96);
        box-shadow:
          0 18px 40px rgba(255, 182, 111, 0.16),
          0 10px 24px rgba(241, 130, 196, 0.12);
      }
      .mascot-widget.is-maxed .mascot-burst span {
        opacity: 0;
        animation: none;
      }
      .mascot-widget.is-celebrating .mascot-stack {
        animation: mascotCelebratePop 0.82s var(--mascot-ease);
      }
      .mascot-widget.is-celebrating .mascot-burst span {
        animation: none;
      }
      [data-theme="dark"] .mascot-widget.is-maxed .mascot-avatar-shell {
        background: linear-gradient(
          180deg,
          rgba(53, 47, 40, 0.96),
          rgba(38, 26, 35, 0.96)
        );
        border-color: rgba(255, 216, 131, 0.52);
        box-shadow:
          0 22px 56px rgba(0, 0, 0, 0.4),
          0 0 36px rgba(255, 173, 105, 0.18);
      }
      [data-theme="dark"] .mascot-widget.is-maxed .mascot-bubble {
        background: rgba(39, 30, 36, 0.96);
        border-color: rgba(255, 185, 126, 0.48);
      }
      [data-theme="dark"] .mascot-widget.is-maxed .mascot-burst span {
        box-shadow: 0 0 16px rgba(255, 194, 122, 0.4);
      }
      @keyframes mascotFloat {
        0%,
        100% {
          transform: translateY(-6px) scale(1.04);
        }
        50% {
          transform: translateY(-10px) scale(1.05);
        }
      }
      @keyframes mascotHaloPulse {
        0%,
        100% {
          transform: scale(0.94);
          opacity: 0.68;
        }
        50% {
          transform: scale(1.04);
          opacity: 1;
        }
      }
      @keyframes mascotHeartPulse {
        0%,
        100% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.16);
        }
      }
      @keyframes mascotMeterShimmer {
        0% {
          background-position: -52% 0;
        }
        100% {
          background-position: 100% 0;
        }
      }
      @keyframes mascotSparkle {
        0%,
        100% {
          opacity: 0.12;
          transform: translate3d(0, 8px, 0) scale(0.52) rotate(45deg);
        }
        35% {
          opacity: 0.92;
          transform: translate3d(0, -8px, 0) scale(1) rotate(90deg);
        }
        70% {
          opacity: 0.4;
          transform: translate3d(0, -2px, 0) scale(0.72) rotate(130deg);
        }
      }
      @keyframes mascotCelebratePop {
        0% {
          transform: translateY(10px) scale(0.95);
        }
        45% {
          transform: translateY(-8px) scale(1.06);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }
      @keyframes mascotSnowfallDrop {
        0% {
          opacity: 0;
          transform: translate3d(0, -10vh, 0) scale(var(--flake-scale, 1));
        }
        8% {
          opacity: var(--flake-opacity, 0.72);
        }
        36% {
          opacity: calc(var(--flake-opacity, 0.72) * 1.04);
        }
        72% {
          opacity: calc(var(--flake-opacity, 0.72) * 0.96);
        }
        100% {
          opacity: 0;
          transform: translate3d(var(--flake-drift, 0px), 122vh, 0)
            scale(var(--flake-scale, 1));
        }
      }
      @keyframes mascotSnowfallSway {
        0% {
          transform: translate3d(calc(var(--flake-sway, 14px) * -0.6), 0, 0)
            rotate(var(--flake-rotate-start, -12deg));
        }
        50% {
          transform: translate3d(var(--flake-sway, 14px), 0, 0)
            rotate(var(--flake-rotate-mid, 0deg));
        }
        100% {
          transform: translate3d(calc(var(--flake-sway, 14px) * -0.72), 0, 0)
            rotate(var(--flake-rotate-end, 12deg));
        }
      }
      @keyframes mascotSnowfallPulse {
        0% {
          opacity: 0.9;
          transform: translate3d(0, 6px, 0) scaleY(0.98);
        }
        22% {
          opacity: 0.93;
          transform: translate3d(0, 2px, 0) scaleY(1);
        }
        48% {
          opacity: 0.965;
          transform: translate3d(0, -2px, 0) scaleY(1.02);
        }
        74% {
          opacity: 0.975;
          transform: translate3d(0, -5px, 0) scaleY(1.03);
        }
        100% {
          opacity: 0.96;
          transform: translate3d(0, -5px, 0) scaleY(1.01);
        }
      }
      @keyframes mascotSnowfallMistSurge {
        0% {
          opacity: 0.5;
          transform: translate3d(0, 16px, 0) scaleY(0.94);
        }
        24% {
          opacity: 0.64;
          transform: translate3d(0, 8px, 0) scaleY(0.98);
        }
        52% {
          opacity: 0.8;
          transform: translate3d(0, -2px, 0) scaleY(1.01);
        }
        78% {
          opacity: 0.86;
          transform: translate3d(0, -6px, 0) scaleY(1.03);
        }
        100% {
          opacity: 0.84;
          transform: translate3d(0, -6px, 0) scaleY(1.02);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .mascot-widget.is-maxed .mascot-avatar-shell,
        .mascot-widget.is-maxed .mascot-avatar-shell::before,
        .mascot-widget.is-maxed .mascot-avatar-shell::after,
        .mascot-widget.is-maxed .mascot-heart,
        .mascot-widget.is-maxed .mascot-meter-fill::after,
        .mascot-widget.is-maxed .mascot-burst span,
        .mascot-widget.is-celebrating .mascot-stack,
        .mascot-snowfall::before,
        .mascot-snowfall::after,
        .mascot-snowflake,
        .mascot-snowflake-core {
          animation: none !important;
        }
        .mascot-widget.is-maxed .mascot-burst span {
          opacity: 0;
          transform: translate3d(0, -3px, 0) scale(0.72) rotate(45deg);
        }
        .mascot-snowflake {
          opacity: var(--flake-opacity, 0.76);
          transform: translate3d(0, var(--flake-static-y, 20vh), 0)
            scale(var(--flake-scale, 1));
        }
      }

      @media (max-width: 1180px) and (min-width: 961px) {
        main {
          grid-template-columns: minmax(0, 1fr) minmax(
              200px,
              clamp(200px, 24vw, 280px)
            );
        }
        .cirno-zone {
          padding: 10px 8px 18px 6px;
        }
        .mascot-widget {
          max-width: 280px;
        }
      }

      @media (max-width: 1040px) and (min-width: 961px) {
        main {
          grid-template-columns: minmax(0, 1fr) minmax(
              184px,
              clamp(184px, 22vw, 244px)
            );
        }
        .mascot-widget {
          max-width: 244px;
        }
      }

      @media (max-width: 760px) {
        html,
        body {
          height: auto;
          overflow-y: auto;
        }
        body {
          min-height: 100vh;
          overflow-x: hidden;
        }
        .body-wrap {
          overflow: visible;
        }
        main {
          display: block;

          padding-right: 0;
          padding-bottom: 20px;
        }
        .main-shell {
          display: flex;

          gap: 18px;
        }
        .topic-column {
          order: 1;
          overflow: visible;
        }
        .cirno-zone {
          order: 2;
          padding: 18px 10px 14px;
          border-left: none;
          border-top: 1px solid color-mix(in oklch, #4da8ff 62%, #93d5ff 38%);
          background: none;
          box-shadow:
            inset 0 1px 0 color-mix(in oklch, #d5f0ff 56%, transparent),
            0 -8px 24px color-mix(in oklch, #4da8ff 14%, transparent);
          overflow: visible;
        }
        .cirno-zone::before {
          top: 0;
          bottom: auto;
          left: 0;
          right: 0;
          width: auto;
          height: 14px;
          background: linear-gradient(
            180deg,
            color-mix(in oklch, #bde6ff 36%, transparent) 0%,
            transparent 74%
          );
        }
        #contentHeader,
        #welcome,
        #contentFrame {
          width: 100%;
        }
        #contentFrame {
          flex: 0 0 auto;
          min-height: clamp(460px, 70vh, 880px);
        }
        .mascot-widget {
          position: relative;
          top: auto;
        }
      }

      @media (max-width: 720px) {
        header {
          min-height: 4.62rem;
        }
        main {
          padding-right: 0;
          padding-bottom: 12px;
        }
        .mascot-stack {
          gap: 12px;
        }
        .mascot-panel {
          --avatar-offset: 168px;
          min-height: 228px;
        }
        .mascot-meter {
          margin-top: 14px;
          min-height: 164px;
          padding: 12px 10px 14px;
        }
        .mascot-meter-label {
          gap: 12px;
          font-size: 0.68rem;
        }
        #mascotMeterTitle {
          font-size: 0.9rem;
        }
        .mascot-meter-count {
          font-size: 1.06rem;
        }
        .mascot-meter-track {
          margin-top: 14px;
        }
        .mascot-meter-scale {
          margin-top: 8px;
        }
        .mascot-bubble {
          width: min(100%, 216px);
          max-width: 216px;
          top: 12px;
        }
        .mascot-bubble.visible {
          min-height: 110px;
        }
        .mascot-bubble.is-final {
          max-width: 224px;
        }
        .mascot-bubble-text.is-final {
          font-size: 1.02rem;
        }
      }
    </style>
  </head>

          en: "Inscribed Angle Theorem",
          file: "8. 圆周角定理.html",
        },
        {
          zh: "圆内接四边形的性质",
          en: "Inscribed Quadrilateral",
          file: "9. 圆内接四边形的性质.html",
        },
        {
          zh: "切线的判定与性质",
          en: "Tangent Line Properties",
          file: "10. 切线的判定与性质.html",
        },
        {

      function loadMascotProgress() {

            localStorage.getItem(MASCOT_PROGRESS_STORAGE_KEY) ||
            localStorage.getItem(MASCOT_LEGACY_PROGRESS_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          mascotCompleted = new Set(
            Array.isArray(parsed)
              ? parsed
                  .map((key) => {
                    if (typeof key !== "string") return "";
                    if (hasNewProgress) return key;
                    return SPECIAL_TOPIC_FILES.has(key) ? "" : key;
                  })
                  .filter((key) => key && isMascotRewardKeyValid(key))
              : [],

      function isMascotConditionElementVisible(doc, selector) {
        const el = doc && selector ? doc.querySelector(selector) : null;
        if (!el) return false;
        const inlineDisplay = (el.style.display || "").trim().toLowerCase();
        const inlineVisibility = (el.style.visibility || "")
          .trim()
          .toLowerCase();
        if (inlineDisplay) {
          return inlineDisplay !== "none" && inlineVisibility !== "hidden";
        }
        const view = doc.defaultView || window;
        const style = view.getComputedStyle(el);
        return (
          style.display !== "none" &&
          style.visibility !== "hidden" &&
          parseFloat(style.opacity || "1") > 0
        );
      }

      function isMascotSpecialConditionMet(topicFile, doc) {
        if (topicFile === "4. 点与圆的位置关系.html") {
          return isMascotConditionElementVisible(
            doc,
            "#onCircleImageContainer",
          );
        }
        if (
          topicFile === "5. 直线与圆的位置关系.html" ||
          topicFile === "10. 切线的判定与性质.html"
        ) {
          return isMascotConditionElementVisible(doc, "#tangentImageContainer");
        }
        return true;
      }

      function attachMascotWatcher(topic) {
        detachMascotInteractionWatcher();
        const frame = document.getElementById("contentFrame");
        if (!frame || !topic) return;
        const rewardKey = getMascotRewardKey(topic.file);
        let doc;
        let frameWindow;
        try {
          doc = frame.contentDocument;
          frameWindow = frame.contentWindow;
        } catch (e) {
          return;
        }
        if (!doc || !frameWindow) return;
        injectMascotFrameStyles(doc);
        if (mascotCompleted.has(rewardKey)) {
          updateMascotUI();
          return;
        }

        const canvas = doc.getElementById("circleCanvas");
        if (!canvas) return;

        let pointerDownOnCanvas = false;
        let dragAwarded = false;
        let dragQualified = false;
        let startPoint = null;
        const moveThreshold = MASCOT_DRAG_THRESHOLD;
        const needsSpecialCondition = SPECIAL_TOPIC_FILES.has(topic.file);

        const getPoint = (event) => {
          if (event.touches && event.touches[0]) {
            return { x: event.touches[0].clientX, y: event.touches[0].clientY };
          }
          if (event.changedTouches && event.changedTouches[0]) {
            return {
              x: event.changedTouches[0].clientX,
              y: event.changedTouches[0].clientY,
            };
          }
          return { x: event.clientX, y: event.clientY };
        };

        const awardForTopicDrag = () => {
          if (dragAwarded || mascotCompleted.has(rewardKey)) return;
          if (
            needsSpecialCondition &&
            !isMascotSpecialConditionMet(topic.file, doc)
          )
            return;
          dragAwarded = true;
          celebrateMascotGoal(topic.file);
        };

        const handleStart = (event) => {
          pointerDownOnCanvas = true;
          dragQualified = false;
          startPoint = getPoint(event);
        };

        const handleMove = (event) => {
          if (
            !pointerDownOnCanvas ||
            dragAwarded ||
            mascotCompleted.has(rewardKey)
          )
            return;
          // Special topics (04/05/10) award immediately once the condition is met.
          if (
            needsSpecialCondition &&
            isMascotSpecialConditionMet(topic.file, doc)
          ) {
            awardForTopicDrag();
            return;
          }
          const currentPoint = getPoint(event);
          const dx = currentPoint.x - startPoint.x;
          const dy = currentPoint.y - startPoint.y;
          if (!dragQualified) {
            if (Math.hypot(dx, dy) < moveThreshold) return;
            dragQualified = true;
          }
          awardForTopicDrag();
        };

        const handleEnd = () => {
          pointerDownOnCanvas = false;
          dragQualified = false;
          startPoint = null;
        };

        const handleVisibilityReset = () => {
          if (doc.hidden) handleEnd();
        };

        const addListeners = (target, specs) => {
          specs.forEach(({ type, handler, options }) =>
            target.addEventListener(type, handler, options),
          );
        };

        const removeListeners = (target, specs) => {
          specs.forEach(({ type, handler, options }) =>
            target.removeEventListener(type, handler, options),
          );
        };

        const canvasStartEvents = [
          { type: "pointerdown", handler: handleStart },
          { type: "mousedown", handler: handleStart },
          {
            type: "touchstart",
            handler: handleStart,
            options: { passive: true },
          },
        ];
        const windowMoveEvents = [
          { type: "pointermove", handler: handleMove },
          { type: "mousemove", handler: handleMove },
          {
            type: "touchmove",
            handler: handleMove,
            options: { passive: true },
          },
        ];
        const windowEndEvents = [
          { type: "pointerup", handler: handleEnd },
          { type: "pointercancel", handler: handleEnd },
          { type: "mouseup", handler: handleEnd },
          { type: "touchend", handler: handleEnd },
          { type: "touchcancel", handler: handleEnd },
          { type: "blur", handler: handleEnd },
        ];
        const documentEndEvents = [{ type: "mouseleave", handler: handleEnd }];

        addListeners(canvas, canvasStartEvents);
        addListeners(frameWindow, windowMoveEvents);
        addListeners(frameWindow, windowEndEvents);
        addListeners(doc, documentEndEvents);
        doc.addEventListener("visibilitychange", handleVisibilityReset);

        mascotInteractionCleanup = () => {
          removeListeners(canvas, canvasStartEvents);
          removeListeners(frameWindow, windowMoveEvents);
          removeListeners(frameWindow, windowEndEvents);
          removeListeners(doc, documentEndEvents);
          doc.removeEventListener("visibilitychange", handleVisibilityReset);
        };
      }

      function setRootFontSize(size) {
        size = Math.min(MAX_FONT_SIZE, Math.max(MIN_FONT_SIZE, size));
        currentFontStep = FONT_SIZE_STEPS.reduce(
          (bestIndex, stepSize, index) => {
            return Math.abs(stepSize - size) <
              Math.abs(FONT_SIZE_STEPS[bestIndex] - size)
              ? index
              : bestIndex;
          },
          0,
        );
        size = FONT_SIZE_STEPS[currentFontStep];
        currentFontSize = size;
        document.documentElement.style.fontSize = size + "px";
        document.documentElement.style.setProperty(
          "--settings-font-step",
          String(currentFontStep),
        );
        updateSettingsUI();
        localStorage.setItem(
          "circlelab_game_font_step",
          String(currentFontStep),
        );
        broadcast({ _src: "circlelab", fontSize: currentFontSize });
      }

      function changeFontSize(delta) {
        setFontStep(currentFontStep + delta);
      }

      function setFontStep(step) {
        const nextStep = Math.min(
          FONT_SIZE_STEPS.length - 1,
          Math.max(0, Number(step) || 0),
        );
        setRootFontSize(FONT_SIZE_STEPS[nextStep]);
        const slider = document.querySelector(".settings-font-slider");
        if (slider) {
          slider.classList.remove("is-animating");
          void slider.offsetWidth;
          slider.classList.add("is-animating");
        }
      }

        const breadcrumbHome = document.getElementById("breadcrumbHome");
        const breadcrumbCurrent = document.getElementById("breadcrumbCurrent");
        if (breadcrumb) breadcrumb.style.display = "flex";
        if (breadcrumbHome)
          breadcrumbHome.textContent = i18n[lang].breadcrumbHome;
        if (breadcrumbCurrent) breadcrumbCurrent.textContent = getTopicLabel(t);

        // 鏇存柊澶撮儴鏍囬
        activeTopicHeader = null;
        applyTopicHeader(t);

        // 鍔犺浇iframe鍐呭
        frame.classList.remove("visible");
        frame.onload = function () {
          embedTopicCardHeader(frame);
          activeTopicHeader =
            readTopicHeaderFromFrame(frame) || getTopicHeaderFallback(t);
          applyTopicHeader(t);
          requestAnimationFrame(() => {
            frame.classList.add("visible");
            requestAnimationFrame(() => {
              try {
                frame.contentDocument
                  ?.querySelector('style[data-embed-theme-lock="true"]')
                  ?.remove();
              } catch (e) {}
            });
          });
          // 纭繚瀛愰〉闈㈣幏寰楃埗椤甸潰鐨勮瑷€銆佷富棰樸€佸瓧鍙?
          broadcast({ _src: "circlelab", lang: lang });
          broadcast({
            _src: "circlelab",
            theme:
              document.documentElement.getAttribute("data-theme") || "light",
          });
          broadcast({ _src: "circlelab", fontSize: currentFontSize });
          try {
            frame.contentWindow.postMessage(
              { _src: "circlelab", topicIndex: activeIndex, topicFile: t.file },
              "*",
            );
          } catch (e) {}
          attachMascotWatcher(t);
        };
        frame.src = t.file;
        // 閲嶆柊楂樹寒渚ц竟鏍?
        buildSidebar();
      }

      // 鍚慽frame骞挎挱娑堟伅锛堜富棰樸€佽瑷€銆佷富棰樻ā寮忋€佸瓧鍙凤級
      function broadcast(msg) {
        const frame = document.getElementById("contentFrame");
        if (frame && frame.contentWindow && frame.contentWindow.postMessage) {
          try {
            frame.contentWindow.postMessage(msg, "*");
          } catch (e) {
            // 璺ㄥ煙闄愬埗蹇界暐锛堝悓鍩熶竴鑸棤闂锛?
          }
        }
      }

      // 璇█鍒囨崲 (涓?鑻?
      function setLanguage(nextLang) {
        if (!i18n[nextLang] || nextLang === lang) return;
        lang = nextLang;
        const welcomeTitle = document.getElementById("welcomeTitle");
        const welcomeSub = document.getElementById("welcomeSub");
        if (welcomeTitle) welcomeTitle.textContent = i18n[lang].welcomeTitle;
        if (welcomeSub) welcomeSub.textContent = i18n[lang].welcomeSub;
        updateSidebarButton();
        updateMascotUI();
        updateBgmMuteButton();

        if (activeIndex >= 0 && topics[activeIndex]) {
          const t = topics[activeIndex];
          applyTopicHeader(t);
          const breadcrumbHome = document.getElementById("breadcrumbHome");
          const breadcrumbCurrent =
            document.getElementById("breadcrumbCurrent");
          if (breadcrumbHome)
            breadcrumbHome.textContent = i18n[lang].breadcrumbHome;
          if (breadcrumbCurrent)
            breadcrumbCurrent.textContent = getTopicLabel(t);
        } else {
          const breadcrumbHome = document.getElementById("breadcrumbHome");
          if (breadcrumbHome)
            breadcrumbHome.textContent = i18n[lang].breadcrumbHome;
        }

        buildSidebar();
        updateSettingsUI();
        setSettingsOpen(false);
        broadcast({ _src: "circlelab", lang: lang });
      }

      function _legacyToggleLangDeprecated() {
        return;
        lang = lang === "zh" ? "en" : "zh";
        // 娆㈣繋鐣岄潰鏂囨
        const welcomeTitle = document.getElementById("welcomeTitle");
        const welcomeSub = document.getElementById("welcomeSub");
        if (welcomeTitle) welcomeTitle.textContent = i18n[lang].welcomeTitle;
        if (welcomeSub) welcomeSub.textContent = i18n[lang].welcomeSub;
        updateSidebarButton();
        updateMascotUI();

        // 濡傛灉褰撳墠宸插姞杞芥煇涓富棰橈紝鏇存柊鍐呭鍖哄ご閮ㄦ爣棰樺強渚ц竟鏍?
        if (activeIndex >= 0 && topics[activeIndex]) {
          const t = topics[activeIndex];
          applyTopicHeader(t);
          // 鍚屾鏇存柊 breadcrumb
          const breadcrumbHome = document.getElementById("breadcrumbHome");
          const breadcrumbCurrent =
            document.getElementById("breadcrumbCurrent");
          if (breadcrumbHome)
            breadcrumbHome.textContent = i18n[lang].breadcrumbHome;
          if (breadcrumbCurrent)
            breadcrumbCurrent.textContent = lang === "zh" ? t.zh : t.en;
        } else {
          // 鏈姞杞戒富棰樻椂涔熸洿鏂?Home 鏂囧瓧锛坆readcrumb 姝ゆ椂鏄殣钘忕殑锛岄鏇存柊澶囩敤锛?
          const breadcrumbHome = document.getElementById("breadcrumbHome");
          if (breadcrumbHome)
            breadcrumbHome.textContent = i18n[lang].breadcrumbHome;
        }
        // 閲嶅缓渚ц竟鏍忥紙鐩綍鏂囧瓧涓嫳鍚屾锛?
        buildSidebar();
        updateSettingsUI();
        // 骞挎挱璇█鍙樻洿缁檌frame
        broadcast({ _src: "circlelab", lang: lang });
      }

      // 鏄?鏆椾富棰樺垏鎹?
      function toggleLang() {
        setLanguage(lang === "zh" ? "en" : "zh");
      }

      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") === "dark";
        const newTheme = isDark ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        // 骞挎挱涓婚鍙樺寲鑷虫墍鏈夊瓙椤甸潰
        broadcast({ _src: "circlelab", theme: newTheme });
        // 淇濆瓨涓婚鍋忓ソ
        localStorage.setItem("circlelab_theme", newTheme);
        updateSettingsUI();
      }

      // 鐩戝惉鏉ヨ嚜iframe鐨勮姹傦紙渚嬪瀛愰〉闈富鍔ㄨ姹傜埗绾х姸鎬侊級
      window.addEventListener("message", (event) => {
        if (event.data && event.data._src === "circlelab") {
          if (event.data.mascotDrag) {
            return;
          }
          // 瀛愰〉闈㈣姹傚悓姝ュ綋鍓嶈瑷€銆佷富棰樻垨瀛楀彿
          if (event.data.requestSync) {
            broadcast({ _src: "circlelab", lang: lang });
            broadcast({
              _src: "circlelab",
              theme:
                document.documentElement.getAttribute("data-theme") || "light",
            });
            broadcast({ _src: "circlelab", fontSize: currentFontSize });
          }
        }
      });

      // 璁剧疆鏍忎笌椤堕儴鎸夐挳缁戝畾
      function bindFontControls() {
        const sidebarBtn = document.getElementById("btnSidebar");
        const resetBtn = document.getElementById("btnResetMascot");
        const muteBtn = document.getElementById("btnMuteBgm");
        const mascotAvatarButton =
          document.getElementById("mascotAvatarButton");
        const mascotPanel = document.querySelector(".mascot-panel");
        const settingsShell = document.querySelector("[data-settings]");
        const settingsToggle = document.querySelector("[data-settings-toggle]");
        const fontRange = document.querySelector("[data-font-scale-range]");
        if (sidebarBtn) sidebarBtn.addEventListener("click", toggleSidebar);
        if (resetBtn) resetBtn.addEventListener("click", resetMascotProgress);
        if (muteBtn) muteBtn.addEventListener("click", toggleBgmMute);
        if (settingsToggle) {
          settingsToggle.addEventListener("click", (event) => {
            event.stopPropagation();
            const isOpen =
              settingsToggle.getAttribute("aria-expanded") === "true";
            setSettingsOpen(!isOpen);
          });
        }
        document
          .querySelectorAll("[data-language-option]")
          .forEach((button) => {
            button.addEventListener("click", () => {
              const nextLang = button.getAttribute("data-language-option");
              if (nextLang) setLanguage(nextLang);
            });
          });
        document.querySelectorAll("[data-theme-option]").forEach((button) => {
          button.addEventListener("click", () => {
            const nextTheme = button.getAttribute("data-theme-option");
            const currentTheme =
              document.documentElement.getAttribute("data-theme") || "light";
            if (nextTheme && nextTheme !== currentTheme) toggleTheme();
          });
        });
        if (fontRange) {
          fontRange.addEventListener("input", () =>
            setFontStep(Number(fontRange.value)),
          );
        }
        document.addEventListener("click", (event) => {
          if (settingsShell && !settingsShell.contains(event.target))
            setSettingsOpen(false);
          if (mascotPanel && !mascotPanel.contains(event.target)) {
            hideMascotSpeech();
            mascotActiveSpeechMode = "";
            mascotActiveSpeechQuoteIndex = -1;
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") setSettingsOpen(false);
        });
        if (mascotAvatarButton) {
          mascotAvatarButton.addEventListener("click", showMascotRandomChat);
          mascotAvatarButton.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              showMascotRandomChat();
            }
          });
        }
      }

      // 鐐瑰嚮 breadcrumb 棣栭〉杩斿洖娆㈣繋鐣岄潰
      function goHome() {
        activeIndex = -1;
        activeTopicHeader = null;
        detachMascotInteractionWatcher();
        const welcomeDiv = document.getElementById("welcome");
        const contentHeaderDiv = document.getElementById("contentHeader");
        const frame = document.getElementById("contentFrame");
        const breadcrumb = document.getElementById("breadcrumb");
        if (welcomeDiv) welcomeDiv.style.display = "";
        if (contentHeaderDiv) contentHeaderDiv.style.display = "none";
        if (frame) {
          frame.classList.remove("visible");
          frame.src = "about:blank";
        }
        if (breadcrumb) breadcrumb.style.display = "none";
        buildSidebar();
      }

      function init() {
        loadMascotProgress();
        mascotWasMaxed = getMascotBondValue() >= MASCOT_BOND_MAX;
        primeMascotBondText();
        setRootFontSize(DEFAULT_FONT_SIZE);
        bindFontControls();
        buildSidebar();
        updateMascotUI();
        const savedSidebarState = localStorage.getItem(
          "circlelab_sidebar_collapsed",
        );
        isSidebarCollapsed = savedSidebarState === "1";
        applySidebarState();

        // 鎭㈠涓婚鍋忓ソ
        const savedTheme = localStorage.getItem("circlelab_theme");
        if (savedTheme && (savedTheme === "dark" || savedTheme === "light")) {
          if (
            savedTheme !== document.documentElement.getAttribute("data-theme")
          ) {
            document.documentElement.setAttribute("data-theme", savedTheme);
          }
        } else {
          const current =
            document.documentElement.getAttribute("data-theme") || "light";
          localStorage.setItem("circlelab_theme", current);
        }
        updateSettingsUI();
        bgmMuted = localStorage.getItem(BGM_MUTE_STORAGE_KEY) === "1";
        updateBgmMuteButton();
        applyBgmMuteState();
        tryStartBgmPlayback();

        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mut) => {
            if (mut.attributeName === "data-theme") {
              const newTheme =
                document.documentElement.getAttribute("data-theme") || "light";
              localStorage.setItem("circlelab_theme", newTheme);
              broadcast({ _src: "circlelab", theme: newTheme });
              updateSettingsUI();
            }
          });
        });
        observer.observe(document.documentElement, { attributes: true });

        window.toggleLang = toggleLang;
        window.toggleTheme = toggleTheme;
        window.goHome = goHome;
        window.toggleSidebar = toggleSidebar;
      }
      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>

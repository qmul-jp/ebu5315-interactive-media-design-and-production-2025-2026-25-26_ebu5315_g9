<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆心角定理</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .descriptions {
            margin-top: 16px;
            line-height: 2.2;
            font-size: 1em;
        }
        .theorem {
            font-weight: bold;
            margin-top: 8px;
            font-size: 1.1em;
        }
        .arc-label {
            display: inline-block;
            position: relative;
            padding-top: 0.3em;
        }
        .arc-label .arc-symbol {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(1.3);
            font-size: 0.75em;
            line-height: 1;
        }
    
        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; }
        html,body {
            background: var(--bg) !important;
            color: var(--fg) !important;
            transition: background .2s, color .2s;
        }
        h3 { color: var(--fg); }

        canvas { background: var(--bg) !important; }

    </style>
</head>
<body>
    <div data-cl-zh><h3>圆心角定理</h3></div><div data-cl-en style="display:none"><h3>Central Angle Theorem</h3></div>

    <div>
        <canvas id="circleCanvas" width="600" height="500" style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div class="descriptions">
        ∠AOB = <span id="valAngle1">0.00</span>° &nbsp;&nbsp;
        ∠COD = <span id="valAngle2">0.00</span>° &nbsp;&nbsp;
        <span id="angleEqual">—</span><br>

        <span class="arc-label"><span class="arc-symbol">⌢</span>AB</span> = <span id="valArc1">0.00</span>
        &nbsp;&nbsp;
        <span class="arc-label"><span class="arc-symbol">⌢</span>CD</span> = <span id="valArc2">0.00</span>
        &nbsp;&nbsp;
        <span id="arcEqual">—</span><br>

        AB = <span id="valChord1">0.00</span>
        &nbsp;&nbsp;
        CD = <span id="valChord2">0.00</span>
        &nbsp;&nbsp;
        <span id="chordEqual">—</span>
    </div>

<div data-cl-zh><div class="theorem">在同圆中，相等的圆心角所对的弧相等，所对的弦相等</div></div><div data-cl-en style="display:none"><div class="theorem">In the same circle, equal central angles subtend equal arcs and equal chords</div></div>

    <script>
        (function () {

            /* 主题色辅助 */
            function _fg() { return document.documentElement.getAttribute('data-theme')==='dark' ? '#ffffff' : '#000000'; }
            function _bg() { return document.documentElement.getAttribute('data-theme')==='dark' ? '#000000' : '#ffffff'; }

            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');

            const cx = 300, cy = 250, radius = 180;

            // 四个点的初始角度（度）
            // A、B 决定圆心角 ∠AOB；C、D 决定圆心角 ∠COD
            let angleA = 10;
            let angleB = 80;
            let angleC = 160;
            let angleD = 230;

            const spanAngle1  = document.getElementById('valAngle1');
            const spanAngle2  = document.getElementById('valAngle2');
            const spanAngleEq = document.getElementById('angleEqual');
            const spanArc1    = document.getElementById('valArc1');
            const spanArc2    = document.getElementById('valArc2');
            const spanArcEq   = document.getElementById('arcEqual');
            const spanChord1  = document.getElementById('valChord1');
            const spanChord2  = document.getElementById('valChord2');
            const spanChordEq = document.getElementById('chordEqual');

            let dragging = false;
            let dragTarget = null;

            function deg2rad(d) { return d * Math.PI / 180; }

            function getPoint(deg) {
                return {
                    x: cx + radius * Math.cos(deg2rad(deg)),
                    y: cy + radius * Math.sin(deg2rad(deg))
                };
            }

            function smallAngle(a, b) {
                let diff = Math.abs(a - b) % 360;
                if (diff > 180) diff = 360 - diff;
                return diff;
            }

            function dist(p1, p2) {
                return Math.hypot(p1.x - p2.x, p1.y - p2.y);
            }

            function eqSymbol(a, b, tol) {
                return Math.abs(a - b) < tol ? '=' : '≠';
            }

            // 吸附阈值（度）：两圆心角差距在此范围内自动吸附为相等
            const SNAP_DEG = 5;

            function update() {
                let ang1 = smallAngle(angleA, angleB);
                let ang2 = smallAngle(angleC, angleD);

                // 吸附：若两圆心角接近，将拖动中的那组吸附到另一组
                if (Math.abs(ang1 - ang2) < SNAP_DEG) {
                    if (dragTarget === 'A') {
                        const sign = ((angleB - angleA + 360) % 360) > 180 ? -1 : 1;
                        angleA = angleB - sign * ang2;
                    } else if (dragTarget === 'B') {
                        const sign = ((angleB - angleA + 360) % 360) > 180 ? -1 : 1;
                        angleB = angleA + sign * ang2;
                    } else if (dragTarget === 'C') {
                        const sign = ((angleD - angleC + 360) % 360) > 180 ? -1 : 1;
                        angleC = angleD - sign * ang1;
                    } else if (dragTarget === 'D') {
                        const sign = ((angleD - angleC + 360) % 360) > 180 ? -1 : 1;
                        angleD = angleC + sign * ang1;
                    }
                    ang1 = smallAngle(angleA, angleB);
                    ang2 = smallAngle(angleC, angleD);
                }

                const isEqual = Math.abs(ang1 - ang2) < 0.5;
                const green = '#27ae60';

                const pA = getPoint(angleA), pB = getPoint(angleB);
                const pC = getPoint(angleC), pD = getPoint(angleD);

                const arc1   = radius * deg2rad(ang1);
                const arc2   = radius * deg2rad(ang2);
                const chord1 = dist(pA, pB);
                const chord2 = dist(pC, pD);

                const sym = isEqual ? '=' : '≠';
                const col = isEqual ? green : '#333';

                spanAngle1.textContent = ang1.toFixed(2);
                spanAngle2.textContent = ang2.toFixed(2);
                spanAngleEq.textContent = '∠AOB ' + sym + ' ∠COD';
                spanAngleEq.style.color = col;

                spanArc1.textContent = arc1.toFixed(2);
                spanArc2.textContent = arc2.toFixed(2);
                spanArcEq.innerHTML =
                    '<span class="arc-label"><span class="arc-symbol">⌢</span>AB</span>'
                    + ' ' + sym + ' '
                    + '<span class="arc-label"><span class="arc-symbol">⌢</span>CD</span>';
                spanArcEq.style.color = col;

                spanChord1.textContent = chord1.toFixed(2);
                spanChord2.textContent = chord2.toFixed(2);
                spanChordEq.textContent = 'AB ' + sym + ' CD';
                spanChordEq.style.color = col;

                drawCanvas(pA, pB, pC, pD, ang1, ang2, isEqual);
            }

            function drawArcBetween(a1, a2, color) {
                let diff = ((a2 - a1) % 360 + 360) % 360;
                let anticlockwise = diff > 180;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, deg2rad(a1), deg2rad(a2), anticlockwise);
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            function drawCanvas(pA, pB, pC, pD, ang1, ang2, isEqual) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const col1 = isEqual ? '#27ae60' : '#e74c3c';
                const col2 = isEqual ? '#27ae60' : '#2980b9';
                const fill1 = isEqual ? 'rgba(39,174,96,0.10)' : 'rgba(231,76,60,0.08)';
                const fill2 = isEqual ? 'rgba(39,174,96,0.10)' : 'rgba(41,128,185,0.08)';

                // 画圆
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = _fg()==='#ffffff'?'#555':'#ccc';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 画弧
                drawArcBetween(angleA, angleB, col1);
                drawArcBetween(angleC, angleD, col2);

                // 扇形填充
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, deg2rad(angleA), deg2rad(angleB),
                    ((angleB - angleA + 360) % 360) > 180);
                ctx.closePath();
                ctx.fillStyle = fill1;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, deg2rad(angleC), deg2rad(angleD),
                    ((angleD - angleC + 360) % 360) > 180);
                ctx.closePath();
                ctx.fillStyle = fill2;
                ctx.fill();

                // 半径
                ctx.lineWidth = 1.5;
                [[pA, col1], [pB, col1], [pC, col2], [pD, col2]].forEach(([p, c]) => {
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(p.x, p.y);
                    ctx.strokeStyle = c;
                    ctx.stroke();
                });

                // 弦
                ctx.setLineDash([6, 3]);
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.moveTo(pA.x, pA.y);
                ctx.lineTo(pB.x, pB.y);
                ctx.strokeStyle = col1;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(pC.x, pC.y);
                ctx.lineTo(pD.x, pD.y);
                ctx.strokeStyle = col2;
                ctx.stroke();
                ctx.setLineDash([]);

                // 圆心角小弧标注
                const labelR = 28;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, labelR, deg2rad(angleA), deg2rad(angleB),
                    ((angleB - angleA + 360) % 360) > 180);
                ctx.strokeStyle = col1;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(cx, cy, labelR, deg2rad(angleC), deg2rad(angleD),
                    ((angleD - angleC + 360) % 360) > 180);
                ctx.strokeStyle = col2;
                ctx.stroke();

                // 圆心 O
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
                ctx.fillStyle = _fg();
                ctx.fill();
                ctx.font = '14px sans-serif';
                ctx.fillStyle = _fg();
                ctx.fillText('O', cx - 15, cy - 8);

                // 四个点
                const pts = [
                    { p: pA, label: 'A', color: col1 },
                    { p: pB, label: 'B', color: col1 },
                    { p: pC, label: 'C', color: col2 },
                    { p: pD, label: 'D', color: col2 },
                ];
                pts.forEach(({ p, label, color }) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.fillStyle = _fg();
                    ctx.fillText(label, p.x + 8, p.y - 8);
                });
            }

            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) * (canvas.width / rect.width),
                    y: (e.clientY - rect.top)  * (canvas.height / rect.height)
                };
            }

            canvas.addEventListener('mousedown', function (e) {
                const m = getMousePos(e);
                const pts = [
                    { label: 'A', p: getPoint(angleA) },
                    { label: 'B', p: getPoint(angleB) },
                    { label: 'C', p: getPoint(angleC) },
                    { label: 'D', p: getPoint(angleD) },
                ];
                const threshold = 15;
                for (const { label, p } of pts) {
                    if (Math.hypot(m.x - p.x, m.y - p.y) < threshold) {
                        dragging = true;
                        dragTarget = label;
                        return;
                    }
                }
            });

            window.addEventListener('mousemove', function (e) {
                if (!dragging) return;
                const m = getMousePos(e);
                const deg = Math.atan2(m.y - cy, m.x - cx) * 180 / Math.PI;
                if      (dragTarget === 'A') angleA = deg;
                else if (dragTarget === 'B') angleB = deg;
                else if (dragTarget === 'C') angleC = deg;
                else if (dragTarget === 'D') angleD = deg;
                update();
            });

            window.addEventListener('mouseup',    () => { dragging = false; dragTarget = null; });
            canvas.addEventListener('mouseleave', () => { dragging = false; dragTarget = null; });

            update();
        
            // expose redraw for theme/lang
            window._clRedraw = function(){ update(); };

        })();
    </script>

<script>
/* === CircleLab bridge: 接收主界面的 postMessage === */
(function(){
    // 语言和主题状态
    window._CL = { lang: 'zh', theme: 'light' };

    function applyLang(lang) {
        window._CL.lang = lang;
        // 显示/隐藏双语块
        document.querySelectorAll('[data-cl-zh]').forEach(function(el) {
            el.style.display = lang === 'zh' ? '' : 'none';
        });
        document.querySelectorAll('[data-cl-en]').forEach(function(el) {
            el.style.display = lang === 'en' ? '' : 'none';
        });
        // 重绘canvas（动态文字需要更新）
        if (typeof _clRedraw === 'function') _clRedraw();
    }

    function applyTheme(theme) {
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        // 重绘canvas（颜色需要更新）
        if (typeof _clRedraw === 'function') _clRedraw();
    }

    window.addEventListener('message', function(ev) {
        if (!ev.data || ev.data._src !== 'circlelab') return;
        if (ev.data.lang)  applyLang(ev.data.lang);
        if (ev.data.theme) applyTheme(ev.data.theme);
    });

    // 初始化：从父页面读取当前状态
    window.addEventListener('DOMContentLoaded', function() {
        try {
            var p = window.parent;
            if (p._CL_lang)  applyLang(p._CL_lang);
            if (p._CL_theme) applyTheme(p._CL_theme);
        } catch(e) {}
        applyLang(window._CL.lang);
        applyTheme(window._CL.theme);
    });
})();
</script>

</body>
</html>

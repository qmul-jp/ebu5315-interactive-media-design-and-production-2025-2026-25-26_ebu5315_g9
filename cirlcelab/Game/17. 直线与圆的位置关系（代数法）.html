<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直线与圆的位置关系（代数法） - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>

        body {
            font-family: 'Noto Sans SC', 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Source Han Serif SC', 'Noto Serif SC', 'Anthropic Serif', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .canvas-container {
            padding: 24px 28px 12px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'Noto Sans SC', 'Manrope', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 16px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .eq-block {
            margin: 8px 28px 20px;
            background: var(--hover-bg);
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 0.85rem;
            font-family: 'Noto Sans SC', 'Manrope', sans-serif;  /* 与前面保持一致 */
            color: var(--text);
            text-align: left;
            line-height: 1.6;
            border: 1px solid var(--border);
        }
        
        /* ===== 新增功能：相切时显示的图片容器样式（完全独立，不影响任何原有布局）===== */
        .tangent-img-wrapper {
            text-align: center;
            margin: 0 28px 18px;          /* 与推导块和交互提示协调，不拥挤 */
            padding: 0;
            transition: all 0.2s ease;
        }
        .tangent-img-wrapper img {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 160px;             /* 卡片宽度范围内舒适 */
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            background: var(--card-bg);
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>直线与圆的位置关系（代数法）</div>
        <div class="title" data-cl-en style="display:none">Line–Circle Relationship (Algebraic)</div>
        <div class="sub-en" data-cl-zh>联立方程 · 判别式 Δ · 相离 / 相切 / 相交</div>
        <div class="sub-en" data-cl-en style="display:none">Simultaneous Equations · Discriminant Δ · Separate / Tangent / Intersect</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="620" height="460" style="width:100%; height:auto; max-width:620px; aspect-ratio:620/460"></canvas>
    </div>

    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    <div class="eq-block" id="derivationBlock"></div>
    
    <!-- 新增：直线与圆相切时显示图片的容器（默认隐藏，位于推导块下方，交互提示上方） -->
    <div id="tangentImageContainer" class="tangent-img-wrapper" style="display: none;">
        <img src="相切.png" alt="直线与圆相切示意图" id="tangentImg">
    </div>
    
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽圆心 O 或直线上的控制点 L₁、L₂</span><span data-cl-en style="display:none">Drag center O or line handles L₁, L₂</span></span>
    </div>
</div>

<script>
    (function () {
        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const CANVAS_W = 620, CANVAS_H = 460;
        const SCALE = 45;
        const OX = CANVAS_W / 2, OY = CANVAS_H / 2;

        // 可调节参数
        let oa = 0.5, ob = -0.5, oR = 3.0;          // 圆心 (a,b)，半径
        // 直线上两个可拖动控制点（画布坐标）
        let L1 = toCanvas(-6,  1.5);
        let L2 = toCanvas( 6, -0.5);

        let dragging = false, dragTarget = null;
        document.documentElement.style.fontSize = '16px';

        // ---------- 辅助函数 ----------
        function _fg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? (getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#181F23') : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang()   { return (window._CL && window._CL.lang) || 'zh'; }
        function _gridColor() { return _isDark() ? '#2a2a2a' : '#f0ede6'; }
        function _axisColor() { return _isDark() ? '#888' : '#aaa'; }

        function toCanvas(x, y) { return { x: OX + x * SCALE, y: OY - y * SCALE }; }
        function toCoord(cx, cy) { return { x: (cx - OX) / SCALE, y: -(cy - OY) / SCALE }; }
        function snap(v) { return Math.round(v * 2) / 2; }
        function fmt(v, d=1) {
            const r = Math.round(v * Math.pow(10, d)) / Math.pow(10, d);
            return r.toFixed(d);
        }
        function fmtCoef(v, d=2) {
            return (Math.round(v * 100) / 100).toFixed(d);
        }

        // 直线方程：一般式 A x + B y + C = 0，以及斜截式
        function getLineEq() {
            const c1 = toCoord(L1.x, L1.y), c2 = toCoord(L2.x, L2.y);
            const dx = c2.x - c1.x, dy = c2.y - c1.y;
            const A = dy, B = -dx, C = -(A * c1.x + B * c1.y);
            const isVertical = Math.abs(dx) < 1e-6;
            let slope = null, intercept = null;
            if (!isVertical) {
                slope = dy / dx;
                intercept = c1.y - slope * c1.x;
            }
            return { A, B, C, isVertical, slope, intercept, c1, c2 };
        }

        // 计算判别式 (基于代入圆方程后的二次方程)
        function getDiscriminant(lineEq) {
            const { isVertical, slope: k, intercept: m, c1 } = lineEq;
            const a = oa, b = ob, r = oR;
            if (isVertical) {
                const x0 = c1.x;
                const disc = r * r - (x0 - a) * (x0 - a);
                return { disc, isVertical: true, x0, a, b, r };
            } else {
                const A = 1 + k * k;
                const B = 2 * (k * (m - b) - a);
                const C = a * a + (m - b) * (m - b) - r * r;
                const disc = B * B - 4 * A * C;
                return { disc, A, B, C, k, m, a, b, r };
            }
        }

        // 计算圆心到直线的距离 (用于精确相切判定)
        function getDistanceToLine(lineEq) {
            const { A, B, C, isVertical, c1, slope, intercept } = lineEq;
            let AA = A, BB = B, CC = C;
            if (isVertical) {
                AA = 1; BB = 0; CC = -c1.x;
            } else {
                AA = slope; BB = -1; CC = intercept;
            }
            const denom = Math.sqrt(AA*AA + BB*BB);
            if (denom < 1e-9) return Infinity;
            return Math.abs(AA * oa + BB * ob + CC) / denom;
        }

        // 求交点坐标（画布坐标）
        function getIntersections(res) {
            if (res.isVertical) {
                const { x0, b, r } = res;
                const d2 = r * r - (x0 - oa) * (x0 - oa);
                if (d2 < -0.001) return [];
                if (Math.abs(d2) < 1e-6) return [toCanvas(x0, b)];
                const sq = Math.sqrt(d2);
                return [toCanvas(x0, b + sq), toCanvas(x0, b - sq)];
            } else {
                const { A, B, C, k, m, disc } = res;
                if (disc < -0.5) return [];
                if (Math.abs(disc) <= 1e-6) {
                    const x = -B / (2 * A);
                    return [toCanvas(x, k * x + m)];
                }
                const sq = Math.sqrt(disc);
                const x1 = (-B - sq) / (2 * A);
                const x2 = (-B + sq) / (2 * A);
                return [toCanvas(x1, k * x1 + m), toCanvas(x2, k * x2 + m)];
            }
        }

        function setDesc(html) { document.getElementById('descArea').innerHTML = html; }
        function setTheorem(html) { document.getElementById('theoremText').innerHTML = html; }
        function setDerivation(html) { document.getElementById('derivationBlock').innerHTML = html; }

        function update() {
            const lineEq = getLineEq();
            const res = getDiscriminant(lineEq);
            const distance = getDistanceToLine(lineEq);
            const TANGENT_TOL = 0.03;  // 相切判定容差
            const diff = Math.abs(distance - oR);
            const isTangent = diff <= TANGENT_TOL;
            
            const green = '#27ae60', orange = '#e67e22', blue = '#2980b9';
            let lineColor, statusHtml, conclusionZh, conclusionEn, deltaDisplay;
            const isZh = _lang() === 'zh';
            
            if (distance > oR + TANGENT_TOL) {
                lineColor = orange;
                statusHtml = `<span style="color:${orange}">Δ &lt; 0</span>`;
                conclusionZh = '相离 · 无交点';
                conclusionEn = 'Separate · No intersection';
                deltaDisplay = res.disc.toFixed(2);
            } else if (isTangent) {
                lineColor = green;
                statusHtml = `<span style="color:${green}">Δ = 0</span>`;
                conclusionZh = '相切 · 一个切点';
                conclusionEn = 'Tangent · One point';
                deltaDisplay = (Math.abs(res.disc) < 0.001) ? '≈ 0' : res.disc.toFixed(4);
            } else {
                lineColor = blue;
                statusHtml = `<span style="color:${blue}">Δ &gt; 0</span>`;
                conclusionZh = '相交 · 两个交点';
                conclusionEn = 'Intersect · Two points';
                deltaDisplay = res.disc.toFixed(2);
            }

            // 描述区域 (desc-item)
            const aStr = oa === 0 ? 'x' : (oa > 0 ? `(x−${fmt(oa)})` : `(x+${fmt(-oa)})`);
            const bStr = ob === 0 ? 'y' : (ob > 0 ? `(y−${fmt(ob)})` : `(y+${fmt(-ob)})`);
            const circleEq = `${aStr}² + ${bStr}² = ${fmt(oR*oR,2)}`;
            let lineEqStr;
            if (lineEq.isVertical) {
                lineEqStr = `x = ${fmt(lineEq.c1.x,1)}`;
            } else {
                const k = lineEq.slope, m = lineEq.intercept;
                const kAbs = Math.abs(k);
                let kPart = '';
                if (Math.abs(k) < 1e-6) kPart = '';
                else if (Math.abs(k - 1) < 1e-6) kPart = 'x';
                else if (Math.abs(k + 1) < 1e-6) kPart = '-x';
                else kPart = `${fmtCoef(k)}x`;
                let mPart = '';
                if (Math.abs(m) < 1e-6) mPart = kPart ? '' : '0';
                else mPart = (m > 0 ? ` + ${fmtCoef(m)}` : ` − ${fmtCoef(-m)}`);
                lineEqStr = `y = ${kPart}${mPart}`;
            }

           const descHtml = `
                <div class="desc-item"><span class="desc-symbol">${isZh ? '圆' : 'Circle'}</span> ${circleEq}</div>
                <div class="desc-item"><span class="desc-symbol">${isZh ? '直线' : 'Line'}</span> ${lineEqStr}</div>
                <div class="desc-item"><span class="desc-symbol">Δ</span> = ${deltaDisplay}</div>
                <div class="desc-item">${statusHtml}</div>
                <div class="desc-item" style="color:${lineColor}">${isZh ? conclusionZh : conclusionEn}</div>
            `;
            setDesc(descHtml);

            // 定理区域 (展示圆心到直线距离)
            const distStr = fmt(distance, 4);
            const theoremHtml = isZh
                ? `圆心 (${fmt(oa)}, ${fmt(ob)}) 到直线的距离 d = ${distStr}，半径 r = ${fmt(oR,2)}。<br>` +
                  `d ${distance > oR ? '>' : (isTangent ? '≈' : '<')} r ⇒ ${conclusionZh}`
                : `Distance from center (${fmt(oa)}, ${fmt(ob)}) to line d = ${distStr}, radius r = ${fmt(oR,2)}.<br>` +
                  `d ${distance > oR ? '>' : (isTangent ? '≈' : '<')} r ⇒ ${conclusionEn}`;
            setTheorem(theoremHtml);

            // 代数推导块
            let derivation;
            if (lineEq.isVertical) {
                const x0 = lineEq.c1.x;
                const d2 = oR*oR - (x0 - oa)*(x0 - oa);
                derivation = isZh
                    ? `代入 x = ${fmt(x0,2)} 到圆方程：<br>` +
                      `(${fmt(x0,2)} − ${fmt(oa)})² + (y − ${fmt(ob)})² = ${fmt(oR*oR,2)}<br>` +
                      `(y − ${fmt(ob)})² = ${fmt(d2,4)}<br>` +
                      `Δ = ${fmt(d2,4)} · (判别式等于右侧值)`
                    : `Substitute x = ${fmt(x0,2)} into circle:<br>` +
                      `(${fmt(x0,2)} − ${fmt(oa)})² + (y − ${fmt(ob)})² = ${fmt(oR*oR,2)}<br>` +
                      `(y − ${fmt(ob)})² = ${fmt(d2,4)}<br>` +
                      `Δ = ${fmt(d2,4)} · (discriminant)`;
            } else {
                const { A, B, C, k, m } = res;
                const A_ = fmtCoef(A), B_ = fmtCoef(B), C_ = fmtCoef(C);
                derivation = isZh
                    ? `代入 y = ${fmtCoef(k)}x ${m>=0?'+':''} ${fmtCoef(m)} 到圆方程：<br>` +
                      `${A_} x² ${B_>=0?'+':''} ${B_} x ${C_>=0?'+':''} ${C_} = 0<br>` +
                      `Δ = B² − 4AC = ${fmtCoef(B*B)} − ${fmtCoef(4*A*C)} = ${fmtCoef(res.disc)}`
                    : `Substitute y = ${fmtCoef(k)}x ${m>=0?'+':''} ${fmtCoef(m)} into circle:<br>` +
                      `${A_} x² ${B_>=0?'+':''} ${B_} x ${C_>=0?'+':''} ${C_} = 0<br>` +
                      `Δ = B² − 4AC = ${fmtCoef(B*B)} − ${fmtCoef(4*A*C)} = ${fmtCoef(res.disc)}`;
            }
            setDerivation(derivation);
            
            // ========== 新增功能：相切时显示图片，否则隐藏（不改变任何原有逻辑和样式）==========
            const imgContainer = document.getElementById('tangentImageContainer');
            if (imgContainer) {
                if (isTangent) {
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                }
            }
            // ========== 新增功能结束 ==========

            // 画图
            const ints = getIntersections(res);
            drawCanvas(lineColor, ints, lineEq, distance, isTangent);
        }

        function drawCanvas(lineColor, ints, lineEq, distance, isTangent) {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg();
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            // 网格
            ctx.strokeStyle = _gridColor();
            ctx.lineWidth = 1;
            for (let gx = OX % SCALE; gx < CANVAS_W; gx += SCALE) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, CANVAS_H); ctx.stroke();
            }
            for (let gy = OY % SCALE; gy < CANVAS_H; gy += SCALE) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CANVAS_W, gy); ctx.stroke();
            }

            // 坐标轴
            const axisC = _axisColor();
            ctx.strokeStyle = axisC; ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(0, OY); ctx.lineTo(CANVAS_W, OY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OX, 0); ctx.lineTo(OX, CANVAS_H); ctx.stroke();
            ctx.fillStyle = axisC;
            ctx.beginPath(); ctx.moveTo(CANVAS_W-2, OY); ctx.lineTo(CANVAS_W-10, OY-5); ctx.lineTo(CANVAS_W-10, OY+5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(OX, 2); ctx.lineTo(OX-5, 10); ctx.lineTo(OX+5, 10); ctx.fill();
            ctx.font = '12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText('x', CANVAS_W-14, OY-6);
            ctx.fillText('y', OX+8, 14);
            ctx.fillText('O', OX+5, OY+14);

            // 刻度
            ctx.fillStyle = _isDark() ? '#777' : '#999';
            ctx.font = '11px "Noto Sans SC", "Manrope", sans-serif';
            for (let i = -Math.floor(OX/SCALE); i <= Math.floor((CANVAS_W-OX)/SCALE); i++) {
                if (i===0) continue;
                ctx.fillText(i, OX + i*SCALE - 4, OY + 14);
            }
            for (let j = -Math.floor(OY/SCALE); j <= Math.floor((CANVAS_H-OY)/SCALE); j++) {
                if (j===0) continue;
                ctx.fillText(j, OX + 6, OY - j*SCALE + 4);
            }

            // 圆
            const pO = toCanvas(oa, ob);
            const rPx = oR * SCALE;
            ctx.beginPath();
            ctx.arc(pO.x, pO.y, rPx, 0, 2*Math.PI);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(231,76,60,0.06)';
            ctx.fill();

            // 直线 (延伸至画布边缘)
            ctx.save();
            if (lineEq.isVertical) {
                const px = toCanvas(lineEq.c1.x, 0).x;
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, CANVAS_H);
            } else {
                const x1c = 0, x2c = CANVAS_W;
                const x1 = toCoord(x1c, 0).x, x2 = toCoord(x2c, 0).x;
                const y1 = lineEq.slope * x1 + lineEq.intercept;
                const y2 = lineEq.slope * x2 + lineEq.intercept;
                const p1 = toCanvas(x1, y1), p2 = toCanvas(x2, y2);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            }
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.restore();

            // 交点（带白边）
            ints.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                ctx.fillStyle = lineColor; ctx.fill();
                ctx.strokeStyle = _bg(); ctx.lineWidth = 1.8; ctx.stroke();
            });

            // 圆心
            ctx.beginPath(); ctx.arc(pO.x, pO.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#e74c3c'; ctx.fill();
            ctx.fillStyle = _fg();
            ctx.font = '500 12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(`O(${fmt(oa)},${fmt(ob)})`, pO.x+7, pO.y-6);

            // 直线控制点
            [L1, L2].forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2*Math.PI);
                ctx.fillStyle = lineColor; ctx.fill();
                ctx.strokeStyle = _bg(); ctx.lineWidth = 1.5; ctx.stroke();
            });

            // 圆心拖动提示圈
            ctx.beginPath(); ctx.arc(pO.x, pO.y, 9, 0, 2*Math.PI);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1.5;
            ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);

            // 显示圆心到直线的垂线及距离（教学直观）
            if (distance !== undefined && !lineEq.isVertical) {
                let footX, footY;
                const A = lineEq.slope, B = -1, C = lineEq.intercept;
                const denom = A*A + B*B;
                footX = (B*(B*oa - A*ob) - A*C) / denom;
                footY = (A*(-B*oa + A*ob) - B*C) / denom;
                const footCanvas = toCanvas(footX, footY);
                ctx.beginPath();
                ctx.moveTo(pO.x, pO.y);
                ctx.lineTo(footCanvas.x, footCanvas.y);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#888';
                ctx.font = '10px "Noto Sans SC", "Manrope", sans-serif';
                const midX = (pO.x + footCanvas.x) / 2;
                const midY = (pO.y + footCanvas.y) / 2;
                ctx.fillText(`d=${fmt(distance,3)}`, midX + 3, midY - 3);
            }
        }

        // ---------- 交互 ----------
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                cx: (clientX - rect.left) * (CANVAS_W / rect.width),
                cy: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function handleStart(e) {
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const pO = toCanvas(oa, ob);
            if (Math.hypot(mx - pO.x, my - pO.y) < 14) { dragging = true; dragTarget = 'O'; return; }
            if (Math.hypot(mx - L1.x, my - L1.y) < 14) { dragging = true; dragTarget = 'L1'; return; }
            if (Math.hypot(mx - L2.x, my - L2.y) < 14) { dragging = true; dragTarget = 'L2'; return; }
        }

        function handleMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const coord = toCoord(mx, my);
            if (dragTarget === 'O') {
                oa = snap(coord.x);
                ob = snap(coord.y);
            } else if (dragTarget === 'L1') {
                L1 = { x: mx, y: my };
            } else if (dragTarget === 'L2') {
                L2 = { x: mx, y: my };
            }
            update();
        }

        function handleEnd(e) {
            dragging = false;
            dragTarget = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // 主题/语言切换
        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            update();
        });

        window.addEventListener('load', () => {
            const isZh = _lang() === 'zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
            document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            update();
        });
        update();
        let mascotDragReported = false;
        let mascotPointerDown = false;
        let mascotStartPoint = null;
        function getMascotPoint(event) {
            if (event.touches && event.touches[0]) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            if (event.changedTouches && event.changedTouches[0]) {
                return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        }
        function reportMascotDrag() {
            if (mascotDragReported) return;
            mascotDragReported = true;
            try {
                window.parent.postMessage({ _src: 'circlelab', mascotDrag: true }, '*');
            } catch (e) {}
        }
        function handleMascotDragStart(event) {
            mascotPointerDown = true;
            mascotStartPoint = getMascotPoint(event);
        }
        function handleMascotDragMove(event) {
            if (!mascotPointerDown || mascotDragReported || !mascotStartPoint) return;
            const currentPoint = getMascotPoint(event);
            if (Math.hypot(currentPoint.x - mascotStartPoint.x, currentPoint.y - mascotStartPoint.y) < 6) return;
            reportMascotDrag();
        }
        function handleMascotDragEnd() {
            mascotPointerDown = false;
            mascotStartPoint = null;
        }

        canvas.addEventListener('mousedown', handleMascotDragStart);
        canvas.addEventListener('touchstart', handleMascotDragStart, { passive: true });
        window.addEventListener('mousemove', handleMascotDragMove);
        window.addEventListener('touchmove', handleMascotDragMove, { passive: true });
        window.addEventListener('mouseup', handleMascotDragEnd);
        window.addEventListener('touchend', handleMascotDragEnd);
        window.addEventListener('touchcancel', handleMascotDragEnd);
        window.addEventListener('blur', handleMascotDragEnd);
    })();
</script>
</body>
</html>

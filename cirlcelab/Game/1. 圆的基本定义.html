<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆的基本定义 - CircleLab</title>
    <!-- 引入与 index 一致的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 完全采用 index 中的全局主题变量系统，保证视觉一致性 */
        :root {
            --bg:        #f7f5f0;
            --card-bg:   #ffffff;
            --text:      #1a1a1a;
            --text-sub:  #888;
            --accent:    #1a1a1a;
            --accent2:   #c8502a;
            --border:    #e8e4dc;
            --hover-bg:  #f0ede6;
            --active-bg: #1a1a1a;
            --active-text:#ffffff;
            --shadow:    0 1px 12px rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg:        #141414;
            --card-bg:   #1c1c1c;
            --text:      #e8e4dc;
            --text-sub:  #666;
            --accent:    #e8e4dc;
            --accent2:   #e8724a;
            --border:    #2a2a2a;
            --hover-bg:  #242424;
            --active-bg: #e8e4dc;
            --active-text:#141414;
            --shadow:    0 1px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主内容卡片 — 采用类似 index 中 sidebar/content 的柔和质感 */
        .circle-card {
            max-width: 820px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        /* 头部区域: 类似 content-header 风格 */
        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
        }
        .card-header .title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 400;
        }

        /* canvas 容器，柔和内边距，保持干净 */
        .canvas-container {
            padding: 28px 28px 16px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        /* 描述区域，类似优雅的 description */
        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 450;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 18px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.3px;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
        }

        /* 定理框 - 类似几何引用块 */
        .theorem {
            margin: 8px 28px 28px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 16px 20px;
            border-radius: 14px;
            font-weight: 450;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            transition: background 0.2s;
        }

        /* 底部提示 — 轻量交互提示 */
        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .interact-hint span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-red, .badge-blue {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .badge-red { background: #e74c3c; }
        .badge-blue { background: #3498db; }

        /* 适应小屏 */
        @media (max-width: 700px) {
            body { padding: 12px; }
            .descriptions { margin: 12px 20px 8px; }
            .theorem { margin: 8px 20px 20px; }
            .canvas-container { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <!-- 双语标题：完全适配 index 框架的样式与切换逻辑 -->
        <div class="title" data-cl-zh>圆的基本定义</div>
        <div class="title" data-cl-en style="display:none">Basic Definition of a Circle</div>
        <div class="sub-en" data-cl-zh>圆心 · 半径 · 直径</div>
        <div class="sub-en" data-cl-en style="display:none">Center · Radius · Diameter</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>

    <!-- 动态描述: 展示 O, OA, AB 等 (完全支持动态刷新，颜色随主题) -->
    <div class="descriptions" id="descArea">
        <!-- 内容通过js动态生成以保证双语和主题变量? 其实静态配合data-cl也可，但为了更一致就静态+动态桥接。不过按原设计保留结构但加入可刷新 -->
    </div>

    <div class="theorem" id="theoremText">
        <!-- 动态切换 -->
    </div>

    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽红点 A 改变半径</span><span data-cl-en style="display:none">Drag red point A to change radius</span></span>
        <span>🔘 <span data-cl-zh>拖拽圆心 O 平移</span><span data-cl-en style="display:none">Drag center O to move circle</span></span>
    </div>
</div>

<script>
    (function(){
        // 获取主题/语言，与父级 index 进行桥接，完全同步样式与语言
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        
        // 获取当前有效的主题色文字（用于绘制线条/文字）
        function getThemeFg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#e8e4dc' : '#1a1a1a';
        }
        function getThemeBg() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return isDark ? '#1c1c1c' : '#ffffff';
        }
        
        // 几何状态
        let O = { x: 300, y: 250 };
        let angleA = -30;     // 度
        let radius = 150;
        
        // 拖拽状态
        let dragging = false;
        let dragTarget = null; // 'O' 或 'A'
        
        function getA() {
            const rad = angleA * Math.PI / 180;
            return {
                x: O.x + radius * Math.cos(rad),
                y: O.y + radius * Math.sin(rad)
            };
        }
        
        function getB(pA) {
            return { x: 2 * O.x - pA.x, y: 2 * O.y - pA.y };
        }
        
        // 更新描述区域和定理区域（支持中英文和主题刷新）
        function updateTextContent() {
            const isZh = (window._CL && window._CL.lang === 'zh') || 
                        (!window._CL && document.querySelector('[data-cl-zh]')?.style.display !== 'none');
            const lang = isZh ? 'zh' : 'en';
            
            const descDiv = document.getElementById('descArea');
            if (descDiv) {
                if (lang === 'zh') {
                    descDiv.innerHTML = `
                        <div class="desc-item"><span class="desc-symbol">O</span> 是 ⊙O 的圆心</div>
                        <div class="desc-item"><span class="desc-symbol">OA</span> 是 ⊙O 的一条半径</div>
                        <div class="desc-item"><span class="desc-symbol">AB</span> 是 ⊙O 的一条直径</div>
                    `;
                } else {
                    descDiv.innerHTML = `
                        <div class="desc-item"><span class="desc-symbol">O</span> is the center of ⊙O</div>
                        <div class="desc-item"><span class="desc-symbol">OA</span> is a radius of ⊙O</div>
                        <div class="desc-item"><span class="desc-symbol">AB</span> is a diameter of ⊙O</div>
                    `;
                }
            }
            const theoremDiv = document.getElementById('theoremText');
            if (theoremDiv) {
                if (lang === 'zh') {
                    theoremDiv.innerHTML = `📐 圆是平面上到定点（圆心）距离等于定长（半径）的所有点的集合`;
                } else {
                    theoremDiv.innerHTML = `📐 A circle is the set of all points in a plane equidistant from a fixed center point.`;
                }
            }
        }
        
        // 绘制全部 (颜色完全跟随主题变量)
        function drawCanvas() {
            // 强制获取最新的背景/前景色，保证主题切换时重绘
            const bgColor = getThemeBg();
            const fgColor = getThemeFg();
            // 更新canvas实际背景填充 (透明填充背景)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 绘制纯背景色 (使canvas区域与卡片融合)
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const pA = getA();
            const pB = getB(pA);
            
            // 画圆: 使用主题前景色
            ctx.beginPath();
            ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = fgColor;
            ctx.lineWidth = 1.8;
            ctx.stroke();
            
            // 画直径 AB (实线)
            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = fgColor;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // 半径 OA (用品牌色 accent2 保持与index强调色一致)
            ctx.beginPath();
            ctx.moveTo(O.x, O.y);
            ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = '#c8502a';  // 固定为强调色，暗色模式下自动匹配亮橘色
            if (document.documentElement.getAttribute('data-theme') === 'dark') ctx.strokeStyle = '#e8724a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 画圆心 O (填充颜色)
            ctx.beginPath();
            ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = fgColor;
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.font = '500 14px "DM Sans", sans-serif';
            ctx.shadowBlur = 0;
            ctx.fillText('O', O.x - 16, O.y - 8);
            
            // 点 A (红色可拖拽)
            ctx.beginPath();
            ctx.arc(pA.x, pA.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.font = '500 14px "DM Sans", sans-serif';
            ctx.fillText('A', pA.x + 10, pA.y - 8);
            
            // 点 B (蓝色)
            ctx.beginPath();
            ctx.arc(pB.x, pB.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.fillStyle = fgColor;
            ctx.fillText('B', pB.x + 10, pB.y - 8);
            
            // 增加半径/圆心等轻微辅助标记 (优雅小点)
            ctx.fillStyle = fgColor;
            ctx.font = '10px "DM Sans"';
            ctx.fillStyle = getThemeFg();
        }
        
        // 鼠标坐标转换 (支持canvas实际尺寸与CSS缩放)
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        // 事件绑定 (鼠标+触屏)
        function handleMouseDown(e) {
            e.preventDefault();
            const m = getMousePos(e);
            const pA = getA();
            const distO = Math.hypot(m.x - O.x, m.y - O.y);
            const distA = Math.hypot(m.x - pA.x, m.y - pA.y);
            const threshold = 15;
            if (distO < threshold) {
                dragging = true;
                dragTarget = 'O';
            } else if (distA < threshold) {
                dragging = true;
                dragTarget = 'A';
            }
        }
        
        function handleMouseMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const m = getMousePos(e);
            if (dragTarget === 'O') {
                // 约束圆心不超出画布边缘（保持美观）
                let newX = Math.min(Math.max(m.x, 40), canvas.width - 40);
                let newY = Math.min(Math.max(m.y, 40), canvas.height - 40);
                O.x = newX;
                O.y = newY;
            } else if (dragTarget === 'A') {
                const dx = m.x - O.x;
                const dy = m.y - O.y;
                const r = Math.hypot(dx, dy);
                if (r > 12) {
                    radius = r;
                    angleA = Math.atan2(dy, dx) * 180 / Math.PI;
                } else {
                    // 避免半径过小维持最小半径
                    if (r > 0.1) radius = 12;
                    else radius = 12;
                    angleA = Math.atan2(dy, dx) * 180 / Math.PI;
                }
            }
            drawCanvas();
        }
        
        function handleMouseUp(e) {
            dragging = false;
            dragTarget = null;
        }
        
        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('touchstart', handleMouseDown, {passive: false});
        window.addEventListener('touchmove', handleMouseMove, {passive: false});
        window.addEventListener('touchend', handleMouseUp);
        canvas.addEventListener('mouseleave', () => { dragging = false; dragTarget = null; });
        
        // 监听来自父窗口的主题/语言变更
        window._CL = window._CL || { lang: 'zh', theme: 'light' };
        
        function applyLang(lang) {
            window._CL.lang = lang;
            // 显示隐藏双语块
            document.querySelectorAll('[data-cl-zh]').forEach(el => {
                el.style.display = lang === 'zh' ? '' : 'none';
            });
            document.querySelectorAll('[data-cl-en]').forEach(el => {
                el.style.display = lang === 'en' ? '' : 'none';
            });
            // 更新描述与定理文本动态内容
            updateTextContent();
            drawCanvas(); // 重绘保证文本颜色一致
        }
        
        function applyTheme(theme) {
            window._CL.theme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            drawCanvas();
            // 更新描述区域边框等不需要额外动作，但canvas已经重绘
            // 并且动态更新描述区背景的hover变量变化无碍，但保留重绘
        }
        
        // 监听父页面消息
        window.addEventListener('message', function(ev) {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.lang !== undefined) applyLang(ev.data.lang);
            if (ev.data.theme !== undefined) applyTheme(ev.data.theme);
        });
        
        // 初始化获取父页面的初始值 (DOMContentLoaded时)
        function syncParentState() {
            try {
                const parentWin = window.parent;
                if (parentWin && parentWin._CL_lang) applyLang(parentWin._CL_lang);
                if (parentWin && parentWin._CL_theme) applyTheme(parentWin._CL_theme);
            } catch(e) { /* 跨域或本地忽略 */ }
            // 同时也读取 documentElement 上的 data-theme 属性（若已被父窗口直接设置）
            const htmlTheme = document.documentElement.getAttribute('data-theme');
            if (htmlTheme && !window._CL.theme) applyTheme(htmlTheme);
            if (!window._CL.lang) applyLang('zh');
        }
        
        // 监听 dom 变化/额外确保初始化显示
        window.addEventListener('DOMContentLoaded', () => {
            syncParentState();
            updateTextContent();
            drawCanvas();
            // 确保父级通信时canvas正确重绘
        });
        
        // 如果页面已经加载完毕立即执行一次
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                drawCanvas();
                updateTextContent();
                syncParentState();
            });
        } else {
            drawCanvas();
            updateTextContent();
            syncParentState();
        }
        
        // 暴露全局重绘接口给bridge (以便主题切换时重绘)
        window._clRedraw = function() {
            drawCanvas();
            updateTextContent();
        };
        
        // 监听主题变动 ( MutationObserver 确保data-theme变化时重绘)
        const observer = new MutationObserver((mutations) => {
            for (let m of mutations) {
                if (m.attributeName === 'data-theme') {
                    drawCanvas();
                    updateTextContent();  // 主题只影响canvas颜色，但定理文字不变，但保持
                    break;
                }
            }
        });
        observer.observe(document.documentElement, { attributes: true });
        
        // 可选: 窗口resize时由于canvas物理像素不变无需重绘，但保留无妨
        window.addEventListener('resize', () => { drawCanvas(); });
    })();
</script>

<!-- 额外的后备双语脚本（同步更新） -->
<script>
    (function secondarySync(){
        // 确保即使消息未及时，手动根据全局状态再次刷新文本
        function finalSync(){
            if(window._CL && window._CL.lang) {
                const isZh = window._CL.lang === 'zh';
                document.querySelectorAll('[data-cl-zh]').forEach(el => {
                    el.style.display = isZh ? '' : 'none';
                });
                document.querySelectorAll('[data-cl-en]').forEach(el => {
                    el.style.display = isZh ? 'none' : '';
                });
                // 更新动态区域
                const descDiv = document.getElementById('descArea');
                if(descDiv) {
                    if(isZh){
                        descDiv.innerHTML = `<div class="desc-item"><span class="desc-symbol">O</span> 是 ⊙O 的圆心</div>
                        <div class="desc-item"><span class="desc-symbol">OA</span> 是 ⊙O 的一条半径</div>
                        <div class="desc-item"><span class="desc-symbol">AB</span> 是 ⊙O 的一条直径</div>`;
                    } else {
                        descDiv.innerHTML = `<div class="desc-item"><span class="desc-symbol">O</span> is the center of ⊙O</div>
                        <div class="desc-item"><span class="desc-symbol">OA</span> is a radius of ⊙O</div>
                        <div class="desc-item"><span class="desc-symbol">AB</span> is a diameter of ⊙O</div>`;
                    }
                }
                const theoremDiv = document.getElementById('theoremText');
                if(theoremDiv){
                    theoremDiv.innerHTML = isZh ? `📐 圆是平面上到定点（圆心）距离等于定长（半径）的所有点的集合` : `📐 A circle is the set of all points in a plane equidistant from a fixed center point.`;
                }
            }
            if(window._clRedraw) window._clRedraw();
        }
        setTimeout(finalSync, 30);
        window.addEventListener('load', finalSync);
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切线长定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #f7f5f0;
            --card-bg:   #ffffff;
            --text:      #1a1a1a;
            --text-sub:  #888;
            --accent:    #1a1a1a;
            --accent2:   #c8502a;
            --border:    #e8e4dc;
            --hover-bg:  #f0ede6;
            --active-bg: #1a1a1a;
            --active-text:#ffffff;
            --shadow:    0 1px 12px rgba(0,0,0,0.06);
        }
        [data-theme="dark"] {
            --bg:        #141414;
            --card-bg:   #1c1c1c;
            --text:      #e8e4dc;
            --text-sub:  #666;
            --accent:    #e8e4dc;
            --accent2:   #e8724a;
            --border:    #2a2a2a;
            --hover-bg:  #242424;
            --active-bg: #e8e4dc;
            --active-text:#141414;
            --shadow:    0 1px 12px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 820px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .canvas-container {
            padding: 28px 28px 16px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 18px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 28px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>切线长定理</div>
        <div class="title" data-cl-en style="display:none">Tangent Length Theorem</div>
        <div class="sub-en" data-cl-zh>从圆外一点所作两切线的切线长相等</div>
        <div class="sub-en" data-cl-en style="display:none">Two tangent segments from an external point are equal in length</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽点 P 改变位置</span><span data-cl-en style="display:none">Drag point P to change position</span></span>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 600, CANVAS_H = 500;
        const cx = 290, cy = 250, radius = 130;
        let P = { x: 500, y: 250 };
        let dragging = false;

        function _fg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#1c1c1c' : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang() { return (window._CL && window._CL.lang) || 'zh'; }

        function getTangentPoints() {
            const dx = P.x - cx, dy = P.y - cy;
            const OP = Math.hypot(dx, dy);
            if (OP <= radius + 1) return null;
            const alpha = Math.acos(radius / OP);
            const ux = dx / OP, uy = dy / OP;
            const vx = -uy, vy = ux;
            return {
                tA: {
                    x: cx + radius * (Math.cos(alpha) * ux + Math.sin(alpha) * vx),
                    y: cy + radius * (Math.cos(alpha) * uy + Math.sin(alpha) * vy)
                },
                tB: {
                    x: cx + radius * (Math.cos(alpha) * ux - Math.sin(alpha) * vx),
                    y: cy + radius * (Math.cos(alpha) * uy - Math.sin(alpha) * vy)
                }
            };
        }

        function angleBetween(a, vertex, b) {
            const v1 = { x: a.x - vertex.x, y: a.y - vertex.y };
            const v2 = { x: b.x - vertex.x, y: b.y - vertex.y };
            const dot = v1.x * v2.x + v1.y * v2.y;
            const len = Math.hypot(v1.x, v1.y) * Math.hypot(v2.x, v2.y);
            if (len < 1e-9) return 0;
            return Math.acos(Math.max(-1, Math.min(1, dot / len))) * 180 / Math.PI;
        }

        function drawRightAngle(vertex, dirA, dirB, size, color) {
            const r1 = Math.atan2(dirA.y - vertex.y, dirA.x - vertex.x);
            const r2 = Math.atan2(dirB.y - vertex.y, dirB.x - vertex.x);
            const p1 = { x: vertex.x + Math.cos(r1) * size, y: vertex.y + Math.sin(r1) * size };
            const p2 = { x: vertex.x + Math.cos(r2) * size, y: vertex.y + Math.sin(r2) * size };
            const p3 = { x: p1.x + Math.cos(r2) * size, y: p1.y + Math.sin(r2) * size };
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
        }

        function drawAngleArc(vertex, from, to, r, color) {
            const a1 = Math.atan2(from.y - vertex.y, from.x - vertex.x);
            const a2 = Math.atan2(to.y - vertex.y, to.x - vertex.x);
            const diff = Math.atan2(Math.sin(a2 - a1), Math.cos(a2 - a1));
            ctx.beginPath();
            ctx.arc(vertex.x, vertex.y, r, a1, a2, diff < 0);
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
        }

        function updateTexts(res) {
            const isZh = _lang() === 'zh';
            const descEl = document.getElementById('descArea');
            const thmEl  = document.getElementById('theoremText');

            if (!res) {
                descEl.innerHTML = `<div class="desc-item"><span style="color:#e67e22">${isZh ? 'P 在圆内，无切线' : 'P is inside the circle — no tangent'}</span></div>`;
                thmEl.innerHTML = isZh
                    ? '📐 从圆外一点引圆的两条切线，切线长相等，且该点与圆心的连线平分两切线所成的角'
                    : '📐 Two tangent segments from an external point are equal in length; the line to the center bisects the angle between the tangents';
                return;
            }

            const { tA, tB } = res;
            const PA  = Math.hypot(P.x - tA.x, P.y - tA.y);
            const PB  = Math.hypot(P.x - tB.x, P.y - tB.y);
            const opa = angleBetween({ x: cx, y: cy }, P, tA);
            const opb = angleBetween({ x: cx, y: cy }, P, tB);
            const isEq  = Math.abs(PA - PB) < 0.5;
            const isAng = Math.abs(opa - opb) < 0.5;

            if (isZh) {
                descEl.innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">PA</span> = ${PA.toFixed(2)}</div>
                    <div class="desc-item"><span class="desc-symbol">PB</span> = ${PB.toFixed(2)}</div>
                    <div class="desc-item" style="color:${isEq ? '#27ae60' : '#e67e22'}">PA ${isEq ? '=' : '≠'} PB${isEq ? ' ✓' : ''}</div>
                    <div class="desc-item"><span class="desc-symbol">∠OPA</span> = ${opa.toFixed(1)}°</div>
                    <div class="desc-item"><span class="desc-symbol">∠OPB</span> = ${opb.toFixed(1)}°</div>
                    <div class="desc-item" style="color:${isAng ? '#27ae60' : '#e67e22'}">OP 平分 ∠APB ${isAng ? '✓' : '✗'}</div>`;
                thmEl.innerHTML = '📐 从圆外一点引圆的两条切线，切线长相等，且该点与圆心的连线平分两切线所成的角';
            } else {
                descEl.innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">PA</span> = ${PA.toFixed(2)}</div>
                    <div class="desc-item"><span class="desc-symbol">PB</span> = ${PB.toFixed(2)}</div>
                    <div class="desc-item" style="color:${isEq ? '#27ae60' : '#e67e22'}">PA ${isEq ? '=' : '≠'} PB${isEq ? ' ✓' : ''}</div>
                    <div class="desc-item"><span class="desc-symbol">∠OPA</span> = ${opa.toFixed(1)}°</div>
                    <div class="desc-item"><span class="desc-symbol">∠OPB</span> = ${opb.toFixed(1)}°</div>
                    <div class="desc-item" style="color:${isAng ? '#27ae60' : '#e67e22'}">OP bisects ∠APB ${isAng ? '✓' : '✗'}</div>`;
                thmEl.innerHTML = '📐 Two tangent segments from an external point are equal in length; the line to the center bisects the angle between the tangents';
            }
        }

        function drawCanvas(res) {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg();
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            const isDark = _isDark();

            // 圆
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = isDark ? '#555' : '#bbb';
            ctx.lineWidth = 1.5; ctx.stroke();

            // 圆心 O
            ctx.beginPath(); ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = _fg(); ctx.fill();
            ctx.font = '500 14px "DM Sans", Arial, sans-serif';
            ctx.fillStyle = _fg();
            ctx.fillText('O', cx - 15, cy - 8);

            if (!res) {
                ctx.beginPath(); ctx.arc(P.x, P.y, 7, 0, 2 * Math.PI);
                ctx.fillStyle = '#e67e22'; ctx.fill();
                ctx.fillStyle = _fg(); ctx.fillText('P', P.x + 10, P.y - 8);
                return;
            }

            const { tA, tB } = res;

            // OP 虚线
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(P.x, P.y);
            ctx.strokeStyle = isDark ? '#555' : '#bbb';
            ctx.lineWidth = 1.2; ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);

            // 切线 PA、PB
            ctx.beginPath(); ctx.moveTo(P.x, P.y); ctx.lineTo(tA.x, tA.y);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(P.x, P.y); ctx.lineTo(tB.x, tB.y);
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 2; ctx.stroke();

            // 半径 OA、OB（浅虚线）
            ctx.lineWidth = 1.2; ctx.setLineDash([4, 2]);
            ctx.strokeStyle = isDark ? '#444' : '#ccc';
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tA.x, tA.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tB.x, tB.y); ctx.stroke();
            ctx.setLineDash([]);

            // 直角标记
            drawRightAngle(tA, { x: cx, y: cy }, P, 10, '#e74c3c');
            drawRightAngle(tB, { x: cx, y: cy }, P, 10, '#2980b9');

            // 角弧
            drawAngleArc(P, tA, { x: cx, y: cy }, 22, '#e74c3c');
            drawAngleArc(P, tB, { x: cx, y: cy }, 28, '#2980b9');

            // 线段中点标注
            const mPA = { x: (P.x + tA.x) / 2, y: (P.y + tA.y) / 2 };
            const mPB = { x: (P.x + tB.x) / 2, y: (P.y + tB.y) / 2 };
            ctx.font = '13px "DM Sans", sans-serif';
            ctx.fillStyle = '#e74c3c'; ctx.fillText('PA', mPA.x + 6, mPA.y - 4);
            ctx.fillStyle = '#2980b9'; ctx.fillText('PB', mPB.x + 6, mPB.y + 14);

            // 点 P
            ctx.beginPath(); ctx.arc(P.x, P.y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#e67e22'; ctx.fill();
            ctx.fillStyle = _fg(); ctx.fillText('P', P.x + 10, P.y - 8);

            // 切点 A、B
            [{ p: tA, l: 'A', c: '#e74c3c' }, { p: tB, l: 'B', c: '#2980b9' }].forEach(({ p, l, c }) => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = c; ctx.fill();
                ctx.fillStyle = _fg();
                const dx = p.x - cx, dy = p.y - cy, len = Math.hypot(dx, dy);
                ctx.fillText(l, p.x + (dx / len) * 13, p.y + (dy / len) * 13);
            });
        }

        function update() {
            const res = getTangentPoints();
            updateTexts(res);
            drawCanvas(res);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (CANVAS_W / rect.width),
                y: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function handleStart(e) {
            const m = getMousePos(e);
            if (Math.hypot(m.x - P.x, m.y - P.y) < 20) dragging = true;
        }
        function handleMove(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            P = { x: m.x, y: m.y };
            update();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { dragging = false; });
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', () => { dragging = false; });

        // 主题与语言同步
        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            update();
        });

        window.addEventListener('load', () => { update(); });
        update();
    })();
</script>
</body>
</html>

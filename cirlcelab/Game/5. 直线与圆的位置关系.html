<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直线与圆的位置关系</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .descriptions {
            margin-top: 16px;
            line-height: 2.2;
            font-size: 1em;
        }
        .conclusion {
            font-weight: bold;
            margin-top: 8px;
            font-size: 1.1em;
        }
        .outside { color: #e67e22; }
        .tangent { color: #27ae60; }
        .inside  { color: #2980b9; }
    
        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; }
        html,body { background:var(--bg)!important; color:var(--fg)!important; transition:background .2s,color .2s; }
        canvas { background:var(--bg)!important; }
        h3 { color:var(--fg); }
        /* i18n: 只隐藏纯文字标签，数据span不复制 */
        .zh-text { display:inline; }
        .en-text { display:none; }
        .zh-block { display:block; }
        .en-block { display:none; }

    </style>
</head>
<body>
    <h3><span class="zh-text">直线与圆的位置关系</span><span class="en-text">Line–Circle Relationship</span></h3>

    <div>
        <canvas id="circleCanvas" width="600" height="500" style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div class="descriptions">
        <span class="zh-text">半径 r = </span><span class="en-text">Radius r = </span><span id="valR">0.00</span> &nbsp;&nbsp;
        <span class="zh-text">圆心到直线距离 d = </span><span class="en-text">Distance from center d = </span><span id="valD">0.00</span> &nbsp;&nbsp;
        <span id="relation">—</span><br>
        <span class="conclusion" id="conclusion">—</span>
    </div>

    <script>
        (function () {

            function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#ffffff':'#000000'; }
            function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#000000':'#ffffff'; }
            function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');

            const radius = 150;

            // 圆心 O（可拖动）
            let O = { x: 280, y: 250 };

            // 直线由两点 P1、P2 定义（两点均可拖动）
            let P1 = { x: 460, y: 100 };
            let P2 = { x: 460, y: 400 };

            const spanR          = document.getElementById('valR');
            const spanD          = document.getElementById('valD');
            const spanRelation   = document.getElementById('relation');
            const spanConclusion = document.getElementById('conclusion');

            let dragging = false;
            let dragTarget = null; // 'O', 'P1', 'P2'

            // 计算点 O 到直线 P1P2 的距离
            function pointToLineDistance(O, P1, P2) {
                const dx = P2.x - P1.x;
                const dy = P2.y - P1.y;
                const len = Math.hypot(dx, dy);
                if (len < 1e-9) return Math.hypot(O.x - P1.x, O.y - P1.y);
                return Math.abs(dy * O.x - dx * O.y + P2.x * P1.y - P1.x * P2.y) / len;
            }

            // 计算 O 在直线 P1P2 上的垂足坐标
            function footOfPerpendicular(O, P1, P2) {
                const dx = P2.x - P1.x;
                const dy = P2.y - P1.y;
                const len2 = dx * dx + dy * dy;
                if (len2 < 1e-9) return { x: P1.x, y: P1.y };
                const t = ((O.x - P1.x) * dx + (O.y - P1.y) * dy) / len2;
                return { x: P1.x + t * dx, y: P1.y + t * dy };
            }

            // 将直线延伸到画布边缘，返回两个裁剪端点
            function extendLineToBounds(P1, P2, w, h) {
                const dx = P2.x - P1.x;
                const dy = P2.y - P1.y;
                if (Math.abs(dx) < 1e-9 && Math.abs(dy) < 1e-9) return [P1, P2];

                const ts = [];
                if (Math.abs(dx) > 1e-9) {
                    ts.push((0 - P1.x) / dx);
                    ts.push((w - P1.x) / dx);
                }
                if (Math.abs(dy) > 1e-9) {
                    ts.push((0 - P1.y) / dy);
                    ts.push((h - P1.y) / dy);
                }

                const points = ts.map(t => ({
                    x: P1.x + t * dx,
                    y: P1.y + t * dy
                })).filter(p => p.x >= -1 && p.x <= w + 1 && p.y >= -1 && p.y <= h + 1);

                if (points.length < 2) return [P1, P2];
                return [points[0], points[points.length - 1]];
            }

            function update() {
                const d = pointToLineDistance(O, P1, P2);

                spanR.textContent = radius.toFixed(2);
                spanD.textContent = d.toFixed(2);

                let relationText, conclusionText, conclusionClass;

                if (Math.abs(d - radius) < 1.5) {
                    relationText    = 'd = r';
                    conclusionText = _lang()==='en'?'d = r, line is tangent to ⊙O':'d = r，直线与⊙O相切';
                    conclusionClass = 'tangent';
                } else if (d > radius) {
                    relationText    = 'd > r';
                    conclusionText = _lang()==='en'?'d > r, line is separate from ⊙O':'d > r，直线与⊙O相离';
                    conclusionClass = 'outside';
                } else {
                    relationText    = 'd < r';
                    conclusionText = _lang()==='en'?'d < r, line intersects ⊙O':'d < r，直线与⊙O相交';
                    conclusionClass = 'inside';
                }

                spanRelation.textContent   = relationText;
                spanConclusion.textContent = conclusionText;
                spanConclusion.className   = 'conclusion ' + conclusionClass;

                drawCanvas(d);
            }

            function drawCanvas(d) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 判断位置，决定直线颜色
                let lineColor;
                if (Math.abs(d - radius) < 1.5) {
                    lineColor = '#27ae60';
                } else if (d > radius) {
                    lineColor = '#e67e22';
                } else {
                    lineColor = '#2980b9';
                }

                // 画圆
                ctx.beginPath();
                ctx.arc(O.x, O.y, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = _fg();
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 画延伸直线
                const [ep1, ep2] = extendLineToBounds(P1, P2, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.moveTo(ep1.x, ep1.y);
                ctx.lineTo(ep2.x, ep2.y);
                ctx.strokeStyle = lineColor;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 画圆心到直线的垂线（虚线）
                const foot = footOfPerpendicular(O, P1, P2);
                ctx.beginPath();
                ctx.moveTo(O.x, O.y);
                ctx.lineTo(foot.x, foot.y);
                ctx.strokeStyle = _fg()==='#ffffff'?'#666':'#aaa';
                ctx.lineWidth = 1.2;
                ctx.setLineDash([5, 3]);
                ctx.stroke();
                ctx.setLineDash([]);

                // 垂足处画直角标记
                drawRightAngle(O, foot, P1, P2);

                // 画圆心 O
                ctx.beginPath();
                ctx.arc(O.x, O.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = _fg();
                ctx.fill();
                ctx.font = '14px sans-serif';
                ctx.fillStyle = _fg();
                ctx.fillText('O', O.x - 16, O.y - 8);

                // 画直线控制点 P1、P2
                [{ p: P1, label: 'P' }, { p: P2, label: 'Q' }].forEach(({ p, label }) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = _fg()==='#ffffff'?'#aaa':'#555';
                    ctx.fill();
                    ctx.fillStyle = _fg();
                    ctx.fillText(label, p.x + 8, p.y - 8);
                });

                // 标注 d
                const foot2 = footOfPerpendicular(O, P1, P2);
                const mx = (O.x + foot2.x) / 2;
                const my = (O.y + foot2.y) / 2;
                ctx.fillStyle = _fg()==='#ffffff'?'#aaa':'#666';
                ctx.font = '13px sans-serif';
                ctx.fillText('d', mx + 6, my - 4);
            }

            // 直角标记
            function drawRightAngle(O, foot, P1, P2) {
                const dx = P2.x - P1.x;
                const dy = P2.y - P1.y;
                const len = Math.hypot(dx, dy);
                if (len < 1e-9) return;

                const size = 8;
                const alongLine = { x: dx / len, y: dy / len };
                // 垂线方向（从垂足指向O）
                const toO = { x: O.x - foot.x, y: O.y - foot.y };
                const toOLen = Math.hypot(toO.x, toO.y);
                if (toOLen < 1e-9) return;
                const perpDir = { x: toO.x / toOLen, y: toO.y / toOLen };

                const p1 = { x: foot.x + alongLine.x * size, y: foot.y + alongLine.y * size };
                const p2 = { x: foot.x + perpDir.x * size,   y: foot.y + perpDir.y * size };
                const p3 = { x: p1.x   + perpDir.x * size,   y: p1.y   + perpDir.y * size };

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = _fg()==='#ffffff'?'#777':'#999';
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }

            // --- 鼠标事件 ---
            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - rect.left) * (canvas.width / rect.width),
                    y: (e.clientY - rect.top)  * (canvas.height / rect.height)
                };
            }

            canvas.addEventListener('mousedown', function (e) {
                const m = getMousePos(e);
                const threshold = 15;
                if (Math.hypot(m.x - O.x,  m.y - O.y)  < threshold) { dragging = true; dragTarget = 'O';  return; }
                if (Math.hypot(m.x - P1.x, m.y - P1.y) < threshold) { dragging = true; dragTarget = 'P1'; return; }
                if (Math.hypot(m.x - P2.x, m.y - P2.y) < threshold) { dragging = true; dragTarget = 'P2'; return; }
            });

            window.addEventListener('mousemove', function (e) {
                if (!dragging) return;
                const m = getMousePos(e);
                if      (dragTarget === 'O')  { O.x  = m.x; O.y  = m.y; }
                else if (dragTarget === 'P1') { P1.x = m.x; P1.y = m.y; }
                else if (dragTarget === 'P2') { P2.x = m.x; P2.y = m.y; }
                update();
            });

            window.addEventListener('mouseup',    () => { dragging = false; dragTarget = null; });
            canvas.addEventListener('mouseleave', () => { dragging = false; dragTarget = null; });

            update();
            window._clRedraw = function(){ update(); };
        })();
    </script>

<script>
(function(){
    window._CL = { lang:'zh', theme:'light' };

    function applyLang(lang){
        window._CL.lang = lang;
        document.querySelectorAll('.zh-text').forEach(function(el){ el.style.display = lang==='zh'?'inline':'none'; });
        document.querySelectorAll('.en-text').forEach(function(el){ el.style.display = lang==='en'?'inline':'none'; });
        document.querySelectorAll('.zh-block').forEach(function(el){ el.style.display = lang==='zh'?'block':'none'; });
        document.querySelectorAll('.en-block').forEach(function(el){ el.style.display = lang==='en'?'block':'none'; });
        if(typeof _clRedraw==='function') _clRedraw();
    }

    function applyTheme(theme){
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        if(typeof _clRedraw==='function') _clRedraw();
    }

    window.addEventListener('message', function(ev){
        if(!ev.data || ev.data._src!=='circlelab') return;
        if(ev.data.lang)  applyLang(ev.data.lang);
        if(ev.data.theme) applyTheme(ev.data.theme);
    });

    window.addEventListener('DOMContentLoaded', function(){
        try{ if(window.parent._CL_lang)  applyLang(window.parent._CL_lang); }catch(e){}
        try{ if(window.parent._CL_theme) applyTheme(window.parent._CL_theme); }catch(e){}
    });
})();
</script>

</body>
</html>

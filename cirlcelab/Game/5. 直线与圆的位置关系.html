<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直线与圆的位置关系 - CircleLab</title>
    <link rel="stylesheet" href="game.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .circle-card {
            max-width: 820px; width: 100%;
            background: var(--card-bg); border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            overflow: hidden; transition: background 0.3s, border-color 0.3s;
        }
        .card-header { padding: 20px 28px 12px; border-bottom: 1px solid var(--border); }
        .card-header .title { font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif; font-size: 1.35rem; color: var(--text); }
        .card-header .sub-en { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        .canvas-container { padding: 28px 28px 16px; display: flex; justify-content: center; background: var(--card-bg); }
        canvas {
            display: block; margin: 0 auto; border-radius: 16px; background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }
        .data-panel {
            margin: 8px 28px 20px; background: var(--hover-bg);
            border-radius: 20px; padding: 18px 20px; transition: background 0.2s;
        }
        .formula-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: baseline; gap: 24px; margin-bottom: 12px;
            padding-bottom: 12px; border-bottom: 1px dashed var(--border); text-align: center;
        }
        .formula-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .metric { font-size: 0.9rem; font-weight: 500; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
        .metric-value {
            font-weight: 600; background: var(--card-bg); padding: 2px 10px;
            border-radius: 24px; color: var(--accent2); font-size: 0.95rem;
        }
        .conclusion-badge {
            display: inline-block; padding: 8px 20px; border-radius: 40px;
            font-size: 0.9rem; font-weight: 600; border: 2px solid currentColor;
        }
        .outside { color: #e67e22; }
        .tangent { color: #27ae60; }
        .inside  { color: #2980b9; }
        .interact-hint {
            margin: 0 28px 24px; font-size: 0.7rem; color: var(--text-sub);
            display: flex; gap: 18px; justify-content: center;
            border-top: 1px solid var(--border); padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>直线与圆的位置关系</div>
        <div class="title" data-cl-en style="display:none">Line–Circle Relationship</div>
        <div class="sub-en" data-cl-zh>相离 · 相切 · 相交</div>
        <div class="sub-en" data-cl-en style="display:none">Separate · Tangent · Intersecting</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="data-panel" id="dataPanel"></div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽圆心 O、直线控制点 P、Q</span><span data-cl-en style="display:none">Drag center O or line control points P, Q</span></span>
    </div>
</div>
<script>
(function(){
    function _fg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#e8e4dc':'#1a1a1a'; }
    function _bg(){ return document.documentElement.getAttribute('data-theme')==='dark'?'#1c1c1c':'#ffffff'; }
    function _lang(){ return (window._CL&&window._CL.lang)||'zh'; }

    const canvas=document.getElementById('circleCanvas'), ctx=canvas.getContext('2d');
    const radius=150;
    let O={x:280,y:250}, P1={x:460,y:100}, P2={x:460,y:400};
    let dragging=false, dragTarget=null;

    document.documentElement.style.fontSize = '16px';

    function ptLineDist(O,P1,P2){
        const dx=P2.x-P1.x, dy=P2.y-P1.y, len=Math.hypot(dx,dy);
        if(len<1e-9) return Math.hypot(O.x-P1.x,O.y-P1.y);
        return Math.abs(dy*O.x-dx*O.y+P2.x*P1.y-P1.x*P2.y)/len;
    }
    function foot(O,P1,P2){
        const dx=P2.x-P1.x, dy=P2.y-P1.y, len2=dx*dx+dy*dy;
        if(len2<1e-9) return {...P1};
        const t=((O.x-P1.x)*dx+(O.y-P1.y)*dy)/len2;
        return {x:P1.x+t*dx, y:P1.y+t*dy};
    }
    function extendLine(P1,P2,w,h){
        const dx=P2.x-P1.x, dy=P2.y-P1.y;
        if(Math.abs(dx)<1e-9&&Math.abs(dy)<1e-9) return [P1,P2];
        const ts=[];
        if(Math.abs(dx)>1e-9){ts.push((0-P1.x)/dx); ts.push((w-P1.x)/dx);}
        if(Math.abs(dy)>1e-9){ts.push((0-P1.y)/dy); ts.push((h-P1.y)/dy);}
        const pts=ts.map(t=>({x:P1.x+t*dx,y:P1.y+t*dy})).filter(p=>p.x>=-1&&p.x<=w+1&&p.y>=-1&&p.y<=h+1);
        if(pts.length<2) return [P1,P2];
        return [pts[0],pts[pts.length-1]];
    }
    function drawRightAngle(O,foot,P1,P2){
        const dx=P2.x-P1.x, dy=P2.y-P1.y, len=Math.hypot(dx,dy);
        if(len<1e-9) return;
        const size=8, along={x:dx/len,y:dy/len};
        const toO={x:O.x-foot.x,y:O.y-foot.y}, toOLen=Math.hypot(toO.x,toO.y);
        if(toOLen<1e-9) return;
        const perp={x:toO.x/toOLen,y:toO.y/toOLen};
        const p1={x:foot.x+along.x*size,y:foot.y+along.y*size};
        const p2={x:foot.x+perp.x*size,y:foot.y+perp.y*size};
        const p3={x:p1.x+perp.x*size,y:p1.y+perp.y*size};
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p3.x,p3.y); ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle='#999'; ctx.lineWidth=1.2; ctx.stroke();
    }

    function update(){
        const d=ptLineDist(O,P1,P2);
        const isZh=_lang()==='zh';
        let cls, conclusionText, relationText, lineColor;

        if(Math.abs(d-radius)<1.5){
            cls='tangent'; lineColor='#27ae60'; relationText='d = r';
            conclusionText=isZh?'d = r，直线与⊙O相切':'d = r, line is tangent to ⊙O';
        } else if(d>radius){
            cls='outside'; lineColor='#e67e22'; relationText='d > r';
            conclusionText=isZh?'d > r，直线与⊙O相离':'d > r, line is separate from ⊙O';
        } else {
            cls='inside'; lineColor='#2980b9'; relationText='d < r';
            conclusionText=isZh?'d < r，直线与⊙O相交':'d < r, line intersects ⊙O';
        }

        document.getElementById('dataPanel').innerHTML=`
            <div class="formula-row">
                <div class="metric">${isZh?'半径 r':'Radius r'} = <span class="metric-value">${radius.toFixed(2)}</span></div>
                <div class="metric">${isZh?'圆心到直线距离 d':'Distance d'} = <span class="metric-value">${d.toFixed(2)}</span></div>
                <div class="metric">${isZh?'关系':'Relation'}: <span class="metric-value">${relationText}</span></div>
            </div>
            <div class="formula-row">
                <span class="conclusion-badge ${cls}">${conclusionText}</span>
            </div>`;

        drawCanvas(d, lineColor);
    }

    function drawCanvas(d, lineColor){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=_bg(); ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.beginPath(); ctx.arc(O.x,O.y,radius,0,2*Math.PI);
        ctx.strokeStyle=_fg(); ctx.lineWidth=1.8; ctx.stroke();

        const [ep1,ep2]=extendLine(P1,P2,canvas.width,canvas.height);
        ctx.beginPath(); ctx.moveTo(ep1.x,ep1.y); ctx.lineTo(ep2.x,ep2.y);
        ctx.strokeStyle=lineColor; ctx.lineWidth=2; ctx.stroke();

        const f=foot(O,P1,P2);
        ctx.beginPath(); ctx.moveTo(O.x,O.y); ctx.lineTo(f.x,f.y);
        ctx.strokeStyle='#aaa'; ctx.lineWidth=1.2; ctx.setLineDash([5,3]); ctx.stroke(); ctx.setLineDash([]);
        drawRightAngle(O,f,P1,P2);

        const mx=(O.x+f.x)/2, my=(O.y+f.y)/2;
        ctx.fillStyle=_fg()==='#e8e4dc'?'#aaa':'#666'; ctx.font='13px "DM Sans",sans-serif';
        ctx.fillText('d', mx+6, my-4);

        ctx.beginPath(); ctx.arc(O.x,O.y,5,0,2*Math.PI); ctx.fillStyle=_fg(); ctx.fill();
        ctx.font='500 14px "DM Sans",Arial,sans-serif'; ctx.fillStyle=_fg();
        ctx.fillText('O', O.x-16, O.y-8);

        [{p:P1,l:'P'},{p:P2,l:'Q'}].forEach(({p,l})=>{
            ctx.beginPath(); ctx.arc(p.x,p.y,6,0,2*Math.PI);
            ctx.fillStyle=_fg()==='#e8e4dc'?'#777':'#555'; ctx.fill();
            ctx.fillStyle=_fg(); ctx.fillText(l, p.x+8, p.y-8);
        });
    }

    function getMousePos(e){
        const rect=canvas.getBoundingClientRect();
        return {x:(e.clientX-rect.left)*(600/rect.width), y:(e.clientY-rect.top)*(500/rect.height)};
    }
    canvas.addEventListener('mousedown',e=>{
        const m=getMousePos(e), thr=15;
        if(Math.hypot(m.x-O.x,m.y-O.y)<thr){dragging=true;dragTarget='O';}
        else if(Math.hypot(m.x-P1.x,m.y-P1.y)<thr){dragging=true;dragTarget='P1';}
        else if(Math.hypot(m.x-P2.x,m.y-P2.y)<thr){dragging=true;dragTarget='P2';}
    });
    window.addEventListener('mousemove',e=>{
        if(!dragging) return;
        const m=getMousePos(e);
        if(dragTarget==='O'){O.x=m.x;O.y=m.y;}
        else if(dragTarget==='P1'){P1.x=m.x;P1.y=m.y;}
        else if(dragTarget==='P2'){P2.x=m.x;P2.y=m.y;}
        update();
    });
    window.addEventListener('mouseup',()=>{dragging=false;dragTarget=null;});

    const obs=new MutationObserver(()=>update());
    obs.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});

    window.addEventListener('message',ev=>{
        if(!ev.data||ev.data._src!=='circlelab') return;
        if(ev.data.theme) document.documentElement.setAttribute('data-theme',ev.data.theme);
        if(ev.data.lang){
            if(!window._CL) window._CL={};
            window._CL.lang=ev.data.lang;
            const zh=ev.data.lang==='zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el=>el.style.display=zh?'':'none');
            document.querySelectorAll('[data-cl-en]').forEach(el=>el.style.display=zh?'none':'');
        }
        if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
        update();
    });
    window._clRedraw=update;
    window.addEventListener('load',update);
    update();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦切角定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-sub: #888;
            --accent2: #c8502a;
            --border: #e8e4dc;
            --hover-bg: #f0ede6;
            --shadow: 0 1px 12px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg: #141414;
            --card-bg: #1c1c1c;
            --text: #e8e4dc;
            --text-sub: #666;
            --accent2: #e8724a;
            --border: #2a2a2a;
            --hover-bg: #242424;
            --shadow: 0 1px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
        }

        .circle-card {
            max-width: 820px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-header .title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--text);
            margin-bottom: 2px;
        }

        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.2px;
        }

        .canvas-container {
            padding: 28px 28px 16px;
            display: flex;
            justify-content: center;
        }

        canvas {
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            cursor: grab;
            max-width: 100%;
        }

        .card-content {
            padding: 0 28px 28px;
        }

        .descriptions {
            margin: 16px 0;
            font-size: 0.92rem;
            color: var(--text);
            display: flex;
            gap: 24px;
            font-weight: 500;
        }

        .descriptions b {
            color: var(--accent2);
            font-family: monospace;
            font-size: 1.05rem;
        }

        .theorem-box {
            background: var(--hover-bg);
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid var(--accent2);
            margin-top: 12px;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>

<div class="circle-card">
    <div class="card-header">
        <div class="title">弦切角定理</div>
        <div class="sub-en">弦切角等于它所夹的弧所对的圆周角。</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="560" height="420"></canvas>
    </div>

    <div class="card-content">
        <div class="descriptions">
            <span>∠BAT = <b id="valBAT">0.0</b>°</span>
            <span>∠ACB = <b id="valACB">0.0</b>°</span>
        </div>
        <div class="theorem-box">
            📐 顶点在圆上，一边和圆相切，另一边和圆相交的角叫做弦切角。弦切角等于它所夹的弧所对的圆周角。
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const cx = 280, cy = 210, r = 150;

        let angA = Math.PI * 1.25; 
        let angB = Math.PI * 0.45; 
        let angC = Math.PI * 1.85; 
        let dragging = null;

        function _color(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const A = { x: cx + r * Math.cos(angA), y: cy + r * Math.sin(angA) };
            const B = { x: cx + r * Math.cos(angB), y: cy + r * Math.sin(angB) };
            const C = { x: cx + r * Math.cos(angC), y: cy + r * Math.sin(angC) };

            // 绘制圆
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = _color('--border');
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 绘制切线
            const tAng = angA + Math.PI / 2;
            const T1 = { x: A.x + 150 * Math.cos(tAng), y: A.y + 150 * Math.sin(tAng) };
            const T2 = { x: A.x - 150 * Math.cos(tAng), y: A.y - 150 * Math.sin(tAng) };
            ctx.beginPath(); ctx.moveTo(T1.x, T1.y); ctx.lineTo(T2.x, T2.y);
            ctx.strokeStyle = _color('--accent2');
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // 绘制弦
            ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y);
            ctx.lineTo(C.x, C.y); ctx.closePath();
            ctx.strokeStyle = _color('--text');
            ctx.lineWidth = 2;
            ctx.stroke();

            // 交互点
            [[A, 'A', _color('--accent2')], [B, 'B', _color('--text')], [C, 'C', _color('--text')]].forEach(([p, label, col]) => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = col; ctx.fill();
                ctx.fillStyle = _color('--text'); ctx.font = "bold 15px 'DM Sans'";
                const dx = p.x - cx, dy = p.y - cy, len = Math.hypot(dx, dy);
                ctx.fillText(label, p.x + (dx / len) * 18 - 5, p.y + (dy / len) * 18 + 5);
            });

            let diff = Math.abs(angA - angB);
            if (diff > Math.PI) diff = 2 * Math.PI - diff;
            const deg = (diff / 2 * 180 / Math.PI).toFixed(1);
            document.getElementById('valBAT').textContent = deg;
            document.getElementById('valACB').textContent = deg;
        }

        function getM(e) {
            const b = canvas.getBoundingClientRect();
            return { x: (e.clientX - b.left) * (canvas.width / b.width), y: (e.clientY - b.top) * (canvas.height / b.height) };
        }

        canvas.onmousedown = e => {
            const m = getM(e);
            const pts = [{ a: angA, n: 'A' }, { a: angB, n: 'B' }, { a: angC, n: 'C' }];
            pts.forEach(p => {
                if (Math.hypot(m.x - (cx + r * Math.cos(p.a)), m.y - (cy + r * Math.sin(p.a))) < 20) dragging = p.n;
            });
        };

        window.onmousemove = e => {
            if (dragging) {
                const m = getM(e);
                const a = Math.atan2(m.y - cy, m.x - cx);
                if (dragging === 'A') angA = a; else if (dragging === 'B') angB = a; else angC = a;
                update();
            }
        };

        window.onmouseup = () => dragging = null;

        new MutationObserver(update).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        window.addEventListener('message', ev => {
            if (ev.data?._src === 'circlelab' && ev.data.theme) {
                document.documentElement.setAttribute('data-theme', ev.data.theme);
                update();
            }
        });

        update();
    })();
</script>
</body>
</html>

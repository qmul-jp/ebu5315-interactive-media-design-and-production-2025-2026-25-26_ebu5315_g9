<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦切角定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'DM Serif Display', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .canvas-container {
            padding: 28px 28px 16px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 18px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'DM Sans', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 28px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>弦切角定理</div>
        <div class="title" data-cl-en style="display:none">Tangent-Chord Angle Theorem</div>
        <div class="sub-en" data-cl-zh>弦切角等于它所夹弧所对的圆周角</div>
        <div class="sub-en" data-cl-en style="display:none">A tangent-chord angle equals the inscribed angle subtending the same arc</div>
    </div>
    <div class="canvas-container">
        <canvas id="circleCanvas" width="600" height="500" style="width:100%; height:auto; max-width:600px; aspect-ratio:600/500"></canvas>
    </div>
    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽 A、B、C 三点</span><span data-cl-en style="display:none">Drag points A, B, C</span></span>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 600, CANVAS_H = 500;
        const cx = 300, cy = 255, radius = 180;

        let angleA = 150, angleB = 40, angleC = 260;
        let dragging = false, dragTarget = null;
        document.documentElement.style.fontSize = '16px';

        function _fg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#1c1c1c' : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang() { return (window._CL && window._CL.lang) || 'zh'; }

        function d2r(d) { return d * Math.PI / 180; }
        function r2d(r) { return r * 180 / Math.PI; }

        function pt(deg) {
            return { x: cx + radius * Math.cos(d2r(deg)), y: cy + radius * Math.sin(d2r(deg)) };
        }

        function angleBetween(a, b, c) {
            const v1 = { x: a.x - b.x, y: a.y - b.y };
            const v2 = { x: c.x - b.x, y: c.y - b.y };
            const dot = v1.x * v2.x + v1.y * v2.y;
            const len = Math.hypot(v1.x, v1.y) * Math.hypot(v2.x, v2.y);
            if (len < 1e-9) return 0;
            return r2d(Math.acos(Math.max(-1, Math.min(1, dot / len))));
        }

        // 切线方向：垂直于 OA，取朝向 B 那侧
        function getTangentDir(pA, pB) {
            const oaDx = pA.x - cx, oaDy = pA.y - cy;
            const t1 = { x: -oaDy, y: oaDx };
            const t2 = { x:  oaDy, y: -oaDx };
            const abx = pB.x - pA.x, aby = pB.y - pA.y;
            const chosen = (t1.x * abx + t1.y * aby) >= 0 ? t1 : t2;
            const len = Math.hypot(chosen.x, chosen.y);
            return { x: chosen.x / len, y: chosen.y / len };
        }

        function drawAngleArc(vertex, from, to, r, color) {
            const a1 = Math.atan2(from.y - vertex.y, from.x - vertex.x);
            const a2 = Math.atan2(to.y   - vertex.y, to.x   - vertex.x);
            const diff = Math.atan2(Math.sin(a2 - a1), Math.cos(a2 - a1));
            ctx.beginPath();
            ctx.arc(vertex.x, vertex.y, r, a1, a2, diff < 0);
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
        }

        function drawRightAngle(vertex, dir1, dir2, size, color) {
            const a1 = Math.atan2(dir1.y, dir1.x);
            const a2 = Math.atan2(dir2.y, dir2.x);
            const p1 = { x: vertex.x + Math.cos(a1) * size, y: vertex.y + Math.sin(a1) * size };
            const p2 = { x: vertex.x + Math.cos(a2) * size, y: vertex.y + Math.sin(a2) * size };
            const p3 = { x: p1.x + Math.cos(a2) * size,    y: p1.y + Math.sin(a2) * size };
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
        }

        function updateTexts(pA, pB, pC, tDir, bat, acb, isEqual) {
            const isZh = _lang() === 'zh';
            const col = isEqual ? '#27ae60' : '#e74c3c';

            if (isZh) {
                document.getElementById('descArea').innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">∠BAT</span> = ${bat.toFixed(2)}°</div>
                    <div class="desc-item"><span class="desc-symbol">∠ACB</span> = ${acb.toFixed(2)}°</div>
                    <div class="desc-item" style="color:${col}">∠BAT ${isEqual ? '=' : '≠'} ∠ACB${isEqual ? ' ✓' : ''}</div>`;
                document.getElementById('theoremText').innerHTML = '📐 弦切角等于它所夹弧所对的圆周角（顶点在切点，一边为切线，另一边为弦）';
            } else {
                document.getElementById('descArea').innerHTML = `
                    <div class="desc-item"><span class="desc-symbol">∠BAT</span> = ${bat.toFixed(2)}°</div>
                    <div class="desc-item"><span class="desc-symbol">∠ACB</span> = ${acb.toFixed(2)}°</div>
                    <div class="desc-item" style="color:${col}">∠BAT ${isEqual ? '=' : '≠'} ∠ACB${isEqual ? ' ✓' : ''}</div>`;
                document.getElementById('theoremText').innerHTML = '📐 A tangent-chord angle equals the inscribed angle subtending the same arc';
            }
        }

        function drawCanvas(pA, pB, pC, tDir, bat, acb, isEqual) {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg();
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            const isDark = _isDark();
            const col    = isEqual ? '#27ae60' : '#e74c3c';
            const colC   = isEqual ? '#27ae60' : '#2980b9';
            const auxStr = isDark  ? '#555' : '#aaa';

            // 圆
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = isDark ? '#555' : '#bbb';
            ctx.lineWidth = 1.5; ctx.stroke();

            // 弦 AB
            ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();

            // 切线（过 A，双向延伸）
            const T1 = { x: pA.x + tDir.x * 90, y: pA.y + tDir.y * 90 };
            const T2 = { x: pA.x - tDir.x * 90, y: pA.y - tDir.y * 90 };
            ctx.beginPath(); ctx.moveTo(T1.x, T1.y); ctx.lineTo(T2.x, T2.y);
            ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();

            // CA、CB（圆周角边，虚线）
            ctx.setLineDash([5, 3]); ctx.strokeStyle = colC; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(pC.x, pC.y); ctx.lineTo(pA.x, pA.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pC.x, pC.y); ctx.lineTo(pB.x, pB.y); ctx.stroke();
            ctx.setLineDash([]);

            // 半径 OA（用于直角标注）
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = auxStr; ctx.lineWidth = 1.2; ctx.setLineDash([4, 2]); ctx.stroke(); ctx.setLineDash([]);

            // 直角标记（OA ⊥ 切线）
            const oaDir = { x: cx - pA.x, y: cy - pA.y };
            const oaLen = Math.hypot(oaDir.x, oaDir.y);
            drawRightAngle(pA, { x: oaDir.x / oaLen, y: oaDir.y / oaLen }, tDir, 10, auxStr);

            // 弦切角弧（A 处）
            drawAngleArc(pA, pB, T1, 24, col);
            // 圆周角弧（C 处）
            drawAngleArc(pC, pA, pB, 22, colC);

            // 圆心 O
            ctx.beginPath(); ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = _fg(); ctx.fill();
            ctx.font = '500 14px "DM Sans", Arial, sans-serif';
            ctx.fillStyle = _fg();
            ctx.fillText('O', cx - 15, cy - 8);

            // T 标注
            ctx.fillStyle = _fg(); ctx.font = '13px "DM Sans", sans-serif';
            ctx.fillText('T', T1.x + 6, T1.y - 6);

            // 三点 A、B、C
            [{ p: pA, l: 'A', c: col }, { p: pB, l: 'B', c: col }, { p: pC, l: 'C', c: colC }].forEach(({ p, l, c }) => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = c; ctx.fill();
                ctx.fillStyle = _fg();
                const dx = p.x - cx, dy = p.y - cy, len = Math.hypot(dx, dy);
                ctx.fillText(l, p.x + (dx / len) * 14, p.y + (dy / len) * 14);
            });
        }

        function update() {
            const pA = pt(angleA), pB = pt(angleB), pC = pt(angleC);
            const tDir = getTangentDir(pA, pB);
            const T = { x: pA.x + tDir.x * 60, y: pA.y + tDir.y * 60 };
            const bat    = angleBetween(pB, pA, T);
            const acb    = angleBetween(pA, pC, pB);
            const isEqual = Math.abs(bat - acb) < 0.8;
            updateTexts(pA, pB, pC, tDir, bat, acb, isEqual);
            drawCanvas(pA, pB, pC, tDir, bat, acb, isEqual);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (CANVAS_W / rect.width),
                y: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function handleStart(e) {
            const m = getMousePos(e);
            const pts = [{ a: angleA, n: 'A' }, { a: angleB, n: 'B' }, { a: angleC, n: 'C' }];
            for (const { a, n } of pts) {
                const p = pt(a);
                if (Math.hypot(m.x - p.x, m.y - p.y) < 18) {
                    dragging = true; dragTarget = n; break;
                }
            }
        }
        function handleMove(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            const deg = r2d(Math.atan2(m.y - cy, m.x - cx));
            if      (dragTarget === 'A') angleA = deg;
            else if (dragTarget === 'B') angleB = deg;
            else if (dragTarget === 'C') angleC = deg;
            update();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { dragging = false; dragTarget = null; });
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', () => { dragging = false; dragTarget = null; });

        // 主题与语言同步
        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            update();
        });

        window.addEventListener('load', () => { update(); });
        update();
    })();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircleLab | Log in</title>
    <script>
      (() => {
        try {
          const theme = window.localStorage.getItem("circlelab-theme");
          const language = window.localStorage.getItem("circlelab-language");
          if (theme === "light" || theme === "solar") {
            document.documentElement.dataset.theme = "light";
          }
          document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
        } catch (error) {
          document.documentElement.lang = "en";
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-title-key="document.login">
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand" href="homepage.html" aria-label="Circle Geometry home">
          <img src="logowhite.png" alt="Circle Geometry logo" />
        </a>

        <nav class="primary-nav" aria-label="Primary">
          <ul>
            <li><a class="nav-link" href="homepage.html" data-i18n="nav.home">Home</a></li>
            <li><a class="nav-link" href="homepage.html" data-i18n="nav.game">Game</a></li>
            <li><a class="nav-link" href="homepage.html" data-i18n="nav.quiz">Quiz</a></li>
          </ul>
        </nav>

        <nav class="account-nav" aria-label="Account">
          <ul>
            <li>
              <a class="nav-link login-btn is-active" href="login.html" aria-current="page" data-i18n="nav.login">Log in</a>
            </li>
            <li><a class="nav-link signup-btn" href="homepage.html#signupOverlay" data-i18n="nav.signup">Sign up</a></li>
            <li class="settings-shell" data-settings>
              <button
                class="nav-link setting-btn settings-toggle"
                type="button"
                data-settings-toggle
                aria-haspopup="true"
                aria-expanded="false"
                aria-controls="settingsMenu"
                data-i18n-aria-label="nav.settings"
                aria-label="Settings"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
              <div class="settings-dropdown" id="settingsMenu" data-settings-menu hidden>
                <p class="settings-panel-title" data-i18n="settings.title">Preferences</p>
                <section class="settings-section" aria-label="Language settings">
                  <p class="settings-label" data-i18n="settings.language">Language</p>
                  <div class="settings-options" role="group" aria-label="Language">
                    <button class="settings-option" type="button" data-language-option="en">
                      <span data-i18n="settings.language_en">English</span>
                    </button>
                    <button class="settings-option" type="button" data-language-option="zh">
                      <span data-i18n="settings.language_zh">简体中文</span>
                    </button>
                  </div>
                </section>
                <section class="settings-section" aria-label="Theme settings">
                  <p class="settings-label" data-i18n="settings.theme">Theme</p>
                  <div class="settings-options" role="group" aria-label="Theme">
                    <button class="settings-option" type="button" data-theme-option="dark">
                      <span data-i18n="settings.theme_dark">Dark</span>
                    </button>
                    <button class="settings-option" type="button" data-theme-option="light">
                      <span data-i18n="settings.theme_light">Light</span>
                    </button>
                  </div>
                </section>
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="auth-page-main">
      <section class="auth-stage" aria-labelledby="loginTitle">
        <div class="signup-modal login-modal">
          <div class="signup-modal-showcase" aria-hidden="true">
            <svg class="signup-modal-geometry" viewBox="146 108 540 540" role="presentation" focusable="false">
              <g class="signup-modal-geometry-circles">
                <circle cx="366" cy="432" r="16" />
                <circle cx="371" cy="440" r="18" />
                <circle cx="373" cy="451" r="21" />
                <circle cx="371" cy="463" r="24" />
                <circle cx="364" cy="475" r="28" />
                <circle cx="351" cy="483" r="32" />
                <circle cx="335" cy="488" r="37" />
                <circle cx="315" cy="486" r="43" />
                <circle cx="296" cy="476" r="50" />
                <circle cx="281" cy="457" r="57" />
                <circle cx="272" cy="431" r="66" />
                <circle cx="274" cy="401" r="76" />
                <circle cx="289" cy="369" r="87" />
                <circle cx="318" cy="341" r="101" />
                <circle cx="361" cy="325" r="116" />
                <circle cx="412" cy="325" r="134" />
                <circle cx="467" cy="348" r="154" />
              </g>
            </svg>
          </div>

          <section class="signup-modal-panel">
            <a class="signup-modal-close auth-back-link" href="homepage.html" aria-label="Back to home">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 6 9 12l6 6" />
              </svg>
            </a>

            <div class="signup-modal-badge" aria-hidden="true">
              <img src="logowhite.png" alt="" />
            </div>

            <h1 class="signup-modal-title" id="loginTitle" data-i18n="login.title">Welcome back</h1>
            <p class="signup-modal-intro" data-i18n="login.intro">
              Log in to continue your geometry journey.
            </p>

            <form class="signup-form" data-login-form novalidate>
              <label class="signup-field" for="loginEmail">
                <span data-i18n="field.email">Email address</span>
                <input
                  class="signup-input"
                  id="loginEmail"
                  name="email"
                  type="email"
                  autocomplete="email"
                  aria-describedby="loginFormFeedback"
                  data-i18n-placeholder="field.email_placeholder"
                  placeholder="you@circlelab.com"
                  required
                />
              </label>

              <label class="signup-field" for="loginPassword">
                <span data-i18n="field.password">Password</span>
                <input
                  class="signup-input"
                  id="loginPassword"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  aria-describedby="loginFormFeedback"
                  minlength="8"
                  data-i18n-placeholder="login.password_placeholder"
                  placeholder="Enter your password"
                  required
                />
              </label>

              <div class="login-form-meta">
                <label class="signup-consent login-remember" for="loginRemember">
                  <input
                    class="signup-consent-checkbox"
                    id="loginRemember"
                    name="remember"
                    type="checkbox"
                  />
                  <span class="signup-consent-copy" data-i18n="login.remember">Remember this browser</span>
                </label>

                <button class="login-forgot-link" type="button" data-login-help data-i18n="login.forgot">
                  Forgot password?
                </button>
              </div>

              <button class="signup-submit" type="submit" data-i18n="nav.login">Log in</button>
              <p
                class="signup-form-status"
                id="loginFormFeedback"
                data-login-feedback
                role="status"
                aria-live="polite"
                aria-atomic="true"
                hidden
              ></p>
            </form>

            <p class="signup-modal-helper">
              <span data-i18n="login.helper_prefix">Need an account?</span> <a href="homepage.html#signupOverlay" data-i18n="login.helper_link">Create one here</a>
            </p>
          </section>
        </div>
      </section>
    </main>

    <script src="preferences.js"></script>
    <script src="login.js"></script>
  </body>
</html>

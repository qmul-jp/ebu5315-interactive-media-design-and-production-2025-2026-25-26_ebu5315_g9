  <main class="page">
    <section class="hero motion-item motion-delay-1" id="heroSection">
      <h1 id="heroTitle">圆相关知识点的习题</h1>
      <p id="heroDesc">支持判题反馈、答案解析、错题本记录（自动保存到本地浏览器）</p>
    </section>

    <section class="panel question-panel motion-item motion-delay-2">
      <div class="mode-row motion-item motion-delay-2" id="pageTabs">
        <button class="tab-btn active" id="homePageBtn" type="button">首页</button>
        <button class="tab-btn" id="practicePageBtn" type="button">练习页</button>
        <button class="tab-btn" id="sectionsPageBtn" type="button">Sections页</button>
        <span class="spacer"></span>
        <button class="ghost-btn" id="pureModeBtn" type="button">纯净模式</button>
      </div>

      <div class="mode-row motion-item motion-delay-2" id="modeControls">
        <button class="tab-btn active" id="allModeBtn" type="button">全部题目</button>
        <button class="tab-btn" id="wrongModeBtn" type="button">错题本练习</button>
        <button class="tab-btn" id="examModeBtn" type="button">考试模式</button>
        <button class="ghost-btn" id="clearWrongBtn" type="button">清空错题本</button>
        <button class="ghost-btn danger hidden" id="confirmClearWrongBtn" type="button">确认清空</button>
        <button class="ghost-btn hidden" id="cancelClearWrongBtn" type="button">取消</button>
        <span class="spacer"></span>
        <button class="ghost-btn" id="themeToggleBtn" type="button">深色模式</button>
        <button class="ghost-btn" id="langToggleBtn" type="button">EN</button>
      </div>

      <div class="mode-row filters motion-item motion-delay-3" id="filtersRow">
        <label class="select-wrap" for="sectionSelect" id="sectionFilterWrap">
          <span id="sectionLabel">Section</span>
          <select class="filter-select" id="sectionSelect"></select>
        </label>
        <span class="section-badge" id="levelBadge">Level 1</span>
        <button class="ghost-btn" id="smartNextBtn" type="button">AI推荐下一题</button>
      </div>
      <div class="exam-section-picker motion-item motion-delay-3 hidden" id="examSectionPicker">
        <div class="exam-section-head">
          <strong id="examSectionLabel">考试章节</strong>
          <div class="exam-section-actions">
            <button class="ghost-btn" id="examSectionSelectAllBtn" type="button">全选章节</button>
            <button class="ghost-btn" id="examSectionClearAllBtn" type="button">全不选</button>
          </div>
        </div>
        <div class="exam-time-row">
          <label class="exam-time-config" for="examDurationInput">
            <span id="examTimeLabel">考试时间</span>
            <input id="examDurationInput" class="exam-time-input" type="number" min="1" max="300" step="1" value="45" />
            <span id="examTimeUnit">分钟</span>
          </label>
          <button class="ghost-btn" id="examApplyTimeBtn" type="button">应用时间</button>
          <span class="exam-timer-text" id="examTimerValue">剩余时间 45:00</span>
        </div>
        <div class="exam-section-list" id="examSectionList"></div>
      </div>

      <section class="stats motion-item motion-delay-3" aria-label="stats" id="statsPanel">
        <div class="stat-item"><b id="statTotal">0</b><span id="statTotalLabel">当前题量</span></div>
        <div class="stat-item"><b id="statAnswered">0</b><span id="statAnsweredLabel">已作答</span></div>
        <div class="stat-item"><b id="statCorrect">0</b><span id="statCorrectLabel">答对</span></div>
        <div class="stat-item"><b id="statWrong">0</b><span id="statWrongLabel">错题本</span></div>
      </section>

      <div id="questionWrap" class="motion-item motion-delay-4">
        <div class="q-head">
          <span class="badge" id="questionType">题型</span>
          <span id="questionProgress">0 / 0</span>
        </div>

        <h2 id="questionStem"></h2>
        <form id="answerForm" class="options"></form>

        <div class="action-row">
          <button class="action-btn primary" id="submitBtn" type="button">提交答案</button>
          <button class="action-btn" id="showAnswerBtn" type="button">查看答案与解析</button>
          <button class="action-btn hidden" id="submitPaperBtn" type="button">交卷</button>
        </div>

        <div id="feedback" class="feedback hidden"></div>

        <div class="nav-row q-nav-row">
          <button class="nav-btn" id="prevBtn" type="button">上一题</button>
          <button class="nav-btn" id="nextBtn" type="button">下一题</button>
        </div>
      </div>

      <div id="emptyState" class="empty hidden"></div>

      <section id="homePage" class="subpage home-page motion-item motion-delay-4">
        <h3 id="homePageTitle">欢迎来到做题主页</h3>
        <p id="homePageDesc">你可以从这里快速进入练习、考试或章节学习。想专注作答可启用纯净模式。</p>
        <div class="home-actions">
          <article class="home-card">
            <div>

            </div>
            <button class="action-btn primary" id="homeStartPracticeBtn" type="button">进入练习</button>

          <article class="home-card">
            <div>

            </div>
            <button class="action-btn" id="homeStartExamBtn" type="button">进入考试</button>
          </article>
          <article class="home-card">
            <div>
              <b id="homeCardSectionTitle">按章节学习</b>
              <span id="homeCardSectionDesc">浏览 Section 和题量，按章节进行训练。</span>
            </div>
            <button class="action-btn" id="homeOpenSectionsBtn" type="button">查看 Sections</button>
          </article>
        </div>
      </section>

      <section id="sectionsPage" class="subpage motion-item motion-delay-4 hidden">
        <h3 id="sectionsPageTitle">Section Overview</h3>
        <p id="sectionsPageDesc">可点击进入对应 section 练习。</p>
        <div id="sectionsGrid" class="section-grid"></div>
      </section>
    </section>

    <aside class="panel side-panel motion-item motion-delay-3" id="sidePanel">

      <p class="side-tip" id="wrongHint">答错题目会自动加入错题本。</p>

    function t(key, vars) {
      const dict = i18n[lang] || i18n.zh;

      return text;

    function getText(value) { return typeof value === "string" ? value : (value && (value[lang] || value.zh || value.en)) || ""; }
    function clearAnswerRecords() { Object.keys(answerRecords).forEach((key) => delete answerRecords[key]); }

    function getSectionLabelById(sectionId) {

    function getMeta(questionId) {
      if (!questionMeta[questionId]) {
        questionMeta[questionId] = { seen: 0, lastSeenTick: -1000 };
      }
      return questionMeta[questionId];
    }

    function touchQuestion(questionId) {
      const meta = getMeta(questionId);
      visitTick += 1;
      meta.seen += 1;
      meta.lastSeenTick = visitTick;
    }

    function getSmartScore(question) {
      const meta = getMeta(question.id);
      const recency = Math.max(0, visitTick - meta.lastSeenTick);
      let score = 0;
      if (meta.seen === 0) score += 4;
      score += Math.min(3, recency / 3);
      score -= meta.seen * 0.45;
      if (wrongSet.has(question.id)) score += 3;
      if (answerRecords[question.id] && answerRecords[question.id].isCorrect === false) score += 1.5;
      if ((question.level || 1) === currentLevel) score += 1;
      return score;
    }

    function sortBySmart(pool) {
      return [...pool].sort((a, b) => getSmartScore(b) - getSmartScore(a));
    }

    function getCurrentQuestions() {
      let pool = questionBank.slice();

      if (mode === "wrong") {
        pool = pool.filter((q) => wrongSet.has(q.id));
      }

      if (examMode) {
        pool = pool.filter((q) => isSectionIncludedInExam(q.section));
      } else if (selectedSection !== "all") {
        pool = pool.filter((q) => q.section === selectedSection);
      }

      if (smartMode && !examMode && mode === "all") {
        pool = sortBySmart(pool);
      }

      return pool;
    }

    function refreshQuestionPool(preferredId) {
      const targetId = preferredId || (currentQuestions[currentIndex] ? currentQuestions[currentIndex].id : null);
      currentQuestions = getCurrentQuestions();
      if (!currentQuestions.length) {
        currentIndex = 0;
        return;
      }
      if (targetId) {
        const index = currentQuestions.findIndex((q) => q.id === targetId);
        if (index >= 0) {
          currentIndex = index;
          return;
        }
      }
      currentIndex = Math.max(0, Math.min(currentIndex, currentQuestions.length - 1));
    }

    function maybeProgressLevel() {
      if (examMode || mode === "wrong" || currentLevel >= MAX_LEVEL) return;
      const levelQuestions = questionBank.filter((q) => {
        const levelMatch = (q.level || 1) === currentLevel;
        const sectionMatch = selectedSection === "all" || q.section === selectedSection;
        return levelMatch && sectionMatch;
      });
      if (!levelQuestions.length) return;
      const correctCount = levelQuestions.filter((q) => answerRecords[q.id] && answerRecords[q.id].isCorrect === true).length;
      if (correctCount / levelQuestions.length >= 0.7) {
        currentLevel += 1;
        return currentLevel;
      }
    }

    function clampExamMinutes(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return examDurationMinutes;
      return Math.max(MIN_EXAM_MINUTES, Math.min(MAX_EXAM_MINUTES, Math.round(numeric)));
    }

    function formatTimeClock(totalSeconds) {
      const safe = Math.max(0, totalSeconds);
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

      if (!examMode || examSubmitted) return;
      examTimerId = window.setInterval(() => {
        if (!examMode || examSubmitted) {
          stopExamTimer();
          return;
        }
        examRemainingSeconds = Math.max(0, examRemainingSeconds - 1);
        updateExamTimerDisplay();
        if (examRemainingSeconds <= 0) {
          stopExamTimer();
          submitPaper();
          showInfoFeedback(t("tip"), t("examTimeUpAutoSubmit"));
        }

    function formatAnswer(question, answer) {
      if (question.type === "single") return getText(question.options[answer]);
      if (question.type === "multiple") return answer.map((i) => getText(question.options[i])).join(lang === "zh" ? "、" : ", ");
      return Array.isArray(answer) ? answer.join(" / ") : String(answer);
    }

    function formatUserAnswer(question, userAnswer) {
      if (question.type === "single") return Number.isInteger(userAnswer) ? getText(question.options[userAnswer]) : t("noAnswer");
      if (question.type === "multiple") return userAnswer.length ? userAnswer.map((i) => getText(question.options[i])).join(lang === "zh" ? "、" : ", ") : t("noAnswer");
      return userAnswer ? userAnswer : t("noAnswer");
    }

    function evaluateAnswer(question, userAnswer) {
      if (question.type === "single") return Number.isInteger(userAnswer) && userAnswer === question.answer;
      if (question.type === "multiple") {
        const given = [...userAnswer].sort((a, b) => a - b);
        const std = [...question.answer].sort((a, b) => a - b);
        return given.length === std.length && given.every((v, i) => v === std[i]);
      }
      const acceptable = Array.isArray(question.answer) ? question.answer : [question.answer];
      return acceptable.map((x) => String(x).trim().toLowerCase()).includes(String(userAnswer).trim().toLowerCase());
    }

    function collectUserAnswer(question) {
      if (question.type === "single") {
        const checked = els.answerForm.querySelector("input[name='single-answer']:checked");
        return checked ? Number(checked.value) : null;
      }
      if (question.type === "multiple") {
        const checked = [...els.answerForm.querySelectorAll("input[name='multiple-answer']:checked")];
        return checked.map((item) => Number(item.value));
      }
      const input = els.answerForm.querySelector("input[name='blank-answer']");
      return input ? input.value.trim() : "";
    }

      question.options.forEach((option, index) => {
        const label = document.createElement("label");

        input.type = question.type === "single" ? "radio" : "checkbox";

        input.value = String(index);
        input.disabled = examMode && examSubmitted;

        if (record) {
          if (question.type === "single" && record.userAnswer === index) input.checked = true;
          if (question.type === "multiple" && record.userAnswer.includes(index)) input.checked = true;
        }

        const text = document.createElement("span");
        text.textContent = getText(option);
        label.append(input, text);
        els.answerForm.appendChild(label);
      });
    }

    function showAnswerOnly(question) {
      renderFeedback("info", t("answerAndAnalysis"), [
        { label: t("rightAnswer"), text: formatAnswer(question, question.answer) },
        { label: t("analysis"), text: getText(question.analysis) }
      ]);
    }

    function applyStaticTexts() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.title = t("pageTitle");
      els.heroTitle.textContent = t("heroTitle");
      els.heroDesc.textContent = t("heroDesc");
      els.homePageBtn.textContent = t("pageHome");
      els.practicePageBtn.textContent = t("pagePractice");
      els.sectionsPageBtn.textContent = t("pageSections");
      els.pureModeBtn.textContent = pureMode ? t("pureModeOff") : t("pureModeOn");
      els.allModeBtn.textContent = t("modeAll");
      els.wrongModeBtn.textContent = t("modeWrong");
      els.examModeBtn.textContent = examMode ? t("exitExamMode") : t("enterExamMode");
      els.clearWrongBtn.textContent = t("clearWrong");
      els.confirmClearWrongBtn.textContent = t("clearConfirm");
      els.cancelClearWrongBtn.textContent = t("clearCancel");
      els.themeToggleBtn.textContent = getResolvedTheme() === "dark" ? t("themeToLight") : t("themeToDark");
      els.langToggleBtn.textContent = lang === "zh" ? "EN" : "中文";
      els.sectionLabel.textContent = t("sectionLabel");
      els.examSectionLabel.textContent = t("examSectionLabel");
      els.examSectionSelectAllBtn.textContent = t("examSectionSelectAll");
      els.examSectionClearAllBtn.textContent = t("examSectionClearAll");
      els.examTimeLabel.textContent = t("examTimeLabel");
      els.examTimeUnit.textContent = t("examTimeUnit");
      els.examApplyTimeBtn.textContent = t("examApplyTime");
      els.smartNextBtn.textContent = t("smartNext");
      els.statTotalLabel.textContent = t("statTotalLabel");
      els.statAnsweredLabel.textContent = t("statAnsweredLabel");
      els.statCorrectLabel.textContent = examMode && !examSubmitted ? t("statPendingLabel") : t("statCorrectLabel");
      els.statWrongLabel.textContent = examMode && !examSubmitted ? t("statUnansweredLabel") : t("statWrongLabel");
      els.submitBtn.textContent = examMode && !examSubmitted ? t("saveAnswer") : t("submitAnswer");
      els.showAnswerBtn.textContent = t("showAnswer");
      els.submitPaperBtn.textContent = t("submitPaper");
      els.prevBtn.textContent = t("prev");
      els.nextBtn.textContent = t("next");
      els.wrongTitle.textContent = t("wrongTitle");
      els.homePageTitle.textContent = t("homePageTitle");
      els.homePageDesc.textContent = t("homePageDesc");
      els.homeCardPracticeTitle.textContent = t("homeCardPracticeTitle");
      els.homeCardPracticeDesc.textContent = t("homeCardPracticeDesc");
      els.homeStartPracticeBtn.textContent = t("homeCardPracticeBtn");
      els.homeCardExamTitle.textContent = t("homeCardExamTitle");
      els.homeCardExamDesc.textContent = t("homeCardExamDesc");
      els.homeStartExamBtn.textContent = t("homeCardExamBtn");
      els.homeCardSectionTitle.textContent = t("homeCardSectionTitle");
      els.homeCardSectionDesc.textContent = t("homeCardSectionDesc");
      els.homeOpenSectionsBtn.textContent = t("homeCardSectionBtn");
      els.sectionsPageTitle.textContent = t("sectionsPageTitle");
      els.sectionsPageDesc.textContent = t("sectionsPageDesc");
      populateSectionSelect();
      updateSectionOwnerBadge();
      updateExamTimerDisplay();
    }

    function renderStats() {
      const answered = currentQuestions.filter((q) => answerRecords[q.id] && !isAnswerEmpty(q, answerRecords[q.id].userAnswer)).length;
      const correct = currentQuestions.filter((q) => answerRecords[q.id] && answerRecords[q.id].isCorrect).length;
      const unanswered = currentQuestions.length - answered;
      const usingExamSummary = examMode && examSubmitted && examSummary;
      els.statTotal.textContent = usingExamSummary ? String(examSummary.total) : String(currentQuestions.length);
      els.statAnswered.textContent = usingExamSummary ? String(examSummary.answered) : String(answered);
      els.statCorrect.textContent = examMode && !examSubmitted ? "-" : String(usingExamSummary ? examSummary.correct : correct);
      els.statWrong.textContent = examMode && !examSubmitted ? String(unanswered) : String(usingExamSummary ? examSummary.wrong : wrongSet.size);
    }

    function renderWrongList(force = false) {
      const key = `${lang}|${[...wrongSet].sort().join(",")}`;
      if (!force && key === lastRenderedWrongListKey) return;
      lastRenderedWrongListKey = key;
      els.wrongList.innerHTML = "";
      if (!wrongSet.size) {
        els.wrongHint.textContent = t("wrongHintEmpty");
        return;
      }
      els.wrongHint.textContent = t("wrongHintCount", { count: wrongSet.size });
      questionBank.filter((q) => wrongSet.has(q.id)).forEach((q) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "wrong-item";
        btn.textContent = `${getTypeLabel(q.type)} | ${getText(q.stem)}`;
        btn.addEventListener("click", () => {
          runQuestionTransition(() => {
            activePage = "practice";
            mode = "all";
            refreshQuestionPool(q.id);
            currentIndex = Math.max(0, currentQuestions.findIndex((item) => item.id === q.id));
            render();
          });
        });
        els.wrongList.appendChild(btn);
      });
    }

    function render() {
      refreshQuestionPool();
      applyStaticTexts();
      renderExamSectionPicker();
      syncControlState();
      renderWrongList();
      renderSectionsPage();

      if (activePage !== "practice") {
        els.emptyState.classList.add("hidden");
        return;
      }

      renderStats();

      if (!currentQuestions.length) {
        els.questionWrap.classList.add("hidden");
        els.emptyState.classList.remove("hidden");
        if (examMode && !examSectionSet.size) {
          els.emptyState.textContent = t("examNoSectionSelected");
        } else {
          els.emptyState.textContent = mode === "wrong" ? t("emptyWrong") : t("emptyAll");
        }
        return;
      }

      els.questionWrap.classList.remove("hidden");
      els.emptyState.classList.add("hidden");

      currentIndex = Math.min(currentIndex, currentQuestions.length - 1);
      const question = currentQuestions[currentIndex];
      if (question && question.id !== lastRenderedQuestionId) {
        touchQuestion(question.id);
        lastRenderedQuestionId = question.id;
      }
      els.questionType.textContent = `${getTypeLabel(question.type)} | ${getSectionLabelById(question.section)} | L${question.level || 1}`;
      els.questionProgress.textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
      els.questionStem.textContent = getText(question.stem);
      renderOptions(question);

      const record = answerRecords[question.id];
      if (record && typeof record.isCorrect === "boolean") {
        showFeedback(question, record, record.isCorrect ? "correct" : "incorrect");
      } else if (record && examMode && !examSubmitted) {
        showSavedFeedback(question, record);
      } else {
        els.feedback.className = "feedback hidden";
        els.feedback.textContent = "";
      }
    }

    function submitAnswer() {
      if (!currentQuestions.length) return;
      const question = currentQuestions[currentIndex];
      const userAnswer = collectUserAnswer(question);

      if (examMode && examSubmitted) {
        showInfoFeedback(t("tip"), t("examAlreadySubmitted"));
        return;
      }

      if (isAnswerEmpty(question, userAnswer)) {
        showInfoFeedback(t("tip"), t("pleaseAnswer"));
        return;
      }

      if (examMode && !examSubmitted) {
        answerRecords[question.id] = { userAnswer, isCorrect: null };
        showSavedFeedback(question, answerRecords[question.id]);
        render();
        return;
      }

      const isCorrect = evaluateAnswer(question, userAnswer);
      answerRecords[question.id] = { userAnswer, isCorrect };
      if (isCorrect) wrongSet.delete(question.id);
      else wrongSet.add(question.id);
      saveWrongBook();
      const progressedLevel = maybeProgressLevel();

      showFeedback(question, answerRecords[question.id], isCorrect ? "correct" : "incorrect");
      render();
      if (progressedLevel) {
        showInfoFeedback(t("levelUpTitle"), t("levelUpText", { level: progressedLevel }));
      }
    }

    function submitPaper() {
      if (!examMode || examSubmitted || !currentQuestions.length) return;

      let answered = 0;
      let correct = 0;
      let wrong = 0;
      let unanswered = 0;

      currentQuestions.forEach((question) => {
        const record = answerRecords[question.id];
        if (!record || isAnswerEmpty(question, record.userAnswer)) {
          unanswered += 1;
          return;
        }
        answered += 1;
        const isCorrect = evaluateAnswer(question, record.userAnswer);
        record.isCorrect = isCorrect;
        if (isCorrect) {
          correct += 1;
          wrongSet.delete(question.id);
        } else {
          wrong += 1;
          wrongSet.add(question.id);
        }
      });

      saveWrongBook();
      examSubmitted = true;
      stopExamTimer();
      examSummary = {
        total: currentQuestions.length,
        answered,
        correct,
        wrong,
        unanswered
      };

      render();
      showInfoFeedback(
        t("examSubmittedTitle"),
        t("examSubmittedSummary", examSummary)
      );
    }

    function goStep(step) {
      if (activePage !== "practice") return;
      if (!currentQuestions.length) return;
      const next = currentIndex + step;
      if (next < 0 || next > currentQuestions.length - 1) return;
      runQuestionTransition(() => {
        currentIndex = next;
        render();
      });
    }

    function goSmartNext() {
      if (activePage !== "practice" || examMode || !currentQuestions.length) return;
      const current = currentQuestions[currentIndex];
      const candidates = sortBySmart(getCurrentQuestions().filter((q) => q.id !== current.id));
      if (!candidates.length) return;
      runQuestionTransition(() => {
        refreshQuestionPool();
        const targetId = candidates[0].id;
        const targetIndex = currentQuestions.findIndex((q) => q.id === targetId);
        if (targetIndex >= 0) {
          currentIndex = targetIndex;
        }
        render();
      });
    }

    function togglePureMode() {
      pureMode = !pureMode;
      if (pureMode) {
        activePage = "practice";
      }
      render();
    }

    function toggleLang() {
      lang = lang === "zh" ? "en" : "zh";
      saveLang();
      applyStaticTexts();
      render();
    }

    els.submitBtn.addEventListener("click", submitAnswer);
    els.homePageBtn.addEventListener("click", () => {
      pureMode = false;
      activePage = "home";
      render();
    });
    els.practicePageBtn.addEventListener("click", () => {
      activePage = "practice";
      render();
    });
    els.sectionsPageBtn.addEventListener("click", () => {
      pureMode = false;
      activePage = "sections";
      render();
    });
    els.pureModeBtn.addEventListener("click", togglePureMode);
    els.homeStartPracticeBtn.addEventListener("click", () => {
      activePage = "practice";
      render();
    });
    els.homeStartExamBtn.addEventListener("click", () => {
      activePage = "practice";
      if (!examMode) {
        setExamMode(true);
      } else {
        render();
      }
    });
    els.homeOpenSectionsBtn.addEventListener("click", () => {
      pureMode = false;
      activePage = "sections";
      render();
    });
    els.showAnswerBtn.addEventListener("click", () => {
      if (!currentQuestions.length) return;
      if (examMode && !examSubmitted) {
        showInfoFeedback(t("tip"), t("examSavedText"));
        return;
      }
      showAnswerOnly(currentQuestions[currentIndex]);
    });
    els.prevBtn.addEventListener("click", () => goStep(-1));
    els.nextBtn.addEventListener("click", () => goStep(1));
    els.smartNextBtn.addEventListener("click", goSmartNext);
    els.sectionSelect.addEventListener("change", () => {
      runQuestionTransition(() => {
        selectedSection = els.sectionSelect.value || "all";
        currentIndex = 0;
        refreshQuestionPool();
        render();
      });
    });
    els.examSectionSelectAllBtn.addEventListener("click", () => {
      sectionIds.forEach((id) => examSectionSet.add(id));
      currentIndex = 0;
      refreshQuestionPool();
      render();
    });
    els.examSectionClearAllBtn.addEventListener("click", () => {
      examSectionSet.clear();
      currentIndex = 0;
      refreshQuestionPool();
      render();
    });
    els.examApplyTimeBtn.addEventListener("click", () => {
      applyExamDuration(true);
      render();
    });
    els.examDurationInput.addEventListener("change", () => {
      applyExamDuration(false);
    });
    els.allModeBtn.addEventListener("click", () => setMode("all"));
    els.wrongModeBtn.addEventListener("click", () => setMode("wrong"));
    els.examModeBtn.addEventListener("click", () => setExamMode(!examMode));
    els.clearWrongBtn.addEventListener("click", () => {
      if (examMode) return;
      setClearConfirmState(true);
      showInfoFeedback(t("clearNeedConfirmTitle"), t("clearNeedConfirmText"));
    });
    els.confirmClearWrongBtn.addEventListener("click", () => {
      wrongSet.clear();
      saveWrongBook();
      setClearConfirmState(false);
      if (mode === "wrong") { currentIndex = 0; refreshQuestionPool(); }
      render();
      showInfoFeedback(t("tip"), t("clearDoneText"));
    });
    els.cancelClearWrongBtn.addEventListener("click", () => setClearConfirmState(false));
    els.themeToggleBtn.addEventListener("click", toggleTheme);
    els.submitPaperBtn.addEventListener("click", submitPaper);
    els.langToggleBtn.addEventListener("click", toggleLang);

    els.examDurationInput.value = String(examDurationMinutes);
    updateExamTimerDisplay();

    if (typeof prefersDarkScheme.addEventListener === "function") {
      prefersDarkScheme.addEventListener("change", handleSystemThemeChange);
    } else if (typeof prefersDarkScheme.addListener === "function") {
      prefersDarkScheme.addListener(handleSystemThemeChange);
    }

    applyTheme();
    setupMicroInteractions();
    render();
  </script>
</body>
</html>

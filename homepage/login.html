<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CircleLab | Log in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand" href="homepage.html" aria-label="Circle Geometry home">
          <img src="logowhite.png" alt="Circle Geometry logo" />
        </a>

        <nav class="primary-nav" aria-label="Primary">
          <ul>
            <li><a class="nav-link" href="homepage.html">Home</a></li>
            <li><a class="nav-link" href="homepage.html">Game</a></li>
            <li><a class="nav-link" href="homepage.html">Quiz</a></li>
          </ul>
        </nav>

        <nav class="account-nav" aria-label="Account">
          <ul>
            <li>
              <a class="nav-link login-btn is-active" href="login.html" aria-current="page">Log in</a>
            </li>
            <li><a class="nav-link signup-btn" href="homepage.html#signupOverlay">Sign up</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="auth-page-main">
      <section class="auth-stage" aria-labelledby="loginTitle">
        <div class="signup-modal login-modal">
          <div class="signup-modal-showcase" aria-hidden="true">
            <svg class="signup-modal-geometry" viewBox="146 108 540 540" role="presentation" focusable="false">
              <g class="signup-modal-geometry-circles">
                <circle cx="366" cy="432" r="16" />
                <circle cx="371" cy="440" r="18" />
                <circle cx="373" cy="451" r="21" />
                <circle cx="371" cy="463" r="24" />
                <circle cx="364" cy="475" r="28" />
                <circle cx="351" cy="483" r="32" />
                <circle cx="335" cy="488" r="37" />
                <circle cx="315" cy="486" r="43" />
                <circle cx="296" cy="476" r="50" />
                <circle cx="281" cy="457" r="57" />
                <circle cx="272" cy="431" r="66" />
                <circle cx="274" cy="401" r="76" />
                <circle cx="289" cy="369" r="87" />
                <circle cx="318" cy="341" r="101" />
                <circle cx="361" cy="325" r="116" />
                <circle cx="412" cy="325" r="134" />
                <circle cx="467" cy="348" r="154" />
              </g>
            </svg>
          </div>

          <section class="signup-modal-panel">
            <a class="signup-modal-close auth-back-link" href="homepage.html" aria-label="Back to home">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 6 9 12l6 6" />
              </svg>
            </a>

            <div class="signup-modal-badge" aria-hidden="true">
              <img src="logowhite.png" alt="" />
            </div>

            <h1 class="signup-modal-title" id="loginTitle">Welcome back</h1>
            <p class="signup-modal-intro">
              Log in to continue your geometry journey.
            </p>

            <form class="signup-form" data-login-form novalidate>
              <label class="signup-field" for="loginEmail">
                <span>Email address</span>
                <input
                  class="signup-input"
                  id="loginEmail"
                  name="email"
                  type="email"
                  autocomplete="email"
                  aria-describedby="loginFormFeedback"
                  placeholder="you@circlelab.com"
                  required
                />
              </label>

              <label class="signup-field" for="loginPassword">
                <span>Password</span>
                <input
                  class="signup-input"
                  id="loginPassword"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  aria-describedby="loginFormFeedback"
                  minlength="8"
                  placeholder="Enter your password"
                  required
                />
              </label>

              <div class="login-form-meta">
                <label class="signup-consent login-remember" for="loginRemember">
                  <input
                    class="signup-consent-checkbox"
                    id="loginRemember"
                    name="remember"
                    type="checkbox"
                  />
                  <span class="signup-consent-copy">Remember this browser</span>
                </label>

                <button class="login-forgot-link" type="button" data-login-help>
                  Forgot password?
                </button>
              </div>

              <button class="signup-submit" type="submit">Log in</button>
              <p
                class="signup-form-status"
                id="loginFormFeedback"
                data-login-feedback
                role="status"
                aria-live="polite"
                aria-atomic="true"
                hidden
              ></p>
            </form>

            <p class="signup-modal-helper">
              Need an account? <a href="homepage.html#signupOverlay">Create one here</a>
            </p>
          </section>
        </div>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>

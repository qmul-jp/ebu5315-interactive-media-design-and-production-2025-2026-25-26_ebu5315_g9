<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切线长定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f5f0;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-sub: #888;
            --accent2: #c8502a;
            --border: #e8e4dc;
            --hover-bg: #f0ede6;
            --shadow: 0 1px 12px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --bg: #141414;
            --card-bg: #1c1c1c;
            --text: #e8e4dc;
            --text-sub: #666;
            --accent2: #e8724a;
            --border: #2a2a2a;
            --hover-bg: #242424;
            --shadow: 0 1px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
        }

        .circle-card {
            max-width: 820px; /* 严格对齐文件9 */
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }

        .card-header .title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            color: var(--text);
            margin-bottom: 2px;
        }

        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 0.2px;
        }

        .canvas-container {
            padding: 28px 28px 16px;
            display: flex;
            justify-content: center;
        }

        canvas {
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            cursor: grab;
            max-width: 100%;
        }

        .card-content {
            padding: 0 28px 28px;
        }

        .descriptions {
            margin: 16px 0;
            font-size: 0.92rem;
            color: var(--text);
            font-weight: 500;
        }

        .descriptions b {
            color: var(--accent2);
            font-family: monospace;
            font-size: 1.05rem;
        }

        .theorem-box {
            background: var(--hover-bg);
            padding: 16px 20px;
            border-radius: 16px;
            border-left: 4px solid var(--accent2);
            margin-top: 12px;
        }

        .theorem-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent2);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="circle-card">
    <div class="card-header">
        <div class="title">切线长定理</div>
        <div class="sub-en">从圆外一点引圆的两条切线，它们的切线长相等。</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="560" height="420"></canvas>
    </div>

    <div class="card-content">
        <div class="descriptions">
            PA = <b id="valPA">0</b> , PB = <b id="valPB">0</b>
        </div>
        <div class="theorem-box">
            <div>📐从圆外一点引圆的两条切线，它们的切线长相等，圆心和这一点的连线平分两条切线的夹角。</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const cx = 280, cy = 210, r = 120;
        let P = { x: 480, y: 210 };
        let dragging = false;

        function _fg() { return getComputedStyle(document.documentElement).getPropertyValue('--text').trim(); }
        function _accent() { return getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim(); }
        function _border() { return getComputedStyle(document.documentElement).getPropertyValue('--border').trim(); }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const dist = Math.hypot(P.x - cx, P.y - cy);
            if (dist < r + 10) {
                const ang = Math.atan2(P.y - cy, P.x - cx);
                P.x = cx + (r + 10) * Math.cos(ang);
                P.y = cy + (r + 10) * Math.sin(ang);
            }

            const angleP = Math.atan2(P.y - cy, P.x - cx);
            const angleA = Math.acos(r / Math.hypot(P.x - cx, P.y - cy));
            
            const A = { x: cx + r * Math.cos(angleP - angleA), y: cy + r * Math.sin(angleP - angleA) };
            const B = { x: cx + r * Math.cos(angleP + angleA), y: cy + r * Math.sin(angleP + angleA) };

            // 绘制辅助圆
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = _border();
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 绘制切线
            ctx.beginPath();
            ctx.moveTo(P.x, P.y); ctx.lineTo(A.x, A.y);
            ctx.moveTo(P.x, P.y); ctx.lineTo(B.x, B.y);
            ctx.strokeStyle = _accent();
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // 绘制点
            [[P,'P',_accent()], [A,'A',_fg()], [B,'B',_fg()]].forEach(([pt, label, col]) => {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = col;
                ctx.fill();
                
                ctx.fillStyle = _fg();
                ctx.font = "bold 15px 'DM Sans'";
                ctx.fillText(label, pt.x + 12, pt.y + 5);
            });

            const len = Math.hypot(P.x - A.x, P.y - A.y).toFixed(1);
            document.getElementById('valPA').textContent = len;
            document.getElementById('valPB').textContent = len;
        }

        function getM(e) {
            const b = canvas.getBoundingClientRect();
            return { 
                x: (e.clientX - b.left) * (canvas.width / b.width), 
                y: (e.clientY - b.top) * (canvas.height / b.height) 
            };
        }

        canvas.onmousedown = e => { if (Math.hypot(getM(e).x - P.x, getM(e).y - P.y) < 20) dragging = true; };
        window.onmousemove = e => { if (dragging) { P = getM(e); update(); } };
        window.onmouseup = () => dragging = false;

        const obs = new MutationObserver(() => update());
        obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        
        window.addEventListener('message', ev => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            update();
        });

        update();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直线与圆的位置关系（代数法）- 精确相切判定</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin: 0; }
        canvas { display: block; margin: 0 auto; }
        .descriptions { margin-top: 12px; line-height: 2.2; font-size: 0.97em; }
        .eq-block {
            display: inline-block;
            margin-top: 8px;
            padding: 7px 20px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            font-size: 1em;
            color: var(--fg);
            background: var(--eq-bg);
            line-height: 1.9;
            text-align: left;
        }

        /* === theme === */
        :root { --fg:#000000; --bg:#ffffff; --border:#d0ccc6; --grid:#f0ede6; --eq-bg:#faf9f6; }
        [data-theme="dark"] { --fg:#ffffff; --bg:#000000; --border:#444; --grid:#1e1e1e; --eq-bg:#111; }
        html,body { background:var(--bg)!important; color:var(--fg)!important; transition:background .2s,color .2s; }
        canvas { background:var(--bg)!important; }
        h3 { color:var(--fg); margin:10px 0 4px; }

        .zh-text { display:inline; }
        .en-text { display:none; }
    </style>
</head>
<body>
    <h3>
        <span class="zh-text">直线与圆的位置关系（代数法）</span>
        <span class="en-text">Line–Circle Relationship (Algebraic Method)</span>
    </h3>

    <div>
        <canvas id="circleCanvas" width="620" height="420"
                style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <div class="descriptions">
        <span class="zh-text">圆方程：</span><span class="en-text">Circle: </span>
        (<span id="eqCircle">x² + y² = r²</span>)
        &nbsp;&nbsp;
        <span class="zh-text">直线方程：</span><span class="en-text">Line: </span>
        <span id="eqLine">y = kx + b</span>
        <br>
        Δ = <span id="vDelta">0.00</span>
        &nbsp;&nbsp;
        <span id="deltaStatus">—</span>
        &nbsp;&nbsp;
        <span id="conclusion">—</span>
    </div>

    <div class="eq-block" id="eqBlock">—</div>

    <script>
    (function () {
        function _fg()   { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#000000'; }
        function _bg()   { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#000000' : '#ffffff'; }
        function _grid() { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#1e1e1e' : '#f0ede6'; }
        function _lang() { return (window._CL && window._CL.lang) || 'zh'; }

        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const SCALE = 45;
        const OX = W / 2, OY = H / 2;

        // 圆心 (a, b)，半径 r；直线由两点 P1、P2 确定
        let oa = 0.5, ob = -0.5, oR = 3.0;

        // 直线上两个可拖动控制点（画布坐标）
        let L1 = toCanvas(-6,  1.5);
        let L2 = toCanvas( 6, -0.5);

        let dragging = false, dragTarget = null;

        function toCanvas(x, y) { return { x: OX + x * SCALE, y: OY - y * SCALE }; }
        function toCoord(cx, cy) { return { x: (cx - OX) / SCALE, y: -(cy - OY) / SCALE }; }
        function snap(v) { return Math.round(v * 2) / 2; }
        function fmt(v, d=1) {
            const r = Math.round(v * Math.pow(10, d)) / Math.pow(10, d);
            return r.toFixed(d);
        }
        function fmtCoef(v, d=2) {
            return (Math.round(v * 100) / 100).toFixed(d);
        }

        // 直线 L1L2 的方程：ax + by + c = 0（一般式），也求斜截式
        function getLineEq() {
            const dx = L2.x - L1.x, dy = L2.y - L1.y;
            const c1 = toCoord(L1.x, L1.y), c2 = toCoord(L2.x, L2.y);
            const cdx = c2.x - c1.x, cdy = c2.y - c1.y;

            // 一般式：A·x + B·y + C = 0
            // 法向量 (cdy, -cdx)
            const A = cdy, B = -cdx, C = -(A * c1.x + B * c1.y);

            // 是否竖直
            const isVertical = Math.abs(cdx) < 1e-6;
            let slope = null, intercept = null;
            if (!isVertical) {
                slope = cdy / cdx;
                intercept = c1.y - slope * c1.x;
            }

            return { A, B, C, isVertical, slope, intercept, c1, c2 };
        }

        // 判别式：联立圆方程 (x-a)²+(y-b)²=r² 与直线
        // 非竖直：代入 y = kx + m，整理为 二次方程 Ax²+Bx+C=0
        // 竖直 x=x0：代入圆方程
        function getDiscriminant(lineEq) {
            const { isVertical, slope: k, intercept: m, c1 } = lineEq;
            const a = oa, b = ob, r = oR;

            if (isVertical) {
                const x0 = c1.x;
                // (x0-a)² + (y-b)² = r²  =>  (y-b)² = r²-(x0-a)²
                const disc = r * r - (x0 - a) * (x0 - a);
                return { disc, isVertical: true, x0, a, b, r };
            } else {
                // 代入 y = kx + m：
                // (x-a)² + (kx+m-b)² = r²
                // (1+k²)x² + 2(k(m-b)-a)x + (a²+(m-b)²-r²) = 0
                const A = 1 + k * k;
                const B = 2 * (k * (m - b) - a);
                const C = a * a + (m - b) * (m - b) - r * r;
                const disc = B * B - 4 * A * C;
                return { disc, A, B, C, k, m, a, b, r };
            }
        }

        // 求交点
        function getIntersections(res) {
            if (res.isVertical) {
                const { x0, b, r } = res;
                const d2 = r * r - (x0 - oa) * (x0 - oa);
                if (d2 < 0) return [];
                if (Math.abs(d2) < 1e-6) return [toCanvas(x0, b)];
                const sq = Math.sqrt(d2);
                return [toCanvas(x0, b + sq), toCanvas(x0, b - sq)];
            } else {
                const { A, B, C, k, m } = res;
                if (res.disc < -0.5) return [];
                if (Math.abs(res.disc) <= 1e-6) {
                    const x = -B / (2 * A);
                    return [toCanvas(x, k * x + m)];
                }
                const sq = Math.sqrt(res.disc);
                const x1 = (-B - sq) / (2 * A);
                const x2 = (-B + sq) / (2 * A);
                return [toCanvas(x1, k * x1 + m), toCanvas(x2, k * x2 + m)];
            }
        }

        // 精确计算圆心到直线的距离（坐标系单位）
        function getDistanceToLine(lineEq) {
            // 使用一般式 Ax + By + C = 0 计算距离更精确
            let A, B, C;
            if (lineEq.isVertical) {
                // 竖直直线: x = x0  => 1*x + 0*y - x0 = 0
                A = 1;
                B = 0;
                C = -lineEq.c1.x;
            } else {
                // 斜截式: y = kx + m  => kx - y + m = 0
                A = lineEq.slope;
                B = -1;
                C = lineEq.intercept;
            }
            const denominator = Math.sqrt(A * A + B * B);
            if (denominator < 1e-9) return Infinity;
            return Math.abs(A * oa + B * ob + C) / denominator;
        }

        function update() {
            const lineEq = getLineEq();
            const res    = getDiscriminant(lineEq);
            const { disc } = res;
            
            // 精确计算圆心到直线的距离（坐标系单位）
            const distance = getDistanceToLine(lineEq);
            // 相切判定容差大幅缩小：只有距离与半径的绝对差值 < 0.03 时才判定为相切
            // 0.03 约为 1.35 像素（SCALE=45时），非常精确，只有几乎完全相切才显示绿色
            const TANGENT_TOLERANCE = 0.03;
            const diff = Math.abs(distance - oR);
            
            const green = '#27ae60', orange = '#e67e22', blue = '#2980b9';
            let lineColor, deltaStr, statusHtml, conclusionZh, conclusionEn;
            
            // 使用距离判定位置关系（比判别式数值更稳定且直观）
            if (distance > oR + TANGENT_TOLERANCE) {
                // 相离
                lineColor    = orange;
                deltaStr     = disc.toFixed(2);
                statusHtml   = `<span style="color:${orange}">Δ < 0</span>`;
                conclusionZh = '直线与圆相离，无交点';
                conclusionEn = 'Line and circle are separate';
            } else if (Math.abs(distance - oR) <= TANGENT_TOLERANCE) {
                // 相切（精确判定）
                lineColor    = green;
                // 对于相切情况，判别式应接近0
                const deltaAbs = Math.abs(disc);
                if (deltaAbs < 0.001) {
                    deltaStr = '≈ 0';
                } else {
                    deltaStr = disc.toFixed(4);
                }
                statusHtml   = `<span style="color:${green}">Δ = 0</span>`;
                conclusionZh = '直线与圆相切，有一个切点';
                conclusionEn = 'Line is tangent to the circle';
            } else {
                // 相交
                lineColor    = blue;
                deltaStr     = disc.toFixed(2);
                statusHtml   = `<span style="color:${blue}">Δ > 0</span>`;
                conclusionZh = '直线与圆相交，有两个交点';
                conclusionEn = 'Line intersects the circle at two points';
            }

            // 圆方程字符串
            const aS = oa === 0 ? 'x' : (oa > 0 ? `(x−${fmt(oa,1)})` : `(x+${fmt(-oa,1)})`);
            const bS = ob === 0 ? 'y' : (ob > 0 ? `(y−${fmt(ob,1)})` : `(y+${fmt(-ob,1)})`);
            document.getElementById('eqCircle').textContent = `${aS}² + ${bS}² = ${fmt(oR*oR,2)}`;

            // 直线方程字符串
            let lineStr;
            if (lineEq.isVertical) {
                lineStr = `x = ${fmt(lineEq.c1.x,1)}`;
            } else {
                const k = lineEq.slope, m = lineEq.intercept;
                const kAbs = Math.abs(k);
                let kS = '';
                if (Math.abs(k) < 1e-6) {
                    kS = '';
                } else if (Math.abs(k - 1) < 1e-6) {
                    kS = 'x';
                } else if (Math.abs(k + 1) < 1e-6) {
                    kS = '-x';
                } else {
                    kS = `${fmtCoef(k)}x`;
                }
                let mS = '';
                if (Math.abs(m) < 1e-6) {
                    mS = kS ? '' : '0';
                } else {
                    if (kS) {
                        mS = m > 0 ? ` + ${fmtCoef(m)}` : ` − ${fmtCoef(-m)}`;
                    } else {
                        mS = fmtCoef(m);
                    }
                }
                lineStr = `y = ${kS}${mS}`;
            }
            document.getElementById('eqLine').textContent = lineStr;

            document.getElementById('vDelta').textContent = deltaStr;
            document.getElementById('deltaStatus').innerHTML = statusHtml;
            document.getElementById('conclusion').innerHTML =
                `<span style="color:${lineColor}">${_lang()==='zh' ? conclusionZh : conclusionEn}</span>`;

            // 联立过程 - 增强显示，包含距离信息辅助理解
            let processHtml;
            if (lineEq.isVertical) {
                const x0 = fmt(lineEq.c1.x,2);
                const d2 = oR*oR - (lineEq.c1.x - oa)**2;
                processHtml = _lang()==='zh'
                    ? `代入 x = ${x0}：(${x0}−${fmt(oa,1)})² + (y−${fmt(ob,1)})² = ${fmt(oR*oR,2)}<br>` +
                      `(y−${fmt(ob,1)})² = ${fmt(d2,3)}<br>` +
                      `Δ = ${fmt(d2,3)}<br>` +
                      `圆心到直线距离 d = |${x0} − ${fmt(oa,1)}| = ${fmt(Math.abs(lineEq.c1.x - oa),3)}，半径 r = ${fmt(oR,2)}`
                    : `Substitute x = ${x0}: (${x0}−${fmt(oa,1)})² + (y−${fmt(ob,1)})² = ${fmt(oR*oR,2)}<br>` +
                      `(y−${fmt(ob,1)})² = ${fmt(d2,3)}<br>` +
                      `Δ = ${fmt(d2,3)}<br>` +
                      `Distance from center to line d = |${x0} − ${fmt(oa,1)}| = ${fmt(Math.abs(lineEq.c1.x - oa),3)}, radius r = ${fmt(oR,2)}`;
            } else {
                const { A, B, C, k, m } = res;
                const kS = fmtCoef(k), mS = fmtCoef(m);
                const AS = fmtCoef(A);
                const BS = B >= 0 ? `+${fmtCoef(B)}` : fmtCoef(B);
                const CS = C >= 0 ? `+${fmtCoef(C)}` : fmtCoef(C);
                const deltaVal = B*B - 4*A*C;
                // 计算距离用于显示
                const distance = getDistanceToLine(lineEq);
                processHtml = _lang()==='zh'
                    ? `代入 y = ${kS}x${m>=0?'+':''}${mS}：<br>` +
                      `${AS}x² ${BS}x ${CS} = 0<br>` +
                      `Δ = B²−4AC = ${fmtCoef(B*B)} − ${fmtCoef(4*A*C)} = ${fmtCoef(deltaVal)}<br>` +
                      `圆心(${fmt(oa,1)}, ${fmt(ob,1)})到直线距离 d = ${fmt(distance,4)}，半径 r = ${fmt(oR,2)}<br>` +
                      `比较 d 与 r：${distance > oR ? 'd > r → 相离' : (Math.abs(distance - oR) < 0.03 ? 'd ≈ r → 相切' : 'd < r → 相交')}`
                    : `Substitute y = ${kS}x${m>=0?'+':''}${mS}:<br>` +
                      `${AS}x² ${BS}x ${CS} = 0<br>` +
                      `Δ = B²−4AC = ${fmtCoef(B*B)} − ${fmtCoef(4*A*C)} = ${fmtCoef(deltaVal)}<br>` +
                      `Distance from center(${fmt(oa,1)}, ${fmt(ob,1)}) to line d = ${fmt(distance,4)}, radius r = ${fmt(oR,2)}<br>` +
                      `Compare d and r: ${distance > oR ? 'd > r → separate' : (Math.abs(distance - oR) < 0.03 ? 'd ≈ r → tangent' : 'd < r → intersect')}`;
            }
            document.getElementById('eqBlock').innerHTML = processHtml;

            const ints = getIntersections(res);
            drawCanvas(lineColor, ints, lineEq, distance);
        }

        function drawCanvas(lineColor, ints, lineEq, distance) {
            ctx.clearRect(0, 0, W, H);

            // 网格
            ctx.strokeStyle = _grid(); ctx.lineWidth = 1;
            for (let gx = OX % SCALE; gx < W; gx += SCALE) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
            }
            for (let gy = OY % SCALE; gy < H; gy += SCALE) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
            }

            // 坐标轴
            const axisC = _fg() === '#ffffff' ? '#888' : '#aaa';
            ctx.strokeStyle = axisC; ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(0, OY); ctx.lineTo(W, OY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OX, 0); ctx.lineTo(OX, H); ctx.stroke();
            ctx.fillStyle = axisC;
            ctx.beginPath(); ctx.moveTo(W-2, OY); ctx.lineTo(W-10, OY-5); ctx.lineTo(W-10, OY+5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(OX, 2); ctx.lineTo(OX-5, 10); ctx.lineTo(OX+5, 10); ctx.fill();
            ctx.font = '13px sans-serif';
            ctx.fillText('x', W-14, OY-8); ctx.fillText('y', OX+8, 14); ctx.fillText('O', OX+5, OY+14);

            // 刻度
            ctx.fillStyle = _fg() === '#ffffff' ? '#666' : '#999'; ctx.font = '11px sans-serif';
            for (let i = -Math.floor(OX/SCALE); i <= Math.floor((W-OX)/SCALE); i++) {
                if (i===0) continue;
                ctx.fillText(i, OX + i*SCALE - 4, OY + 14);
            }
            for (let j = -Math.floor(OY/SCALE); j <= Math.floor((H-OY)/SCALE); j++) {
                if (j===0) continue;
                ctx.fillText(j, OX + 6, OY - j*SCALE + 4);
            }

            // 圆
            const pO = toCanvas(oa, ob);
            const rPx = oR * SCALE;
            ctx.beginPath(); ctx.arc(pO.x, pO.y, rPx, 0, 2*Math.PI);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = 'rgba(231,76,60,0.06)'; ctx.fill();

            // 直线（延伸到画布边缘）
            if (lineEq.isVertical) {
                const px = toCanvas(lineEq.c1.x, 0).x;
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H);
            } else {
                // 求 x=0 和 x=W 对应的 y
                const x1c = 0, x2c = W;
                const x1 = toCoord(x1c, 0).x, x2 = toCoord(x2c, 0).x;
                const y1 = lineEq.slope * x1 + lineEq.intercept;
                const y2 = lineEq.slope * x2 + lineEq.intercept;
                const p1 = toCanvas(x1, y1), p2 = toCanvas(x2, y2);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            }
            ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();

            // 交点（切点时显示切点）
            ints.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                ctx.fillStyle = lineColor; ctx.fill();
                // 添加白色边框增强可见性
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
                ctx.strokeStyle = _bg(); ctx.lineWidth = 1.5; ctx.stroke();
            });

            // 圆心
            ctx.beginPath(); ctx.arc(pO.x, pO.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#e74c3c'; ctx.fill();
            ctx.fillStyle = _fg(); ctx.font = '12px sans-serif';
            ctx.fillText(`(${fmt(oa,1)},${fmt(ob,1)})`, pO.x+7, pO.y-6);
            
            // 如果处于相切状态，在切点附近显示距离提示（辅助教学）
            const diffToRadius = distance !== undefined ? Math.abs(distance - oR) : 999;
            if (diffToRadius < 0.05 && ints.length === 1) {
                ctx.fillStyle = lineColor;
                ctx.font = 'bold 11px sans-serif';
                ctx.shadowBlur = 0;
                ctx.fillText(`d = ${fmt(distance,3)} ≈ r`, ints[0].x + 8, ints[0].y - 5);
            }

            // 控制点（直线上的两个把手）
            [L1, L2].forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2*Math.PI);
                ctx.fillStyle = lineColor; ctx.fill();
                ctx.strokeStyle = _bg(); ctx.lineWidth = 1.5; ctx.stroke();
            });

            // 圆心拖动点（内部小圆）
            ctx.beginPath(); ctx.arc(pO.x, pO.y, 9, 0, 2*Math.PI);
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1.5;
            ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
            
            // 显示圆心到直线的距离辅助线（可选，增强教学效果）
            if (distance !== undefined && distance < oR + 1.5 && !lineEq.isVertical) {
                // 计算垂足并绘制虚线
                let footX, footY;
                if (lineEq.isVertical) {
                    footX = lineEq.c1.x;
                    footY = ob;
                } else {
                    const A = lineEq.slope;
                    const B = -1;
                    const C = lineEq.intercept;
                    const denom = A*A + B*B;
                    footX = (B*(B*oa - A*ob) - A*C) / denom;
                    footY = (A*(-B*oa + A*ob) - B*C) / denom;
                }
                const footCanvas = toCanvas(footX, footY);
                ctx.beginPath();
                ctx.moveTo(pO.x, pO.y);
                ctx.lineTo(footCanvas.x, footCanvas.y);
                ctx.strokeStyle = '#888888';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                // 标注距离值
                ctx.fillStyle = '#888';
                ctx.font = '10px sans-serif';
                const midX = (pO.x + footCanvas.x) / 2;
                const midY = (pO.y + footCanvas.y) / 2;
                ctx.fillText(`d = ${fmt(distance,3)}`, midX + 3, midY - 3);
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            return {
                cx: (e.clientX - rect.left) * scaleX,
                cy: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', function(e) {
            const { cx: mx, cy: my } = getMousePos(e);
            const pO = toCanvas(oa, ob);

            if (Math.hypot(mx - pO.x, my - pO.y) < 14) { dragging=true; dragTarget='O'; return; }
            if (Math.hypot(mx - L1.x, my - L1.y) < 14)  { dragging=true; dragTarget='L1'; return; }
            if (Math.hypot(mx - L2.x, my - L2.y) < 14)  { dragging=true; dragTarget='L2'; return; }
        });

        window.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            const { cx: mx, cy: my } = getMousePos(e);
            const coord = toCoord(mx, my);

            if (dragTarget === 'O') {
                oa = snap(coord.x); ob = snap(coord.y);
            } else if (dragTarget === 'L1') {
                L1 = { x: mx, y: my };
            } else if (dragTarget === 'L2') {
                L2 = { x: mx, y: my };
            }
            update();
        });

        window.addEventListener('mouseup',    () => { dragging=false; dragTarget=null; });
        canvas.addEventListener('mouseleave', () => { dragging=false; dragTarget=null; });

        update();
        window._clRedraw = function() { update(); };
    })();
    </script>

<script>
(function(){
    window._CL = { lang:'zh', theme:'light' };

    function applyLang(lang){
        window._CL.lang = lang;
        document.querySelectorAll('.zh-text').forEach(function(el){ el.style.display = lang==='zh'?'inline':'none'; });
        document.querySelectorAll('.en-text').forEach(function(el){ el.style.display = lang==='en'?'inline':'none'; });
        if(typeof _clRedraw==='function') _clRedraw();
    }

    function applyTheme(theme){
        window._CL.theme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        if(typeof _clRedraw==='function') _clRedraw();
    }

    window.addEventListener('message', function(ev){
        if(!ev.data || ev.data._src!=='circlelab') return;
        if(ev.data.lang)  applyLang(ev.data.lang);
        if(ev.data.theme) applyTheme(ev.data.theme);
    });

    window.addEventListener('DOMContentLoaded', function(){
        try{ if(window.parent._CL_lang)  applyLang(window.parent._CL_lang); }catch(e){}
        try{ if(window.parent._CL_theme) applyTheme(window.parent._CL_theme); }catch(e){}
    });
})();
</script>

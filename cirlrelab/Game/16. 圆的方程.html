<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆的方程 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>

        body {
            font-family: 'Noto Sans SC', 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Source Han Serif SC', 'Noto Serif SC', 'Anthropic Serif', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .canvas-container {
            padding: 24px 28px 12px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'Noto Sans SC', 'Manrope', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 16px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        
        /* ===== 新增功能：点在圆上时显示的图片容器样式（完全独立，不影响任何原有布局）===== */
        .oncircle-img-wrapper {
            text-align: center;
            margin: 0 28px 18px;          /* 与定理块和交互提示协调，不拥挤 */
            padding: 0;
            transition: all 0.2s ease;
        }
        .oncircle-img-wrapper img {
            max-width: 100%;
            width: auto;
            height: auto;
            max-height: 160px;             /* 卡片宽度范围内舒适 */
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            background: var(--card-bg);
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆的方程</div>
        <div class="title" data-cl-en style="display:none">Equation of a Circle</div>
        <div class="sub-en" data-cl-zh>标准方程 · 圆心 · 半径 · 点与圆的位置关系</div>
        <div class="sub-en" data-cl-en style="display:none">Standard Form · Center · Radius · Point-Circle Relation</div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="620" height="460" style="width:100%; height:auto; max-width:620px; aspect-ratio:620/460"></canvas>
    </div>

    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    
    <!-- 新增：点在圆上时显示图片的容器（默认隐藏，位于定理块下方，交互提示上方） -->
    <div id="onCircleImageContainer" class="oncircle-img-wrapper" style="display: none;">
        <img src="在圆上.png" alt="点在圆上示意图" id="onCircleImg">
    </div>
    
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽圆心 O、圆上点 A 或探测点 P</span><span data-cl-en style="display:none">Drag center O, point A on circle, or probe point P</span></span>
    </div>
</div>

<script>
    (function () {
        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const CANVAS_W = 620, CANVAS_H = 460;
        
        // 坐标系设置：画布中心为原点，1单位 = SCALE 像素
        const SCALE = 40;
        const OX = CANVAS_W / 2, OY = CANVAS_H / 2;

        // 可调节参数
        let oa = 1.5, ob = -1.0;      // 圆心 (a, b)
        let aAngle = 30;             // 圆上点 A 的角度（度）
        let aRadius = 3.0;           // 半径
        let Px = 5.0, Py = 1.5;      // 探测点 P

        let dragging = false, dragTarget = null;
        document.documentElement.style.fontSize = '16px';

        // 辅助函数
        function _fg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? (getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#181F23') : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang()   { return (window._CL && window._CL.lang) || 'zh'; }
        function _gridColor() { return _isDark() ? '#2a2a2a' : '#f0ede6'; }
        function _axisColor() { return _isDark() ? '#888' : '#aaa'; }

        function d2r(d) { return d * Math.PI / 180; }
        function r2d(r) { return r * 180 / Math.PI; }

        // 坐标转换
        function toCanvas(x, y) {
            return { x: OX + x * SCALE, y: OY - y * SCALE };
        }
        function toCoord(cx, cy) {
            return { x: (cx - OX) / SCALE, y: -(cy - OY) / SCALE };
        }

        // 获取圆上点 A 的画布坐标
        function getA() {
            const ax = oa + aRadius * Math.cos(d2r(aAngle));
            const ay = ob + aRadius * Math.sin(d2r(aAngle));
            return toCanvas(ax, ay);
        }

        // 格式化显示（保留一位小数，整数则显示整数）
        function fmt(v) {
            const r = Math.round(v * 2) / 2;
            return r % 1 === 0 ? r.toFixed(0) : r.toFixed(1);
        }

        // 吸附到0.5网格
        function snap(v) { return Math.round(v * 2) / 2; }

        function setDesc(html) { document.getElementById('descArea').innerHTML = html; }
        function setTheorem(html) { document.getElementById('theoremText').innerHTML = html; }

        function update() {
            const r = aRadius;
            const r2 = r * r;
            const op2 = (Px - oa) ** 2 + (Py - ob) ** 2;
            const tol = 0.15;
            const inside = op2 < r2 - tol;
            const onCircle = Math.abs(op2 - r2) <= tol;
            
            const isZh = _lang() === 'zh';
            const green = '#27ae60', orange = '#e67e22', blue = '#2980b9';
            let statusZh, statusEn, statusColor;
            if (onCircle) {
                statusZh = '|OP|² = r²，P 在圆上';
                statusEn = '|OP|² = r², P is on the circle';
                statusColor = green;
            } else if (inside) {
                statusZh = '|OP|² < r²，P 在圆内';
                statusEn = '|OP|² < r², P is inside the circle';
                statusColor = blue;
            } else {
                statusZh = '|OP|² > r²，P 在圆外';
                statusEn = '|OP|² > r², P is outside the circle';
                statusColor = orange;
            }

            // 构建描述区域
            const descHtml = `
                <div class="desc-item"><span class="desc-symbol">${isZh ? '圆心 O' : 'Center O'}</span> = (${fmt(oa)}, ${fmt(ob)})</div>
                <div class="desc-item"><span class="desc-symbol">${isZh ? '半径 r' : 'Radius r'}</span> = ${r.toFixed(2)}</div>
                <div class="desc-item"><span class="desc-symbol">${isZh ? '点 P' : 'Point P'}</span> = (${fmt(Px)}, ${fmt(Py)})</div>
                <div class="desc-item"><span class="desc-symbol">|OP|²</span> = ${op2.toFixed(2)}</div>
                <div class="desc-item"><span class="desc-symbol">r²</span> = ${r2.toFixed(2)}</div>
                <div class="desc-item" style="color:${statusColor}">${isZh ? statusZh : statusEn}</div>
            `;
            setDesc(descHtml);

            // 构建方程字符串
            const aVal = oa, bVal = ob;
            const aSign = aVal === 0 ? '' : (aVal > 0 ? ` − ${fmt(aVal)}` : ` + ${fmt(-aVal)}`);
            const bSign = bVal === 0 ? '' : (bVal > 0 ? ` − ${fmt(bVal)}` : ` + ${fmt(-bVal)}`);
            const xPart = aVal === 0 ? 'x' : `(x${aSign})`;
            const yPart = bVal === 0 ? 'y' : `(y${bSign})`;
            const eqStr = `${xPart}² + ${yPart}² = ${r2.toFixed(2)}`;

            const theoremHtml = isZh
                ? `圆的标准方程：${eqStr}<br><span style="font-size:0.85rem; opacity:0.8;">圆心 (a, b)，半径 r，点 P(x, y) 满足 (x−a)²+(y−b)² = r² 则在圆上</span>`
                : `Standard form: ${eqStr}<br><span style="font-size:0.85rem; opacity:0.8;">Center (a, b), radius r. Point P(x,y) lies on the circle if (x−a)²+(y−b)² = r²</span>`;
            setTheorem(theoremHtml);

            drawCanvas(r, r2, onCircle, inside, statusColor);
            
            // ========== 新增功能：点在圆上时显示图片，否则隐藏（不改变任何原有逻辑和样式）==========
            const imgContainer = document.getElementById('onCircleImageContainer');
            if (imgContainer) {
                if (onCircle) {
                    imgContainer.style.display = 'block';
                } else {
                    imgContainer.style.display = 'none';
                }
            }
            // ========== 新增功能结束 ==========
        }

        function drawCanvas(r, r2, onCircle, inside, pColor) {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg();
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            const gridColor = _gridColor();
            const axisColor = _axisColor();
            const fg = _fg();

            // 网格线
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            for (let gx = OX % SCALE; gx < CANVAS_W; gx += SCALE) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, CANVAS_H); ctx.stroke();
            }
            for (let gy = OY % SCALE; gy < CANVAS_H; gy += SCALE) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CANVAS_W, gy); ctx.stroke();
            }

            // 坐标轴
            ctx.strokeStyle = axisColor;
            ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(0, OY); ctx.lineTo(CANVAS_W, OY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OX, 0); ctx.lineTo(OX, CANVAS_H); ctx.stroke();

            // 轴箭头
            ctx.fillStyle = axisColor;
            ctx.beginPath(); ctx.moveTo(CANVAS_W-2, OY); ctx.lineTo(CANVAS_W-10, OY-5); ctx.lineTo(CANVAS_W-10, OY+5); ctx.fill();
            ctx.beginPath(); ctx.moveTo(OX, 2); ctx.lineTo(OX-5, 10); ctx.lineTo(OX+5, 10); ctx.fill();

            // 轴标签
            ctx.fillStyle = axisColor;
            ctx.font = '12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText('x', CANVAS_W - 14, OY - 6);
            ctx.fillText('y', OX + 8, 14);
            ctx.fillText('O', OX + 6, OY + 14);

            // 刻度数字
            ctx.fillStyle = _isDark() ? '#777' : '#999';
            ctx.font = '11px "Noto Sans SC", "Manrope", sans-serif';
            for (let i = -Math.floor(OX/SCALE); i <= Math.floor((CANVAS_W-OX)/SCALE); i++) {
                if (i === 0) continue;
                const px = OX + i * SCALE;
                ctx.fillText(i, px - 5, OY + 14);
            }
            for (let j = -Math.floor(OY/SCALE); j <= Math.floor((CANVAS_H-OY)/SCALE); j++) {
                if (j === 0) continue;
                const py = OY - j * SCALE;
                ctx.fillText(j, OX + 5, py + 4);
            }

            const pO = toCanvas(oa, ob);
            const rPx = r * SCALE;
            const pA = getA();
            const pP = toCanvas(Px, Py);

            // 圆
            ctx.beginPath();
            ctx.arc(pO.x, pO.y, rPx, 0, 2 * Math.PI);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(231,76,60,0.06)';
            ctx.fill();

            // 半径线 (虚线)
            ctx.beginPath();
            ctx.moveTo(pO.x, pO.y); ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 3]); ctx.stroke(); ctx.setLineDash([]);

            // OP 连线
            ctx.beginPath();
            ctx.moveTo(pO.x, pO.y); ctx.lineTo(pP.x, pP.y);
            ctx.strokeStyle = pColor;
            ctx.lineWidth = 1.2;
            ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);

            // 圆心到坐标轴的投影线
            ctx.strokeStyle = _isDark() ? '#555' : '#ccc';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(pO.x, pO.y); ctx.lineTo(pO.x, OY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pO.x, pO.y); ctx.lineTo(OX, pO.y); ctx.stroke();
            ctx.setLineDash([]);

            // 半径标注
            const midAx = (pO.x + pA.x) / 2, midAy = (pO.y + pA.y) / 2;
            ctx.fillStyle = '#e74c3c';
            ctx.font = '12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(`r = ${r.toFixed(1)}`, midAx + 6, midAy - 4);

            // 绘制圆心 O
            ctx.beginPath(); ctx.arc(pO.x, pO.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#e74c3c'; ctx.fill();
            ctx.fillStyle = fg;
            ctx.font = '500 13px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(`O(${fmt(oa)}, ${fmt(ob)})`, pO.x + 8, pO.y - 8);

            // 圆上点 A
            ctx.beginPath(); ctx.arc(pA.x, pA.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#e74c3c'; ctx.fill();
            ctx.fillStyle = fg;
            ctx.fillText('A', pA.x + 8, pA.y - 8);

            // 探测点 P
            ctx.beginPath(); ctx.arc(pP.x, pP.y, 6, 0, 2*Math.PI);
            ctx.fillStyle = pColor; ctx.fill();
            ctx.fillStyle = fg;
            ctx.font = '500 13px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(`P(${fmt(Px)}, ${fmt(Py)})`, pP.x + 8, pP.y - 8);
        }

        // 鼠标/触摸交互
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                cx: (clientX - rect.left) * (CANVAS_W / rect.width),
                cy: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function handleStart(e) {
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const pO = toCanvas(oa, ob);
            const pA = getA();
            const pP = toCanvas(Px, Py);

            if (Math.hypot(mx - pO.x, my - pO.y) < 14) { dragging = true; dragTarget = 'O'; return; }
            if (Math.hypot(mx - pA.x, my - pA.y) < 14) { dragging = true; dragTarget = 'A'; return; }
            if (Math.hypot(mx - pP.x, my - pP.y) < 14) { dragging = true; dragTarget = 'P'; return; }
        }

        function handleMove(e) {
            if (!dragging) return;
            e.preventDefault();
            const { cx: mx, cy: my } = getMousePos(e);
            const coord = toCoord(mx, my);

            if (dragTarget === 'O') {
                oa = snap(coord.x);
                ob = snap(coord.y);
            } else if (dragTarget === 'A') {
                const dx = coord.x - oa, dy = coord.y - ob;
                aRadius = Math.max(0.5, Math.hypot(dx, dy));
                aAngle  = r2d(Math.atan2(dy, dx));
            } else if (dragTarget === 'P') {
                Px = snap(coord.x);
                Py = snap(coord.y);
            }
            update();
        }

        function handleEnd(e) {
            dragging = false;
            dragTarget = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // 主题与语言切换
        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            update();
        });

        // 初始化
        window.addEventListener('load', () => {
            const isZh = _lang() === 'zh';
            document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
            document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            update();
        });
        update();
        let mascotDragReported = false;
        let mascotPointerDown = false;
        let mascotStartPoint = null;
        function getMascotPoint(event) {
            if (event.touches && event.touches[0]) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            if (event.changedTouches && event.changedTouches[0]) {
                return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        }
        function reportMascotDrag() {
            if (mascotDragReported) return;
            mascotDragReported = true;
            try {
                window.parent.postMessage({ _src: 'circlelab', mascotDrag: true }, '*');
            } catch (e) {}
        }
        function handleMascotDragStart(event) {
            mascotPointerDown = true;
            mascotStartPoint = getMascotPoint(event);
        }
        function handleMascotDragMove(event) {
            if (!mascotPointerDown || mascotDragReported || !mascotStartPoint) return;
            const currentPoint = getMascotPoint(event);
            if (Math.hypot(currentPoint.x - mascotStartPoint.x, currentPoint.y - mascotStartPoint.y) < 6) return;
            reportMascotDrag();
        }
        function handleMascotDragEnd() {
            mascotPointerDown = false;
            mascotStartPoint = null;
        }

        canvas.addEventListener('mousedown', handleMascotDragStart);
        canvas.addEventListener('touchstart', handleMascotDragStart, { passive: true });
        window.addEventListener('mousemove', handleMascotDragMove);
        window.addEventListener('touchmove', handleMascotDragMove, { passive: true });
        window.addEventListener('mouseup', handleMascotDragEnd);
        window.addEventListener('touchend', handleMascotDragEnd);
        window.addEventListener('touchcancel', handleMascotDragEnd);
        window.addEventListener('blur', handleMascotDragEnd);
    })();
</script>
</body>
</html>

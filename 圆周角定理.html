<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测量：同弧所对的圆周角等于圆心角的一半</title>
    <style>
        /* 极简居中样式，无额外设计元素，仅用于对齐 */
        body {
            text-align: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>  
</head>
<body>
    <h3>测量：同弧所对的圆周角等于圆心角的一半</h3>

    <!-- 画布区域 - 用于绘制圆和点，居中显示 -->
    <div>
        <canvas id="circleCanvas" width="600" height="500" style="border:1px solid #ffffff; background:#ffffff;"></canvas>
    </div>

    <!-- 角度和比例数据显示（居中已由body控制） -->
    <div>
        <p>∠AOB = <span id="angleAOB">0.00</span>°</p>
        <p>∠ACB = <span id="angleACB">0.00</span>°</p>
        <p>∠AOB / ∠ACB = <span id="ratio">0.00</span></p>
    </div>

    <!-- 定理状态信息 -->
    <div>
        <p><strong><span id="theoremMessage">请在圆上拖动A、B、C三点</span></strong></p>
    </div>

    <script>
        // 固定圆心坐标和半径
        const centerX = 300;
        const centerY = 250;
        const radius = 180;

        // 三个点的初始角度（度）
        let angleA = 30;
        let angleB = 120;
        let angleC = 200;

        // 获取画布和上下文
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');

        // 获取显示元素
        const spanAOB = document.getElementById('angleAOB');
        const spanACB = document.getElementById('angleACB');
        const spanRatio = document.getElementById('ratio');
        const theoremMsg = document.getElementById('theoremMessage');

        // 拖拽状态
        let isDragging = false;
        let draggedPoint = null; // 'A', 'B' 或 'C'

        // 根据角度计算圆上点的坐标
        function getPointFromAngle(angleDeg) {
            const rad = angleDeg * Math.PI / 180;
            return {
                x: centerX + radius * Math.cos(rad),
                y: centerY + radius * Math.sin(rad)
            };
        }

        // 计算两点之间的圆心角（取较小的角，0~180度）
        function calculateCentralAngle(deg1, deg2) {
            let diff = Math.abs(deg1 - deg2) % 360;
            if (diff > 180) diff = 360 - diff;
            return diff;
        }

        // 计算圆周角ACB（顶点在C）
        function calculateCircumferenceAngle(degA, degC, degB) {
            const pA = getPointFromAngle(degA);
            const pC = getPointFromAngle(degC);
            const pB = getPointFromAngle(degB);

            // 向量 CA 和 CB
            const vCA = { x: pA.x - pC.x, y: pA.y - pC.y };
            const vCB = { x: pB.x - pC.x, y: pB.y - pC.y };

            const dot = vCA.x * vCB.x + vCA.y * vCB.y;
            const magCA = Math.sqrt(vCA.x * vCA.x + vCA.y * vCA.y);
            const magCB = Math.sqrt(vCB.x * vCB.x + vCB.y * vCB.y);

            if (magCA === 0 || magCB === 0) return 0;

            let cos = dot / (magCA * magCB);
            cos = Math.min(1, Math.max(-1, cos)); // 处理数值误差
            return Math.acos(cos) * 180 / Math.PI;
        }

        // 判断点C在弧AB的优弧还是劣弧上
        function getArcType(degA, degB, degC) {
            // 将角度归一化到 [0, 360)
            let a = ((degA % 360) + 360) % 360;
            let b = ((degB % 360) + 360) % 360;
            let c = ((degC % 360) + 360) % 360;

            // 从A到B逆时针的夹角
            let abCCW = (b - a + 360) % 360;
            
            // 从A到C逆时针的夹角
            let acCCW = (c - a + 360) % 360;

            // 如果逆时针从A到B的夹角小于180度，则这个弧是劣弧
            if (abCCW < 180) {
                // C在A到B的逆时针路径上（且不在端点）则C在劣弧上
                if (acCCW > 0.1 && acCCW < abCCW - 0.1) {
                    return '劣弧';
                } else {
                    return '优弧';
                }
            } else {
                // 如果逆时针从A到B大于180度，则劣弧是顺时针的那一段
                // 此时如果C在逆时针路径上，实际上是在优弧上
                if (acCCW > 0.1 && acCCW < abCCW - 0.1) {
                    return '优弧';
                } else {
                    return '劣弧';
                }
            }
        }

        // 更新所有测量值和显示信息
        function updateDisplay() {
            // 计算圆心角AOB
            const aob = calculateCentralAngle(angleA, angleB);
            
            // 计算圆周角ACB
            const acb = calculateCircumferenceAngle(angleA, angleC, angleB);
            
            // 更新数值显示
            spanAOB.textContent = aob.toFixed(2);
            spanACB.textContent = acb.toFixed(2);
            
            const ratio = aob / acb;
            spanRatio.textContent = ratio.toFixed(2);

            // 判断弧的类型
            const arcType = getArcType(angleA, angleB, angleC);
            
            // 检查AOB是否接近180度（三点共线）
            const isAOBLinear = Math.abs(aob - 180) < 0.5;
            
            // 检查ACB是否接近90度
            const isACBRight = Math.abs(acb - 90) < 0.5;

            // 根据条件生成消息
            let message = '';
            
            if (isAOBLinear && isACBRight) {
                message = '直径所对的圆周角是直角（定理的特殊情况）';
            } else if (arcType === '优弧') {
                if (Math.abs(ratio - 2) < 0.1) {
                    message = '点C在优弧AB上，定理成立';
                } else {
                    message = '点C在优弧AB上';
                }
            } else {
                message = '点C在劣弧AB上，定理不成立';
            }
            
            theoremMsg.textContent = message;
            
            // 重绘画布
            drawCanvas();
        }

        // 绘制圆和点
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制圆
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333';
            ctx.stroke();

            // 绘制圆心O
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = '14px sans-serif';
            ctx.fillText('O', centerX - 15, centerY - 10);

            // 获取三点坐标
            const pA = getPointFromAngle(angleA);
            const pB = getPointFromAngle(angleB);
            const pC = getPointFromAngle(angleC);

            // 绘制弦AB、AC、BC（虚线）
            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pB.x, pB.y);
            ctx.strokeStyle = '#aaa';
            ctx.setLineDash([4, 2]);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pA.x, pA.y);
            ctx.lineTo(pC.x, pC.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(pB.x, pB.y);
            ctx.lineTo(pC.x, pC.y);
            ctx.stroke();
            ctx.setLineDash([]);

            // 绘制半径OA、OB（浅色）
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(pA.x, pA.y);
            ctx.strokeStyle = '#ddd';
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(pB.x, pB.y);
            ctx.stroke();

            // 绘制点A、B、C
            ctx.beginPath();
            ctx.arc(pA.x, pA.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText('A', pA.x + 8, pA.y - 8);

            ctx.beginPath();
            ctx.arc(pB.x, pB.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'blue';
            ctx.fill();
            ctx.fillText('B', pB.x + 8, pB.y - 8);

            ctx.beginPath();
            ctx.arc(pC.x, pC.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'green';
            ctx.fill();
            ctx.fillText('C', pC.x + 8, pC.y - 8);
        }

        // 鼠标按下事件
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const pA = getPointFromAngle(angleA);
            const pB = getPointFromAngle(angleB);
            const pC = getPointFromAngle(angleC);

            const distA = Math.hypot(mouseX - pA.x, mouseY - pA.y);
            const distB = Math.hypot(mouseX - pB.x, mouseY - pB.y);
            const distC = Math.hypot(mouseX - pC.x, mouseY - pC.y);

            const threshold = 15;
            
            if (distA < threshold) {
                isDragging = true;
                draggedPoint = 'A';
            } else if (distB < threshold) {
                isDragging = true;
                draggedPoint = 'B';
            } else if (distC < threshold) {
                isDragging = true;
                draggedPoint = 'C';
            }
        });

        // 鼠标移动事件
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !draggedPoint) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            // 计算相对于圆心的角度
            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            let angleRad = Math.atan2(dy, dx);
            let angleDeg = angleRad * 180 / Math.PI;

            // 更新被拖动的点
            if (draggedPoint === 'A') {
                angleA = angleDeg;
            } else if (draggedPoint === 'B') {
                angleB = angleDeg;
            } else if (draggedPoint === 'C') {
                angleC = angleDeg;
            }

            updateDisplay();
        });

        // 鼠标松开事件
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            draggedPoint = null;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            draggedPoint = null;
        });

        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>

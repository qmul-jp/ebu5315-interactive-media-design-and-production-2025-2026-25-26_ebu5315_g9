<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆幂定理 - CircleLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
    <style>
        body {
            font-family: 'Noto Sans SC', 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 20px 24px 28px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-card {
            max-width: 860px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .card-header {
            padding: 20px 28px 12px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .title {
            font-family: 'Source Han Serif SC', 'Noto Serif SC', 'Anthropic Serif', Georgia, serif;
            font-size: 1.35rem;
            color: var(--text);
        }
        .card-header .sub-en {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 0 28px;
            border-bottom: 2px solid var(--border);
            background: var(--card-bg);
        }
        .tab {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-sub);
            background: var(--hover-bg);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            margin-right: 4px;
            transition: background 0.15s, color 0.15s;
            user-select: none;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--card-bg);
            color: var(--text);
            font-weight: 600;
            border-bottom: 2px solid var(--card-bg);
            margin-bottom: -2px;
        }

        .canvas-container {
            padding: 24px 28px 12px;
            display: flex;
            justify-content: center;
            background: var(--card-bg);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: background 0.2s, border-color 0.2s;
        }

        .descriptions {
            margin: 12px 28px 8px;
            line-height: 1.8;
            font-size: 0.9rem;
            color: var(--text);
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .desc-item {
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
            background: var(--hover-bg);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .desc-symbol {
            font-weight: 600;
            color: var(--accent2);
            font-family: 'Noto Sans SC', 'Manrope', Arial, sans-serif;
        }

        .theorem {
            margin: 8px 28px 16px;
            background: var(--hover-bg);
            border-left: 4px solid var(--accent2);
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
            text-align: center;
            transition: background 0.2s;
        }

        .interact-hint {
            margin: 0 28px 24px;
            font-size: 0.7rem;
            color: var(--text-sub);
            display: flex;
            gap: 18px;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
    </style>
</head>
<body>
<div class="circle-card">
    <div class="card-header">
        <div class="title" data-cl-zh>圆幂定理</div>
        <div class="title" data-cl-en style="display:none">Power of a Point Theorem</div>
        <div class="sub-en" data-cl-zh>相交弦 · 切割线 · 割线 · 圆幂统一</div>
        <div class="sub-en" data-cl-en style="display:none">Intersecting Chords · Secant-Tangent · Two Secants · Unified Power</div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
        <div class="tab active" id="tab0" onclick="switchMode(0)">
            <span data-cl-zh>相交弦</span><span data-cl-en style="display:none">Intersecting Chords</span>
        </div>
        <div class="tab" id="tab1" onclick="switchMode(1)">
            <span data-cl-zh>切割线</span><span data-cl-en style="display:none">Secant-Tangent</span>
        </div>
        <div class="tab" id="tab2" onclick="switchMode(2)">
            <span data-cl-zh>割线</span><span data-cl-en style="display:none">Two Secants</span>
        </div>
        <div class="tab" id="tab3" onclick="switchMode(3)">
            <span data-cl-zh>圆幂统一</span><span data-cl-en style="display:none">Unified Power</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="circleCanvas" width="620" height="460" style="width:100%; height:auto; max-width:620px; aspect-ratio:620/460"></canvas>
    </div>
    <div class="descriptions" id="descArea"></div>
    <div class="theorem" id="theoremText"></div>
    <div class="interact-hint">
        <span>🖱️ <span data-cl-zh>拖拽各点改变图形</span><span data-cl-en style="display:none">Drag points to reshape</span></span>
    </div>
</div>

<script>
    (function () {
        const canvas = document.getElementById('circleCanvas');
        const ctx    = canvas.getContext('2d');
        const CANVAS_W = 620, CANVAS_H = 460;
        const cx = 300, cy = 230, radius = 160;

        let mode = 0;
        let m0 = { angleA: 30,  angleB: 200, angleC: 100, angleD: 300 };
        let m1 = { angleA: 350, angleB: 40,  angleC: 130, Px: 500, Py: 230 };
        let m2 = { angleA: 20,  angleB: 80,  angleC: 330, angleD: 270, Px: 510, Py: 230 };
        let m3 = { angleA: 40,  angleB: 220, Px: 380, Py: 230 };
        let dragging = false, dragTarget = null;
        document.documentElement.style.fontSize = '16px';

        function _fg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? '#e8e4dc' : '#1a1a1a'; }
        function _bg()     { return document.documentElement.getAttribute('data-theme') === 'dark' ? (getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim() || '#181F23') : '#ffffff'; }
        function _isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
        function _lang()   { return (window._CL && window._CL.lang) || 'zh'; }

        function d2r(d) { return d * Math.PI / 180; }
        function r2d(r) { return r * 180 / Math.PI; }
        function pt(deg) { return { x: cx + radius * Math.cos(d2r(deg)), y: cy + radius * Math.sin(d2r(deg)) }; }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

        function lineCircleIntersect(p1, p2) {
            const dx = p2.x-p1.x, dy = p2.y-p1.y;
            const fx = p1.x-cx,   fy = p1.y-cy;
            const a = dx*dx+dy*dy, b = 2*(fx*dx+fy*dy), c = fx*fx+fy*fy-radius*radius;
            const disc = b*b - 4*a*c;
            if (disc < 0) return null;
            const sq = Math.sqrt(disc);
            return [
                { x: p1.x+((-b-sq)/(2*a))*dx, y: p1.y+((-b-sq)/(2*a))*dy, t: (-b-sq)/(2*a) },
                { x: p1.x+((-b+sq)/(2*a))*dx, y: p1.y+((-b+sq)/(2*a))*dy, t: (-b+sq)/(2*a) }
            ];
        }

        function segIntersect(a1, a2, b1, b2) {
            const d1 = { x:a2.x-a1.x, y:a2.y-a1.y }, d2 = { x:b2.x-b1.x, y:b2.y-b1.y };
            const cross = d1.x*d2.y - d1.y*d2.x;
            if (Math.abs(cross) < 1e-9) return null;
            const t = ((b1.x-a1.x)*d2.y - (b1.y-a1.y)*d2.x) / cross;
            return { x: a1.x+t*d1.x, y: a1.y+t*d1.y };
        }

        function labelLen(p1, p2, text, color, offset) {
            const mx = (p1.x+p2.x)/2 + (offset||0)*((p2.y-p1.y)/Math.max(dist(p1,p2),1));
            const my = (p1.y+p2.y)/2 - (offset||0)*((p2.x-p1.x)/Math.max(dist(p1,p2),1));
            ctx.fillStyle = color;
            ctx.font = '12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(text, mx+5, my-3);
        }

        function drawPoint(p, r, fill, label, labelOffset) {
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2*Math.PI);
            ctx.fillStyle = fill; ctx.fill();
            if (label) {
                ctx.fillStyle = _fg();
                ctx.font = '500 14px "Noto Sans SC", "Manrope", Arial, sans-serif';
                ctx.fillText(label, p.x+(labelOffset?.x||8), p.y+(labelOffset?.y||-8));
            }
        }

        function drawCircle() {
            ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.fillStyle = _bg(); ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI);
            ctx.strokeStyle = _isDark() ? '#555' : '#bbb';
            ctx.lineWidth = 1.5; ctx.stroke();
            drawPoint({x:cx,y:cy}, 4, _fg(), 'O', {x:-15,y:-8});
        }

        function fullLine(p1, p2, color, width, dash) {
            const W = CANVAS_W, H = CANVAS_H;
            const dx = p2.x-p1.x, dy = p2.y-p1.y;
            if (Math.abs(dx) < 1e-9 && Math.abs(dy) < 1e-9) return;
            const ts = [];
            if (Math.abs(dx) > 1e-9) { ts.push(-p1.x/dx); ts.push((W-p1.x)/dx); }
            if (Math.abs(dy) > 1e-9) { ts.push(-p1.y/dy); ts.push((H-p1.y)/dy); }
            const pts = ts.map(t => ({ x:p1.x+t*dx, y:p1.y+t*dy })).filter(p => p.x>=-1&&p.x<=W+1&&p.y>=-1&&p.y<=H+1);
            if (pts.length < 2) return;
            pts.sort((a,b) => (a.x-b.x)||(a.y-b.y));
            ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
            ctx.strokeStyle = color; ctx.lineWidth = width||1.5;
            if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
            ctx.stroke(); ctx.setLineDash([]);
        }

        function labelOutward(p) {
            const dx = p.x-cx, dy = p.y-cy, l = Math.hypot(dx,dy);
            return { x:(dx/l)*14, y:(dy/l)*14 };
        }

        function setDesc(html) { document.getElementById('descArea').innerHTML = html; }
        function setTheorem(text) { document.getElementById('theoremText').textContent = text; }

        // ── 模式0：相交弦 ──────────────────────────────────────────
        function updateMode0() {
            const pA=pt(m0.angleA), pB=pt(m0.angleB), pC=pt(m0.angleC), pD=pt(m0.angleD);
            const P = segIntersect(pA, pB, pC, pD);
            if (!P) { update(); return; }
            const PA=dist(P,pA), PB=dist(P,pB), PC=dist(P,pC), PD=dist(P,pD);
            const prod1=PA*PB, prod2=PC*PD;
            const isEq = Math.abs(prod1-prod2) < 2;
            const col = isEq ? '#27ae60' : '#e67e22';
            const isZh = _lang() === 'zh';

            setDesc(`
                <div class="desc-item"><span class="desc-symbol">PA</span> = ${PA.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PB</span> = ${PB.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PA·PB</span> = ${prod1.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PC</span> = ${PC.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PD</span> = ${PD.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PC·PD</span> = ${prod2.toFixed(1)}</div>
                <div class="desc-item" style="color:${col}">PA·PB ${isEq?'=':'≠'} PC·PD${isEq?' ✓':''}</div>`);
            setTheorem(isZh
                ? '圆内两弦相交，被交点分成的两段之积相等：PA · PB = PC · PD'
                : 'Two chords intersect inside a circle: PA · PB = PC · PD');

            drawCircle();
            fullLine(pA, pB, '#e74c3c', 2);
            fullLine(pC, pD, '#2980b9', 2);
            labelLen(P, pA, `PA=${PA.toFixed(1)}`, '#e74c3c', 12);
            labelLen(P, pB, `PB=${PB.toFixed(1)}`, '#e74c3c', 12);
            labelLen(P, pC, `PC=${PC.toFixed(1)}`, '#2980b9', -12);
            labelLen(P, pD, `PD=${PD.toFixed(1)}`, '#2980b9', -12);
            drawPoint(pA,6,'#e74c3c','A',labelOutward(pA)); drawPoint(pB,6,'#e74c3c','B',labelOutward(pB));
            drawPoint(pC,6,'#2980b9','C',labelOutward(pC)); drawPoint(pD,6,'#2980b9','D',labelOutward(pD));
            drawPoint(P, 5, col, 'P', {x:8,y:8});
        }

        // ── 模式1：切割线 ──────────────────────────────────────────
        function updateMode1() {
            const P = { x:m1.Px, y:m1.Py };
            const dxP=P.x-cx, dyP=P.y-cy, OP=Math.hypot(dxP,dyP);
            const isZh = _lang() === 'zh';
            if (OP <= radius) {
                setDesc(`<div class="desc-item"><span style="color:#e67e22">${isZh?'P 在圆内，请将 P 移到圆外':'P is inside the circle'}</span></div>`);
                setTheorem(isZh ? '切线长是割线两交点距离的比例中项：PT² = PQ₁ · PQ₂' : 'Tangent length is the geometric mean: PT² = PQ₁ · PQ₂');
                drawCircle(); drawPoint(P,6,'#e67e22','P',{x:8,y:-8}); return;
            }
            const alpha = Math.acos(Math.min(1, radius/OP));
            const ux=dxP/OP, uy=dyP/OP, vx=-uy, vy=ux;
            const tA = { x:cx+radius*(Math.cos(alpha)*ux+Math.sin(alpha)*vx), y:cy+radius*(Math.cos(alpha)*uy+Math.sin(alpha)*vy) };
            const pB = pt(m1.angleB);
            const ints = lineCircleIntersect(P, pB);
            if (!ints) return;
            const sorted = ints.slice().sort((a,b) => dist(P,a)-dist(P,b));
            const Q1=sorted[0], Q2=sorted[1];
            const PT=dist(P,tA), PQ1=dist(P,Q1), PQ2=dist(P,Q2);
            const prod=PQ1*PQ2, isEq=Math.abs(PT*PT-prod)<2;
            const col=isEq?'#27ae60':'#e67e22';

            setDesc(`
                <div class="desc-item"><span class="desc-symbol">PT</span> = ${PT.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PT²</span> = ${(PT*PT).toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PQ₁</span> = ${PQ1.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PQ₂</span> = ${PQ2.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PQ₁·PQ₂</span> = ${prod.toFixed(1)}</div>
                <div class="desc-item" style="color:${col}">PT² ${isEq?'=':'≠'} PQ₁·PQ₂${isEq?' ✓':''}</div>`);
            setTheorem(isZh ? '切线长是割线两交点距离的比例中项：PT² = PQ₁ · PQ₂' : 'Tangent length is the geometric mean: PT² = PQ₁ · PQ₂');

            drawCircle();
            fullLine(P, Q1, '#2980b9', 2);
            fullLine(P, tA, '#e74c3c', 2);
            fullLine({x:cx,y:cy}, tA, _isDark()?'#444':'#bbb', 1.2, [4,2]);
            labelLen(P,tA,`PT=${PT.toFixed(1)}`,'#e74c3c',14);
            labelLen(P,Q1,`PQ₁=${PQ1.toFixed(1)}`,'#2980b9',-14);
            labelLen(P,Q2,`PQ₂=${PQ2.toFixed(1)}`,'#2980b9',-14);
            drawPoint(tA,6,'#e74c3c','T',labelOutward(tA));
            drawPoint(Q1,6,'#2980b9','Q₁',labelOutward(Q1));
            drawPoint(Q2,6,'#2980b9','Q₂',labelOutward(Q2));
            drawPoint(P, 6,'#e67e22','P',{x:8,y:-8});
        }

        // ── 模式2：两条割线 ────────────────────────────────────────
        function updateMode2() {
            const P = { x:m2.Px, y:m2.Py };
            const isZh = _lang() === 'zh';
            if (Math.hypot(P.x-cx,P.y-cy) <= radius) {
                setDesc(`<div class="desc-item"><span style="color:#e67e22">${isZh?'P 在圆内，请将 P 移到圆外':'P is inside the circle'}</span></div>`);
                setTheorem(isZh ? '从圆外一点的两条割线，各到两交点之积相等：PA₁·PA₂ = PC₁·PC₂' : 'Two secants from an external point: PA₁·PA₂ = PC₁·PC₂');
                drawCircle(); drawPoint(P,6,'#e67e22','P',{x:8,y:-8}); return;
            }
            const pA=pt(m2.angleA), pC=pt(m2.angleC);
            const ints1=lineCircleIntersect(P,pA), ints2=lineCircleIntersect(P,pC);
            if (!ints1||!ints2) return;
            const s1=ints1.slice().sort((a,b)=>dist(P,a)-dist(P,b));
            const s2=ints2.slice().sort((a,b)=>dist(P,a)-dist(P,b));
            const A1=s1[0],A2=s1[1],C1=s2[0],C2=s2[1];
            const PA1=dist(P,A1),PA2=dist(P,A2),PC1=dist(P,C1),PC2=dist(P,C2);
            const prod1=PA1*PA2, prod2=PC1*PC2;
            const isEq=Math.abs(prod1-prod2)<2;
            const col=isEq?'#27ae60':'#e67e22';

            setDesc(`
                <div class="desc-item"><span class="desc-symbol">PA₁</span> = ${PA1.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PA₂</span> = ${PA2.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PA₁·PA₂</span> = ${prod1.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PC₁</span> = ${PC1.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PC₂</span> = ${PC2.toFixed(1)}</div>
                <div class="desc-item"><span class="desc-symbol">PC₁·PC₂</span> = ${prod2.toFixed(1)}</div>
                <div class="desc-item" style="color:${col}">PA₁·PA₂ ${isEq?'=':'≠'} PC₁·PC₂${isEq?' ✓':''}</div>`);
            setTheorem(isZh ? '从圆外一点的两条割线，各到两交点之积相等：PA₁·PA₂ = PC₁·PC₂' : 'Two secants from an external point: PA₁·PA₂ = PC₁·PC₂');

            drawCircle();
            fullLine(P,A1,'#e74c3c',2); fullLine(P,C1,'#2980b9',2);
            labelLen(P,A1,`PA₁=${PA1.toFixed(1)}`,'#e74c3c',14);
            labelLen(P,A2,`PA₂=${PA2.toFixed(1)}`,'#e74c3c',14);
            labelLen(P,C1,`PC₁=${PC1.toFixed(1)}`,'#2980b9',-14);
            labelLen(P,C2,`PC₂=${PC2.toFixed(1)}`,'#2980b9',-14);
            drawPoint(A1,6,'#e74c3c','A₁',labelOutward(A1)); drawPoint(A2,6,'#e74c3c','A₂',labelOutward(A2));
            drawPoint(C1,6,'#2980b9','C₁',labelOutward(C1)); drawPoint(C2,6,'#2980b9','C₂',labelOutward(C2));
            drawPoint(P, 6,'#e67e22','P',{x:8,y:-8});
        }

        // ── 模式3：圆幂统一 ────────────────────────────────────────
        function updateMode3() {
            const P = { x:m3.Px, y:m3.Py };
            const pA = pt(m3.angleA);
            const ints = lineCircleIntersect(P, pA);
            if (!ints) return;
            const sorted = ints.slice().sort((a,b) => a.t-b.t);
            const X=sorted[0], Y=sorted[1];
            const px=P.x-cx, py=P.y-cy;
            const power = px*px + py*py - radius*radius;
            const PX=dist(P,X), PY=dist(P,Y), prod=PX*PY;
            const inside = power < 0;
            const green='#27ae60', orange='#e67e22';
            const isZh = _lang() === 'zh';

            if (inside) {
                setDesc(`
                    <div class="desc-item"><span style="color:${orange}">${isZh?'P 在圆内':'P inside ⊙O'}</span></div>
                    <div class="desc-item"><span class="desc-symbol">PX</span> = ${PX.toFixed(1)}</div>
                    <div class="desc-item"><span class="desc-symbol">PY</span> = ${PY.toFixed(1)}</div>
                    <div class="desc-item"><span class="desc-symbol">PX·PY</span> = ${prod.toFixed(1)}</div>
                    <div class="desc-item"><span class="desc-symbol" style="color:${orange}">${isZh?'圆幂':'Power'} = ${Math.abs(power).toFixed(1)}</span></div>`);
            } else {
                setDesc(`
                    <div class="desc-item"><span style="color:${green}">${isZh?'P 在圆外':'P outside ⊙O'}</span></div>
                    <div class="desc-item"><span class="desc-symbol">PX</span> = ${PX.toFixed(1)}</div>
                    <div class="desc-item"><span class="desc-symbol">PY</span> = ${PY.toFixed(1)}</div>
                    <div class="desc-item"><span class="desc-symbol">PX·PY</span> = ${prod.toFixed(1)}</div>
                    <div class="desc-item" style="color:${green}"><span class="desc-symbol" style="color:${green}">${isZh?'圆幂':'Power'} = ${power.toFixed(1)}</span> ✓</div>`);
            }
            setTheorem(isZh
                ? '过点 P 的任意直线与⊙O 交于 X、Y，则 PX · PY = |OP² − r²|（圆幂为定值）'
                : 'For any line through P intersecting ⊙O at X, Y: PX·PY = |OP² − r²| (constant)');

            drawCircle();
            fullLine({x:cx,y:cy}, P, _isDark()?'#444':'#bbb', 1.2, [4,2]);
            fullLine(X, Y, '#8e44ad', 2);
            labelLen(P,X,`PX=${PX.toFixed(1)}`,'#8e44ad',14);
            labelLen(P,Y,`PY=${PY.toFixed(1)}`,'#8e44ad',14);
            const mop={x:(P.x+cx)/2, y:(P.y+cy)/2}, op=dist(P,{x:cx,y:cy});
            ctx.fillStyle = _isDark()?'#777':'#888';
            ctx.font = '12px "Noto Sans SC", "Manrope", sans-serif';
            ctx.fillText(`OP=${op.toFixed(1)}`, mop.x+5, mop.y-5);
            drawPoint(X,6,'#8e44ad','X',labelOutward(X));
            drawPoint(Y,6,'#8e44ad','Y',labelOutward(Y));
            drawPoint(P,6,inside?'#e67e22':'#e74c3c','P',{x:8,y:-8});
        }

        function update() {
            if      (mode===0) updateMode0();
            else if (mode===1) updateMode1();
            else if (mode===2) updateMode2();
            else if (mode===3) updateMode3();
        }

        window.switchMode = function(m) {
            mode = m;
            for (let i = 0; i < 4; i++) {
                document.getElementById('tab'+i).classList.toggle('active', i===m);
            }
            update();
        };

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (CANVAS_W / rect.width),
                y: (clientY - rect.top)  * (CANVAS_H / rect.height)
            };
        }

        function getTargets() {
            if (mode===0) return [
                {id:'A',p:pt(m0.angleA)},{id:'B',p:pt(m0.angleB)},
                {id:'C',p:pt(m0.angleC)},{id:'D',p:pt(m0.angleD)}
            ];
            if (mode===1) return [{id:'P',p:{x:m1.Px,y:m1.Py}}];
            if (mode===2) return [{id:'P',p:{x:m2.Px,y:m2.Py}},{id:'A',p:pt(m2.angleA)},{id:'C',p:pt(m2.angleC)}];
            return [{id:'P',p:{x:m3.Px,y:m3.Py}},{id:'A',p:pt(m3.angleA)}];
        }

        function handleStart(e) {
            const m = getMousePos(e);
            for (const {id, p} of getTargets()) {
                if (Math.hypot(m.x-p.x, m.y-p.y) < 16) { dragging=true; dragTarget=id; break; }
            }
        }
        function handleMove(e) {
            if (!dragging) return;
            const m = getMousePos(e);
            const deg = r2d(Math.atan2(m.y-cy, m.x-cx));
            if (mode===0) {
                if (dragTarget==='A') m0.angleA=deg; else if (dragTarget==='B') m0.angleB=deg;
                else if (dragTarget==='C') m0.angleC=deg; else if (dragTarget==='D') m0.angleD=deg;
            } else if (mode===1) {
                if (dragTarget==='P') { m1.Px=m.x; m1.Py=m.y; }
            } else if (mode===2) {
                if (dragTarget==='P') { m2.Px=m.x; m2.Py=m.y; }
                else if (dragTarget==='A') m2.angleA=deg;
                else if (dragTarget==='C') m2.angleC=deg;
            } else {
                if (dragTarget==='P') { m3.Px=m.x; m3.Py=m.y; }
                else if (dragTarget==='A') m3.angleA=deg;
            }
            update();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup',    () => { dragging=false; dragTarget=null; });
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove',  handleMove,  { passive: false });
        window.addEventListener('touchend',   () => { dragging=false; dragTarget=null; });

        const observer = new MutationObserver(() => { update(); });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        window.addEventListener('message', (ev) => {
            if (!ev.data || ev.data._src !== 'circlelab') return;
            if (ev.data.theme) document.documentElement.setAttribute('data-theme', ev.data.theme);
            if (ev.data.lang) {
                const isZh = ev.data.lang === 'zh';
                if (!window._CL) window._CL = {};
                window._CL.lang = ev.data.lang;
                document.querySelectorAll('[data-cl-zh]').forEach(el => el.style.display = isZh ? '' : 'none');
                document.querySelectorAll('[data-cl-en]').forEach(el => el.style.display = isZh ? 'none' : '');
            }
            if(typeof ev.data.fontSize === 'number'){
                let fs = ev.data.fontSize;
                fs = Math.min(20, Math.max(12, fs));
                document.documentElement.style.fontSize = fs + 'px';
            }
            update();
        });

        window.addEventListener('load', () => { update(); });
        update();
        let mascotDragReported = false;
        let mascotPointerDown = false;
        let mascotStartPoint = null;
        function getMascotPoint(event) {
            if (event.touches && event.touches[0]) {
                return { x: event.touches[0].clientX, y: event.touches[0].clientY };
            }
            if (event.changedTouches && event.changedTouches[0]) {
                return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
            }
            return { x: event.clientX, y: event.clientY };
        }
        function reportMascotDrag() {
            if (mascotDragReported) return;
            mascotDragReported = true;
            try {
                window.parent.postMessage({ _src: 'circlelab', mascotDrag: true }, '*');
            } catch (e) {}
        }
        function handleMascotDragStart(event) {
            mascotPointerDown = true;
            mascotStartPoint = getMascotPoint(event);
        }
        function handleMascotDragMove(event) {
            if (!mascotPointerDown || mascotDragReported || !mascotStartPoint) return;
            const currentPoint = getMascotPoint(event);
            if (Math.hypot(currentPoint.x - mascotStartPoint.x, currentPoint.y - mascotStartPoint.y) < 6) return;
            reportMascotDrag();
        }
        function handleMascotDragEnd() {
            mascotPointerDown = false;
            mascotStartPoint = null;
        }

        canvas.addEventListener('mousedown', handleMascotDragStart);
        canvas.addEventListener('touchstart', handleMascotDragStart, { passive: true });
        window.addEventListener('mousemove', handleMascotDragMove);
        window.addEventListener('touchmove', handleMascotDragMove, { passive: true });
        window.addEventListener('mouseup', handleMascotDragEnd);
        window.addEventListener('touchend', handleMascotDragEnd);
        window.addEventListener('touchcancel', handleMascotDragEnd);
        window.addEventListener('blur', handleMascotDragEnd);
    })();
</script>
</body>
</html>
